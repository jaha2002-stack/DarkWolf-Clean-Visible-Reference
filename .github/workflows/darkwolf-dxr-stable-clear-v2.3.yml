name: DarkWolf DXR Stable Clear v2.3 Shadow Composite

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: Build configuration
        required: true
        default: Release
        type: choice
        options:
          - Release
          - Debug

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout clean source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Apply proven Clean Visible Reference patch
        shell: pwsh
        run: ./scripts/apply-dxr-clean-reference-rebase.ps1

      - name: Apply Stable Clear v2.1 foundation
        shell: pwsh
        run: ./scripts/apply-dxr-stable-clear-v2.1.ps1

      - name: Apply Stable Clear v2.2 visual correctness patch
        shell: pwsh
        run: ./scripts/apply-dxr-stable-clear-v2.2.ps1

      - name: Apply Stable Clear v2.3 shadow composite patch
        shell: pwsh
        run: ./scripts/apply-dxr-stable-clear-v2.3.ps1

      - name: Build Stable Clear v2.3 runtime
        shell: pwsh
        run: ./scripts/build-windows-stable-clear-v2.3.ps1 -Configuration '${{ inputs.configuration }}'

      - name: Show packaged files
        shell: pwsh
        run: Get-ChildItem -Path dist -Recurse | Format-Table FullName, Length

      - name: Upload Stable Clear v2.3 runtime artifact
        uses: actions/upload-artifact@v4
        with:
          name: DarkWolf-DXR-Stable-Clear-v2.3-${{ inputs.configuration }}
          path: dist/**
          if-no-files-found: error
