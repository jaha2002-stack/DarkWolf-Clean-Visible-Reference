name: DarkWolf Temporal Stability Denoiser Experiment 13

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: Build configuration
        required: true
        default: Release
        type: choice
        options:
          - Release
          - Debug

jobs:
  build-validate-package:
    runs-on: windows-2022
    steps:
      - name: Checkout canonical Stable Clear v2.2 snapshot
        uses: actions/checkout@v4
        with:
          ref: 229cd5d93b4c24ba705c9821a871cccf31b34b96
          fetch-depth: 1
          path: work

      - name: Materialize production and experiment payloads
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $payload = '' +`
              '' +`
              '' +`
              '' +`
              '' +`
              ''
          $target = Join-Path 'work' 'patches/200-d3d12-graphics-artifact-fix-v1-production.patch'
          New-Item -ItemType Directory -Path (Split-Path -Parent $target) -Force | Out-Null
          [IO.File]::WriteAllBytes($target, [Convert]::FromBase64String($payload))
          $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $target).Hash
          if ($actual -ne '989C7943969B7A2C222FF93598195275383AFD217FCFCE1EDAC5D4E2A4231CBF') { throw 'Payload hash mismatch: patches/200-d3d12-graphics-artifact-fix-v1-production.patch' }
          Write-Host 'Materialized: patches/200-d3d12-graphics-artifact-fix-v1-production.patch'

          $payload = '' +`
              ''
          $target = Join-Path 'work' 'patches/210-d3d12-temporal-stability-denoiser-exp13.patch'
          New-Item -ItemType Directory -Path (Split-Path -Parent $target) -Force | Out-Null
          [IO.File]::WriteAllBytes($target, [Convert]::FromBase64String($payload))
          $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $target).Hash
          if ($actual -ne '2B18F13478D7C10400D593B9227373F620DFE6DE525F25F1760F5DCCA413AFE5') { throw 'Payload hash mismatch: patches/210-d3d12-temporal-stability-denoiser-exp13.patch' }
          Write-Host 'Materialized: patches/210-d3d12-temporal-stability-denoiser-exp13.patch'

          $payload = ''
          $target = Join-Path 'work' 'temporal_stability_denoiser_exp13.cfg'
          New-Item -ItemType Directory -Path (Split-Path -Parent $target) -Force | Out-Null
          [IO.File]::WriteAllBytes($target, [Convert]::FromBase64String($payload))
          $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $target).Hash
          if ($actual -ne '4717CF2EE6AC72BA1C1B3783DA4675D075D30FFF1B6A5A587BCBC0D3E3F16EA3') { throw 'Payload hash mismatch: temporal_stability_denoiser_exp13.cfg' }
          Write-Host 'Materialized: temporal_stability_denoiser_exp13.cfg'

          $payload = ''
          $target = Join-Path 'work' 'RUN_TEMPORAL_STABILITY_DENOISER_EXP13.bat'
          New-Item -ItemType Directory -Path (Split-Path -Parent $target) -Force | Out-Null
          [IO.File]::WriteAllBytes($target, [Convert]::FromBase64String($payload))
          $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $target).Hash
          if ($actual -ne '1E480AE8D1F4D66A09A353C99D10438A80F1673E501ABA6829D98C833DCD34B0') { throw 'Payload hash mismatch: RUN_TEMPORAL_STABILITY_DENOISER_EXP13.bat' }
          Write-Host 'Materialized: RUN_TEMPORAL_STABILITY_DENOISER_EXP13.bat'

          $payload = '' +`
              ''
          $target = Join-Path 'work' 'TEMPORAL_STABILITY_DENOISER_EXP13_RUN_AND_COLLECT.ps1'
          New-Item -ItemType Directory -Path (Split-Path -Parent $target) -Force | Out-Null
          [IO.File]::WriteAllBytes($target, [Convert]::FromBase64String($payload))
          $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $target).Hash
          if ($actual -ne 'D75C010494F1E5368CC4554FE49F660CCEE88C8C8B71CFE8CF2BC2A1A6AF1218') { throw 'Payload hash mismatch: TEMPORAL_STABILITY_DENOISER_EXP13_RUN_AND_COLLECT.ps1' }
          Write-Host 'Materialized: TEMPORAL_STABILITY_DENOISER_EXP13_RUN_AND_COLLECT.ps1'


      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Apply Stable Clear v2.2 chain
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          ./scripts/apply-dxr-clean-reference-rebase.ps1
          ./scripts/apply-dxr-stable-clear-v2.1.ps1
          ./scripts/apply-dxr-stable-clear-v2.2.ps1

      - name: Apply confirmed production fixes
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          $patch = 'patches/200-d3d12-graphics-artifact-fix-v1-production.patch'
          git apply --check $patch
          if ($LASTEXITCODE -ne 0) { throw 'Graphics Artifact Fix v1 does not apply.' }
          git apply $patch
          if ($LASTEXITCODE -ne 0) { throw 'Graphics Artifact Fix v1 application failed.' }

      - name: Apply Temporal Stability Denoiser Experiment 13
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          $patch = 'patches/210-d3d12-temporal-stability-denoiser-exp13.patch'
          $headers = @(Select-String -LiteralPath $patch -Pattern '^diff --git a/(.+) b/(.+)$')
          $expected = @(
            'src/opengl/gl_d3d12shim.cpp',
            'src/opengl/opengl.h',
            'src/renderer/tr_backend.cpp',
            'src/renderer/tr_init.cpp',
            'src/renderer/tr_local.h'
          ) | Sort-Object
          $actual = @($headers | ForEach-Object { $_.Matches[0].Groups[1].Value } | Sort-Object)
          if ($headers.Count -ne 5 -or (($actual -join '|') -ne ($expected -join '|'))) {
            throw "Experiment patch scope mismatch: $($actual -join ', ')"
          }
          git apply --check $patch
          if ($LASTEXITCODE -ne 0) { throw 'Temporal Experiment 13 patch does not apply.' }
          git apply $patch
          if ($LASTEXITCODE -ne 0) { throw 'Temporal Experiment 13 patch application failed.' }
          git diff --check
          if ($LASTEXITCODE -ne 0) { throw 'git diff --check failed.' }
          git apply --check -R $patch
          if ($LASTEXITCODE -ne 0) { throw 'Temporal patch reverse-check failed.' }

          $changed = @(git diff --name-only | Sort-Object)
          $approved = @(
            'src/opengl/gl_d3d12shim.cpp',
            'src/opengl/opengl.h',
            'src/renderer/tr_backend.cpp',
            'src/renderer/tr_image.cpp',
            'src/renderer/tr_init.cpp',
            'src/renderer/tr_local.h'
          ) | Sort-Object
          if (($changed -join '|') -ne ($approved -join '|')) {
            throw "Unexpected total source changes: $($changed -join ', ')"
          }

          $backend = Get-Content -LiteralPath 'src/renderer/tr_backend.cpp' -Raw
          $shim = Get-Content -LiteralPath 'src/opengl/gl_d3d12shim.cpp' -Raw
          foreach ($marker in @('TEMPORAL_EXP13','r_dxrTemporalMode','QD3D12_SetTemporalExperimentMode','DLSS_QUALITY_RR_RESET_EVERY_FRAME')) {
            if (-not ($backend.Contains($marker) -or $shim.Contains($marker))) { throw "Missing Experiment 13 marker: $marker" }
          }
          foreach ($forbidden in @('SHADOW_SELF_INTERSECTION_EXP10','DYNAMIC_LIGHT_PROJECTION_EXP11','DXR_DIRECT_EXP12')) {
            if ($backend.Contains($forbidden) -or $shim.Contains($forbidden)) { throw "Old experiment leaked into build: $forbidden" }
          }

      - name: Install test runner files
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          Copy-Item 'temporal_stability_denoiser_exp13.cfg' 'main/temporal_stability_denoiser_exp13.cfg' -Force

      - name: Build Temporal Experiment 13 runtime
        shell: pwsh
        working-directory: work
        run: ./scripts/build-windows-stable-clear-v2.2.ps1 -Configuration '${{ inputs.configuration }}'

      - name: Package Temporal Experiment 13 DELTA
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          $delta = 'delta-temporal-stability-denoiser-exp13'
          if (Test-Path $delta) { Remove-Item $delta -Recurse -Force }
          New-Item -ItemType Directory -Path $delta -Force | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $delta 'main') -Force | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $delta 'SOURCE_PATCH') -Force | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $delta 'SOURCE_FILES/src/opengl') -Force | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $delta 'SOURCE_FILES/src/renderer') -Force | Out-Null

          Copy-Item 'dist/WolfSP.exe' $delta -Force
          Copy-Item 'RUN_TEMPORAL_STABILITY_DENOISER_EXP13.bat' $delta -Force
          Copy-Item 'TEMPORAL_STABILITY_DENOISER_EXP13_RUN_AND_COLLECT.ps1' $delta -Force
          Copy-Item 'main/temporal_stability_denoiser_exp13.cfg' (Join-Path $delta 'main') -Force
          Copy-Item 'patches/200-d3d12-graphics-artifact-fix-v1-production.patch' (Join-Path $delta 'SOURCE_PATCH') -Force
          Copy-Item 'patches/210-d3d12-temporal-stability-denoiser-exp13.patch' (Join-Path $delta 'SOURCE_PATCH') -Force
          Copy-Item 'src/opengl/gl_d3d12shim.cpp' (Join-Path $delta 'SOURCE_FILES/src/opengl') -Force
          Copy-Item 'src/opengl/opengl.h' (Join-Path $delta 'SOURCE_FILES/src/opengl') -Force
          Copy-Item 'src/renderer/tr_backend.cpp' (Join-Path $delta 'SOURCE_FILES/src/renderer') -Force
          Copy-Item 'src/renderer/tr_image.cpp' (Join-Path $delta 'SOURCE_FILES/src/renderer') -Force
          Copy-Item 'src/renderer/tr_init.cpp' (Join-Path $delta 'SOURCE_FILES/src/renderer') -Force
          Copy-Item 'src/renderer/tr_local.h' (Join-Path $delta 'SOURCE_FILES/src/renderer') -Force

          @(
            'DarkWolf Temporal Stability / Denoiser Experiment 13',
            'Base=Stable Clear v2.2 + Real Mipmaps + Polygon Offset',
            'F6=Production baseline',
            'F7=Native no temporal reconstruction',
            'F8=DLSS Quality Super Resolution only',
            'F9=DLSS Quality Ray Reconstruction',
            'F10=DLSS Balanced Ray Reconstruction',
            'F11=DLSS Quality RR low sharpening',
            'F12=DLSS Quality RR with history reset every frame',
            'Run=RUN_TEMPORAL_STABILITY_DENOISER_EXP13.bat',
            'Capture protocol=Still -> repeated slow camera sweep -> still for every mode.'
          ) | Set-Content (Join-Path $delta 'README.txt') -Encoding UTF8

          Get-FileHash -Algorithm SHA256 'dist/WolfSP.exe' | Format-List | Out-String | Set-Content (Join-Path $delta 'WolfSP_SHA256.txt') -Encoding UTF8

      - name: Upload Temporal Experiment 13 DELTA
        uses: actions/upload-artifact@v4
        with:
          name: DarkWolf-D3D12-Temporal-Stability-Denoiser-Exp13-${{ inputs.configuration }}
          path: work/delta-temporal-stability-denoiser-exp13/**
          if-no-files-found: error
          retention-days: 14
