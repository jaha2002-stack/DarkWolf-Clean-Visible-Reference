name: DarkWolf DXR Clean Visible Reference Rebased

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: Build configuration
        required: true
        default: Release
        type: choice
        options:
          - Release
          - Debug

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Apply rebased Clean Visible Reference patch
        shell: pwsh
        run: ./scripts/apply-dxr-clean-reference-rebase.ps1

      - name: Build clean reference runtime
        shell: pwsh
        run: ./scripts/build-windows-clean-reference-rebased.ps1 -Configuration '${{ inputs.configuration }}'

      - name: Show packaged files
        shell: pwsh
        run: Get-ChildItem -Path dist -Recurse | Format-Table FullName, Length

      - name: Upload clean reference runtime artifact
        uses: actions/upload-artifact@v4
        with:
          name: DarkWolf-DXR-Clean-Visible-Reference-Rebased-${{ inputs.configuration }}
          path: dist/**
          if-no-files-found: error
