name: DarkWolf D3D12 Real Mipmap A-B Experiment 5 R2 - MSVC minmax fix

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: Build configuration
        required: true
        default: Release
        type: choice
        options:
          - Release
          - Debug

jobs:
  build-validate-package:
    runs-on: windows-2022
    steps:
      - name: Checkout canonical Stable Clear v2.2 snapshot
        uses: actions/checkout@v4
        with:
          ref: 229cd5d93b4c24ba705c9821a871cccf31b34b96
          fetch-depth: 1
          path: work

      - name: Materialize isolated mipmap Experiment 5 files
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $files = @(
            [pscustomobject]@{ Path = 'patches/80-d3d12-real-mipmaps-exp5.patch'; Sha256 = '00804AC6D63776E8FA50570553C93FBF7A8D1EDD7775CD3FE0F9DB21FF482584'; Data = '' },
            [pscustomobject]@{ Path = 'scripts/validate-d3d12-mipmap-exp5.ps1'; Sha256 = '5BCDBCE4F301CA6DB2D3C21863B88D43B1410E06DBAD4F30AA6493D37F68023D'; Data = '' },
            [pscustomobject]@{ Path = 'scripts/package-d3d12-mipmap-exp5-delta.ps1'; Sha256 = 'AB1F82B8E685C39DE7E10EAB7859431F90FD020474A315FDDC0F0E33331BD8B7'; Data = '' },
            [pscustomobject]@{ Path = 'main/dxr_mipmap_exp5.cfg'; Sha256 = 'AEA415A0005634BE87329C2CD20668265FA9FCEED499434952A0504C7BAD6ECF'; Data = '' },
            [pscustomobject]@{ Path = 'RUN_MIP_EXP5_BASELINE.bat'; Sha256 = '225737732E73BDF6634951CB8E5CD774795EF18B89300738705725CC6F39FD57'; Data = '' },
            [pscustomobject]@{ Path = 'RUN_MIP_EXP5_REAL_MIPS.bat'; Sha256 = '7A6FDD78412ED64E1B64DFAF8856A17F0C7D1751A3C2E33EED2078A60AB7A9BC'; Data = '' },
            [pscustomobject]@{ Path = 'MIP_EXP5_RUN_AND_COLLECT.ps1'; Sha256 = 'B89A21B0900272BCC056916722844B948E1D9178B8782CAB274F57938CEBAD13'; Data = '' },
            [pscustomobject]@{ Path = 'README_MIP_EXP5_RU.txt'; Sha256 = '817AED3DA38ECB8B9A9E67DA5E8099B760D8AE62B4C19ED5597E0E897239525A'; Data = '' }
          )
          foreach ($item in $files) {
            $target = Join-Path 'work' $item.Path
            New-Item -ItemType Directory -Path (Split-Path -Parent $target) -Force | Out-Null
            [IO.File]::WriteAllBytes($target, [Convert]::FromBase64String($item.Data))
            $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $target).Hash
            if ($actual -ne $item.Sha256) { throw "Payload hash mismatch: $($item.Path)" }
            Write-Host "Materialized: $($item.Path)"
          }

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Apply Stable Clear v2.2 chain
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          ./scripts/apply-dxr-clean-reference-rebase.ps1
          ./scripts/apply-dxr-stable-clear-v2.1.ps1
          ./scripts/apply-dxr-stable-clear-v2.2.ps1

      - name: Apply isolated gl_d3d12shim mipmap patch
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          $patch = 'patches/80-d3d12-real-mipmaps-exp5.patch'
          $headers = @(Select-String -LiteralPath $patch -Pattern '^diff --git a/(.+) b/(.+)$')
          if ($headers.Count -ne 1) { throw 'Mipmap patch must modify exactly one file.' }
          if ($headers[0].Line -ne 'diff --git a/src/opengl/gl_d3d12shim.cpp b/src/opengl/gl_d3d12shim.cpp') { throw 'Unexpected file in mipmap patch.' }
          git apply --check $patch
          if ($LASTEXITCODE -ne 0) { throw 'Mipmap patch does not apply cleanly.' }
          git apply $patch
          if ($LASTEXITCODE -ne 0) { throw 'Mipmap patch application failed.' }
          git diff --check
          if ($LASTEXITCODE -ne 0) { throw 'git diff --check failed after mipmap patch.' }
          git apply --check -R $patch
          if ($LASTEXITCODE -ne 0) { throw 'Reverse-check failed; mipmap patch is not cleanly reversible.' }
          Write-Host 'MIP_EXP5 patch applied; single-file and reverse checks passed.'

      - name: Validate R2 MSVC min-max macro safety
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          $sourcePath = 'src/opengl/gl_d3d12shim.cpp'
          $source = Get-Content -LiteralPath $sourcePath -Raw
          $badCalls = [regex]::Matches($source, 'std::(?:min|max)\(')
          if ($badCalls.Count -ne 0) {
            throw "R2 validation found naked std::min/std::max calls that can collide with Windows macros."
          }
          foreach ($marker in @(
            'return (std::max)(1, baseDimension >> level);',
            'const size_t copyBytes = (std::min)(srcRowBytes, bytes.size() - srcOffset);',
            'g_qd3d12MipMaxLevels = (std::max)(g_qd3d12MipMaxLevels, mipCount);'
          )) {
            if (-not $source.Contains($marker)) { throw "Missing R2 marker: $marker" }
          }
          Write-Host 'MIP_EXP5_R2 MSVC min/max macro-safety validation passed.'

      - name: Validate mipmap Experiment 5 source markers
        shell: pwsh
        working-directory: work
        run: ./scripts/validate-d3d12-mipmap-exp5.ps1

      - name: Build mipmap Experiment 5 runtime
        shell: pwsh
        working-directory: work
        run: ./scripts/build-windows-stable-clear-v2.2.ps1 -Configuration '${{ inputs.configuration }}'

      - name: Package DELTA only
        shell: pwsh
        working-directory: work
        run: ./scripts/package-d3d12-mipmap-exp5-delta.ps1 -Configuration '${{ inputs.configuration }}'

      - name: Show DELTA files
        shell: pwsh
        run: Get-ChildItem -Path work/delta-mipmap-exp5 -Recurse | Format-Table FullName, Length

      - name: Upload mipmap Experiment 5 DELTA
        uses: actions/upload-artifact@v4
        with:
          name: DarkWolf-D3D12-Mipmap-Exp5-R2-DELTA-${{ inputs.configuration }}
          path: work/delta-mipmap-exp5/**
          if-no-files-found: error
          retention-days: 14
