name: DarkWolf D3D12 Per-Texture Sampler A-B Experiment 8

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: Build configuration
        required: true
        default: Release
        type: choice
        options:
          - Release
          - Debug

jobs:
  build-validate-package:
    runs-on: windows-2022
    steps:
      - name: Checkout canonical Stable Clear v2.2 snapshot
        uses: actions/checkout@v4
        with:
          ref: 229cd5d93b4c24ba705c9821a871cccf31b34b96
          fetch-depth: 1
          path: work

      - name: Materialize per-texture Sampler A-B payload
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
                    $files = @(
                      [pscustomobject]@{ Path = 'patches/100-d3d12-real-mipmaps-production.patch'; Sha256 = 'A87B006B998BF78F85B5D1139B8DD7CE33F3913DF489175C0F9BC910DADA7558'; Data = '' },
                      [pscustomobject]@{ Path = 'patches/120-d3d12-per-texture-sampler-ab.patch'; Sha256 = '83C40098713A603EC6E216A1B97A64A2D6673658EA04497970AB2D00FF56F974'; Data = '' },
                      [pscustomobject]@{ Path = 'SAMPLER_AB_RUN_AND_COLLECT.ps1'; Sha256 = '32FD795DCABC8613C878640B988A1BE0C3611FF0DA042AE0B63EF9562BC5737C'; Data = '' },
                      [pscustomobject]@{ Path = 'RUN_SAMPLER_AB_BASELINE.bat'; Sha256 = 'E3A3937301664CF46B5E4098882488B30F4BF9BC4D041C9219366E81D8979234'; Data = '' },
                      [pscustomobject]@{ Path = 'RUN_SAMPLER_AB_PER_TEXTURE.bat'; Sha256 = '1F4CC84A40DA964952044E5484EF803C63379D1263CAB856247BD47D542DC44C'; Data = '' }
                    )
                    foreach ($item in $files) {
                      $target = Join-Path 'work' $item.Path
                      New-Item -ItemType Directory -Path (Split-Path -Parent $target) -Force | Out-Null
                      [IO.File]::WriteAllBytes($target, [Convert]::FromBase64String($item.Data))
                      $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $target).Hash
                      if ($actual -ne $item.Sha256) { throw "Payload hash mismatch: $($item.Path)" }
                      Write-Host "Materialized: $($item.Path)"
                    }

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Apply Stable Clear v2.2 chain
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          ./scripts/apply-dxr-clean-reference-rebase.ps1
          ./scripts/apply-dxr-stable-clear-v2.1.ps1
          ./scripts/apply-dxr-stable-clear-v2.2.ps1

      - name: Apply confirmed production mipmaps
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          git apply --check patches/100-d3d12-real-mipmaps-production.patch
          if ($LASTEXITCODE -ne 0) { throw 'Production mipmap patch check failed.' }
          git apply patches/100-d3d12-real-mipmaps-production.patch
          if ($LASTEXITCODE -ne 0) { throw 'Production mipmap patch failed.' }

      - name: Apply one-file per-texture Sampler A-B patch
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          $patch = 'patches/120-d3d12-per-texture-sampler-ab.patch'
          $headers = @(Select-String -LiteralPath $patch -Pattern '^diff --git a/(.+) b/(.+)$')
          if ($headers.Count -ne 1 -or $headers[0].Matches[0].Groups[1].Value -ne 'src/opengl/gl_d3d12shim.cpp') { throw 'Sampler A-B patch must modify only gl_d3d12shim.cpp.' }
          git apply --check $patch
          if ($LASTEXITCODE -ne 0) { throw 'Sampler patch check failed.' }
          git apply $patch
          if ($LASTEXITCODE -ne 0) { throw 'Sampler patch failed.' }
          git diff --check
          if ($LASTEXITCODE -ne 0) { throw 'git diff --check failed.' }
          git apply --check -R $patch
          if ($LASTEXITCODE -ne 0) { throw 'Sampler reverse-check failed.' }
          $shim = Get-Content -LiteralPath 'src/opengl/gl_d3d12shim.cpp' -Raw
          foreach ($marker in @('QD3D12_PER_TEXTURE_SAMPLER_MODE','D3D12_DESCRIPTOR_HEAP_TYPE_SAMPLER','textureSamplerIndex','QD3D12_EnsureTextureSampler','MapFilter(tex.minFilter, tex.magFilter)','MapAddress(tex.wrapS)','sampler_ab_runtime.log')) {
            if (-not $shim.Contains($marker)) { throw "Missing Sampler marker: $marker" }
          }

      - name: Build per-texture Sampler A-B runtime
        shell: pwsh
        working-directory: work
        run: ./scripts/build-windows-stable-clear-v2.2.ps1 -Configuration '${{ inputs.configuration }}'

      - name: Package Sampler A-B DELTA only
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          $delta = 'delta-sampler-ab'
          if (Test-Path $delta) { Remove-Item $delta -Recurse -Force }
          New-Item -ItemType Directory -Path $delta -Force | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $delta 'SOURCE_PATCH') -Force | Out-Null
          Copy-Item 'dist/WolfSP.exe' $delta -Force
          foreach ($f in @('SAMPLER_AB_RUN_AND_COLLECT.ps1','RUN_SAMPLER_AB_BASELINE.bat','RUN_SAMPLER_AB_PER_TEXTURE.bat')) { Copy-Item $f $delta -Force }
          Copy-Item 'patches/100-d3d12-real-mipmaps-production.patch' (Join-Path $delta 'SOURCE_PATCH') -Force
          Copy-Item 'patches/120-d3d12-per-texture-sampler-ab.patch' (Join-Path $delta 'SOURCE_PATCH') -Force
          @('Per-texture Sampler A/B on top of confirmed production mipmaps.','BASELINE: global 8x anisotropic + WRAP.','PER_TEXTURE: OpenGL min/mag and wrapS/wrapT mapped to dynamic D3D12 samplers.','Control scene: same torch and alpha/multistage surfaces.','Upload both result ZIP files for analysis.') | Set-Content (Join-Path $delta 'README.txt') -Encoding UTF8

      - name: Upload Sampler A-B DELTA
        uses: actions/upload-artifact@v4
        with:
          name: DarkWolf-D3D12-Per-Texture-Sampler-AB-${{ inputs.configuration }}
          path: work/delta-sampler-ab/**
          if-no-files-found: error
          retention-days: 14
