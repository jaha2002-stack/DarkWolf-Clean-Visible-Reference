name: DarkWolf D3D12 Polygon Offset A-B Experiment 7

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: Build configuration
        required: true
        default: Release
        type: choice
        options:
          - Release
          - Debug

jobs:
  build-validate-package:
    runs-on: windows-2022
    steps:
      - name: Checkout canonical Stable Clear v2.2 snapshot
        uses: actions/checkout@v4
        with:
          ref: 229cd5d93b4c24ba705c9821a871cccf31b34b96
          fetch-depth: 1
          path: work

      - name: Materialize Polygon Offset A-B payload
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
                    $files = @(
                      [pscustomobject]@{ Path = 'patches/100-d3d12-real-mipmaps-production.patch'; Sha256 = 'A87B006B998BF78F85B5D1139B8DD7CE33F3913DF489175C0F9BC910DADA7558'; Data = '' },
                      [pscustomobject]@{ Path = 'patches/110-d3d12-polygon-offset-ab.patch'; Sha256 = '02D59D40DEFFAEAE18D695BF830E095E94FB233E98FB58A96ABF1F54BE04CD7C'; Data = '' },
                      [pscustomobject]@{ Path = 'POLYOFFSET_AB_RUN_AND_COLLECT.ps1'; Sha256 = 'DE26FEF7BDD4FAA57045607D7E381609CBB822E9CD8A2A50E7F4634628BF6FD5'; Data = '' },
                      [pscustomobject]@{ Path = 'RUN_POLYOFFSET_AB_BASELINE.bat'; Sha256 = 'F9EA385F1AB12E6C8DA12351E057DA166F091AC1A1BA4BE0F4AA68C20F757B3A'; Data = '' },
                      [pscustomobject]@{ Path = 'RUN_POLYOFFSET_AB_FIXED.bat'; Sha256 = 'EE967CE3CDD7B67EFF1ADE00407D5C4BA020791F2264E5E7AF2048EBED1D4B3B'; Data = '' }
                    )
                    foreach ($item in $files) {
                      $target = Join-Path 'work' $item.Path
                      New-Item -ItemType Directory -Path (Split-Path -Parent $target) -Force | Out-Null
                      [IO.File]::WriteAllBytes($target, [Convert]::FromBase64String($item.Data))
                      $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $target).Hash
                      if ($actual -ne $item.Sha256) { throw "Payload hash mismatch: $($item.Path)" }
                      Write-Host "Materialized: $($item.Path)"
                    }

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Apply Stable Clear v2.2 chain
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          ./scripts/apply-dxr-clean-reference-rebase.ps1
          ./scripts/apply-dxr-stable-clear-v2.1.ps1
          ./scripts/apply-dxr-stable-clear-v2.2.ps1

      - name: Apply confirmed production mipmaps
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          git apply --check patches/100-d3d12-real-mipmaps-production.patch
          if ($LASTEXITCODE -ne 0) { throw 'Production mipmap patch check failed.' }
          git apply patches/100-d3d12-real-mipmaps-production.patch
          if ($LASTEXITCODE -ne 0) { throw 'Production mipmap patch failed.' }

      - name: Apply one-file Polygon Offset A-B patch
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          $patch = 'patches/110-d3d12-polygon-offset-ab.patch'
          $headers = @(Select-String -LiteralPath $patch -Pattern '^diff --git a/(.+) b/(.+)$')
          if ($headers.Count -ne 1 -or $headers[0].Matches[0].Groups[1].Value -ne 'src/opengl/gl_d3d12shim.cpp') { throw 'Polygon Offset A-B patch must modify only gl_d3d12shim.cpp.' }
          git apply --check $patch
          if ($LASTEXITCODE -ne 0) { throw 'Polygon Offset patch check failed.' }
          git apply $patch
          if ($LASTEXITCODE -ne 0) { throw 'Polygon Offset patch failed.' }
          git diff --check
          if ($LASTEXITCODE -ne 0) { throw 'git diff --check failed.' }
          git apply --check -R $patch
          if ($LASTEXITCODE -ne 0) { throw 'Polygon Offset reverse-check failed.' }
          $shim = Get-Content -LiteralPath 'src/opengl/gl_d3d12shim.cpp' -Raw
          foreach ($marker in @('QD3D12_POLYGON_OFFSET_MODE','GL_POLYGON_OFFSET_FILL','SlopeScaledDepthBias','DepthBias = (INT)key.polygonOffsetUnits','polygon_offset_ab.log')) {
            if (-not $shim.Contains($marker)) { throw "Missing Polygon Offset marker: $marker" }
          }

      - name: Build Polygon Offset A-B runtime
        shell: pwsh
        working-directory: work
        run: ./scripts/build-windows-stable-clear-v2.2.ps1 -Configuration '${{ inputs.configuration }}'

      - name: Package Polygon Offset DELTA only
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          $delta = 'delta-polygon-offset-ab'
          if (Test-Path $delta) { Remove-Item $delta -Recurse -Force }
          New-Item -ItemType Directory -Path $delta -Force | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $delta 'SOURCE_PATCH') -Force | Out-Null
          Copy-Item 'dist/WolfSP.exe' $delta -Force
          foreach ($f in @('POLYOFFSET_AB_RUN_AND_COLLECT.ps1','RUN_POLYOFFSET_AB_BASELINE.bat','RUN_POLYOFFSET_AB_FIXED.bat')) { Copy-Item $f $delta -Force }
          Copy-Item 'patches/100-d3d12-real-mipmaps-production.patch' (Join-Path $delta 'SOURCE_PATCH') -Force
          Copy-Item 'patches/110-d3d12-polygon-offset-ab.patch' (Join-Path $delta 'SOURCE_PATCH') -Force
          @('Polygon Offset A/B on top of confirmed production mipmaps.','BASELINE: QD3D12_POLYGON_OFFSET_MODE=0','FIXED: QD3D12_POLYGON_OFFSET_MODE=1','Control scene: blood decal on floor.','Upload both result ZIP files for analysis.') | Set-Content (Join-Path $delta 'README.txt') -Encoding UTF8

      - name: Upload Polygon Offset A-B DELTA
        uses: actions/upload-artifact@v4
        with:
          name: DarkWolf-D3D12-Polygon-Offset-AB-${{ inputs.configuration }}
          path: work/delta-polygon-offset-ab/**
          if-no-files-found: error
          retention-days: 14
