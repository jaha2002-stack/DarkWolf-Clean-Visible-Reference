name: DarkWolf DXR Stable Clear v2.2 - Clean Pinned Build

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: Build configuration
        required: true
        default: Release
        type: choice
        options:
          - Release
          - Debug

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout canonical Stable Clear v2.2 snapshot
        uses: actions/checkout@v4
        with:
          ref: 229cd5d93b4c24ba705c9821a871cccf31b34b96
          fetch-depth: 1

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Apply proven Clean Visible Reference patch
        shell: pwsh
        run: ./scripts/apply-dxr-clean-reference-rebase.ps1

      - name: Apply Stable Clear v2.1 foundation
        shell: pwsh
        run: ./scripts/apply-dxr-stable-clear-v2.1.ps1

      - name: Apply Stable Clear v2.2 visual correctness patch
        shell: pwsh
        run: ./scripts/apply-dxr-stable-clear-v2.2.ps1

      - name: Build and package clean Stable Clear v2.2
        shell: pwsh
        run: ./scripts/build-windows-stable-clear-v2.2.ps1 -Configuration '${{ inputs.configuration }}'

      - name: Show packaged files
        shell: pwsh
        run: Get-ChildItem -Path dist -Recurse | Format-Table FullName, Length

      - name: Upload clean Stable Clear v2.2 runtime
        uses: actions/upload-artifact@v4
        with:
          name: DarkWolf-DXR-Stable-Clear-v2.2-CLEAN-${{ inputs.configuration }}
          path: dist/**
          if-no-files-found: error
