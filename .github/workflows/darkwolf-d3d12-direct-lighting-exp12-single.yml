name: DarkWolf D3D12 Direct Lighting Component Isolation Experiment 12

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: Build configuration
        required: true
        default: Release
        type: choice
        options:
          - Release
          - Debug

jobs:
  build-validate-package:
    runs-on: windows-2022
    steps:
      - name: Checkout canonical Stable Clear v2.2 snapshot
        uses: actions/checkout@v4
        with:
          ref: 229cd5d93b4c24ba705c9821a871cccf31b34b96
          fetch-depth: 1
          path: work

      - name: Materialize Experiment 12 payload
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $files = @(
            [pscustomobject]@{ Path = 'patches/100-d3d12-real-mipmaps-production.patch'; Sha256 = 'A87B006B998BF78F85B5D1139B8DD7CE33F3913DF489175C0F9BC910DADA7558'; Data = '' },
            [pscustomobject]@{ Path = 'patches/110-d3d12-polygon-offset-ab.patch'; Sha256 = '02D59D40DEFFAEAE18D695BF830E095E94FB233E98FB58A96ABF1F54BE04CD7C'; Data = '' },
            [pscustomobject]@{ Path = 'patches/160-d3d12-direct-lighting-isolation-exp12.patch'; Sha256 = 'B376CEEA20165AB7A8B4B202675F1F51055DC193AA4B232F80FC0DDCB1291E7D'; Data = '' },
            [pscustomobject]@{ Path = 'DXR_DIRECT_LIGHTING_EXP12_RUN_AND_COLLECT.ps1'; Sha256 = '62101C6C022855A9ABC8C1C9281FC7261BEAE8DC77F4DB9637EB4ED6F7E029AA'; Data = '' },
            [pscustomobject]@{ Path = 'RUN_DXR_DIRECT_LIGHTING_EXP12.bat'; Sha256 = '814806F286D6ED999BC94209A99DF481FCC4AD994811039961113B373AE8D284'; Data = '' },
            [pscustomobject]@{ Path = 'main/dxr_direct_lighting_exp12.cfg'; Sha256 = '347D9977D6B77D9E7F63B7DB0878382C81FB2B4C2EE4A44E51CDCF91FB501E30'; Data = '' }
          )
          foreach ($file in $files) {
            $target = Join-Path 'work' $file.Path
            $parent = Split-Path -Parent $target
            if ($parent) { New-Item -ItemType Directory -Path $parent -Force | Out-Null }
            [IO.File]::WriteAllBytes($target, [Convert]::FromBase64String($file.Data))
            $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $target).Hash
            if ($actual -ne $file.Sha256) {
              throw "Payload hash mismatch for $($file.Path): expected $($file.Sha256), got $actual"
            }
            Write-Host "Materialized $($file.Path) SHA256=$actual"
          }

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Apply Stable Clear v2.2 chain
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          ./scripts/apply-dxr-clean-reference-rebase.ps1
          ./scripts/apply-dxr-stable-clear-v2.1.ps1
          ./scripts/apply-dxr-stable-clear-v2.2.ps1

      - name: Apply confirmed Real Mipmaps production fix
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          $patch = 'patches/100-d3d12-real-mipmaps-production.patch'
          git apply --check $patch
          if ($LASTEXITCODE -ne 0) { throw 'Production mipmap patch check failed.' }
          git apply $patch
          if ($LASTEXITCODE -ne 0) { throw 'Production mipmap patch failed.' }

      - name: Apply confirmed Polygon Offset implementation
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          $patch = 'patches/110-d3d12-polygon-offset-ab.patch'
          git apply --check $patch
          if ($LASTEXITCODE -ne 0) { throw 'Polygon Offset patch check failed.' }
          git apply $patch
          if ($LASTEXITCODE -ne 0) { throw 'Polygon Offset patch failed.' }

      - name: Apply narrow Direct Lighting Experiment 12
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          $patch = 'patches/160-d3d12-direct-lighting-isolation-exp12.patch'
          $headers = @(Select-String -LiteralPath $patch -Pattern '^diff --git a/(.+) b/(.+)$')
          $changed = @($headers | ForEach-Object { $_.Matches[0].Groups[1].Value } | Sort-Object -Unique)
          if ($changed.Count -ne 1 -or $changed[0] -ne 'src/opengl/gl_d3d12raylight.cpp') {
            throw "Unexpected Experiment 12 patch scope: $($changed -join ', ')"
          }
          git apply --check $patch
          if ($LASTEXITCODE -ne 0) { throw 'Experiment 12 patch check failed.' }
          git apply $patch
          if ($LASTEXITCODE -ne 0) { throw 'Experiment 12 patch failed.' }
          git diff --check
          if ($LASTEXITCODE -ne 0) { throw 'git diff --check failed.' }
          git apply --check -R $patch
          if ($LASTEXITCODE -ne 0) { throw 'Experiment 12 reverse-check failed.' }

          $source = Get-Content -LiteralPath 'src/opengl/gl_d3d12raylight.cpp' -Raw
          foreach ($marker in @(
            'glRaytracingExp12ModeName',
            'DXR_DIRECT_EXP12 mode=',
            'exp12MapDiffuseOnly',
            'exp12FallbackDiffuseOnly',
            'exp12NoCavitySpecular',
            'exp12CavityOnly',
            'exp12SpecularOnly',
            'positionHeat',
            'depthHeat',
            'normalHeat'
          )) {
            if (-not $source.Contains($marker)) { throw "Missing Experiment 12 marker: $marker" }
          }
          Write-Host 'Experiment 12 patch scope, reversibility and markers validated.'

      - name: Validate confirmed base fixes and exclude older experiments
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          $rendererImage = Get-Content -LiteralPath 'src/renderer/tr_image.cpp' -Raw
          $shim = Get-Content -LiteralPath 'src/opengl/gl_d3d12shim.cpp' -Raw
          $raylight = Get-Content -LiteralPath 'src/opengl/gl_d3d12raylight.cpp' -Raw
          if (-not $rendererImage.Contains('image->mipmap = mipmap;')) {
            throw 'Real Mipmaps renderer-side fix is missing.'
          }
          foreach ($marker in @(
            'extraMipLevels',
            'UploadTextureMipChain',
            'g_qd3d12PolygonOffsetMode',
            'GL_POLYGON_OFFSET_FILL',
            'SlopeScaledDepthBias',
            'DepthBias = (INT)key.polygonOffsetUnits'
          )) {
            if (-not $shim.Contains($marker)) { throw "Confirmed base fix marker missing: $marker" }
          }
          foreach ($forbidden in @(
            'SHADOW_EXP10_POINT_SHADOWS_OFF',
            'AdaptivePointShadowOrigin',
            'DYNAMIC_LIGHT_EXP11 mode=',
            'DLIGHT_EXP11_DISABLED'
          )) {
            if ($raylight.Contains($forbidden) -or $shim.Contains($forbidden)) {
              throw "Older experiment marker must not be present: $forbidden"
            }
          }
          Write-Host 'Confirmed base fixes present; Experiments 10 and 11 excluded.'

      - name: Validate embedded DXR HLSL with native x64 DXC
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          $source = Get-Content -LiteralPath 'src/opengl/gl_d3d12raylight.cpp' -Raw
          $assignmentMarker = 'static const char* g_glRaytracingLightingHlsl ='
          $assignmentStart = $source.IndexOf($assignmentMarker, [StringComparison]::Ordinal)
          if ($assignmentStart -lt 0) { throw 'Could not find g_glRaytracingLightingHlsl assignment.' }

          $cursor = $assignmentStart + $assignmentMarker.Length
          $segments = [System.Collections.Generic.List[string]]::new()
          while ($true) {
            while ($cursor -lt $source.Length -and [char]::IsWhiteSpace($source[$cursor])) { $cursor++ }
            if ($cursor -ge $source.Length) { throw 'Unexpected end while parsing DXR raw strings.' }
            if ($source[$cursor] -eq ';') { $cursor++; break }
            if ($cursor + 3 -gt $source.Length -or $source.Substring($cursor, 3) -ne 'R"(') {
              $previewLength = [Math]::Min(80, $source.Length - $cursor)
              $preview = $source.Substring($cursor, $previewLength).Replace("`r", ' ').Replace("`n", ' ')
              throw "Unexpected token while parsing DXR raw strings near: $preview"
            }
            $bodyStart = $cursor + 3
            $bodyEnd = $source.IndexOf(')"', $bodyStart, [StringComparison]::Ordinal)
            if ($bodyEnd -lt 0) { throw 'Unterminated DXR raw-string segment.' }
            $segments.Add($source.Substring($bodyStart, $bodyEnd - $bodyStart))
            $cursor = $bodyEnd + 2
          }
          if ($segments.Count -lt 2) { throw 'Expected multiple MSVC-safe DXR raw-string segments.' }
          $segmentLengths = @($segments | ForEach-Object { $_.Length })
          $maxSegmentLength = ($segmentLengths | Measure-Object -Maximum).Maximum
          Write-Host "DXR raw-string segment lengths: $($segmentLengths -join ', '); maximum=$maxSegmentLength"
          if ($maxSegmentLength -gt 15000) {
            throw "Embedded DXR raw-string segment is too large for MSVC: $maxSegmentLength characters."
          }
          $shaderSource = [string]::Concat($segments)
          foreach ($marker in @(
            '[shader("raygeneration")]',
            '[shader("miss")]',
            '[shader("closesthit")]',
            'exp12MapDiffuseOnly',
            'exp12FallbackDiffuseOnly',
            'positionHeat',
            'diagnosticSpecular'
          )) {
            if (-not $shaderSource.Contains($marker)) { throw "Missing DXR HLSL marker: $marker" }
          }
          $hlsl = Join-Path $env:RUNNER_TEMP 'dxr-direct-lighting-exp12.hlsl'
          [IO.File]::WriteAllText($hlsl, $shaderSource, [Text.UTF8Encoding]::new($false))
          Write-Host "Extracted DXR HLSL: $($shaderSource.Length) characters from $($segments.Count) raw-string segments."

          $searchRoots = @(
            "$env:ProgramFiles\Windows Kits\10\bin",
            "${env:ProgramFiles(x86)}\Windows Kits\10\bin"
          ) | Where-Object { $_ -and (Test-Path -LiteralPath $_) }
          $dxc = $null
          $x64PathSegment = [IO.Path]::DirectorySeparatorChar + 'x64' + [IO.Path]::DirectorySeparatorChar
          foreach ($root in $searchRoots) {
            $candidate = Get-ChildItem -LiteralPath $root -Filter dxc.exe -File -Recurse -ErrorAction SilentlyContinue |
              Where-Object { $_.FullName.IndexOf($x64PathSegment, [StringComparison]::OrdinalIgnoreCase) -ge 0 } |
              Sort-Object FullName -Descending |
              Select-Object -First 1
            if ($candidate) { $dxc = $candidate.FullName; break }
          }
          if (-not $dxc) {
            Write-Warning 'Native x64 dxc.exe was not found; MSBuild and runtime DXC remain the final shader checks.'
            exit 0
          }
          Write-Host "Using native x64 DXC: $dxc"
          $out = Join-Path $env:RUNNER_TEMP 'dxr-direct-lighting-exp12.dxil'
          $psi = [System.Diagnostics.ProcessStartInfo]::new()
          $psi.FileName = $dxc
          $psi.UseShellExecute = $false
          $psi.RedirectStandardOutput = $true
          $psi.RedirectStandardError = $true
          $psi.Arguments = "-T lib_6_3 -Fo `"$out`" `"$hlsl`""
          $proc = [System.Diagnostics.Process]::new()
          $proc.StartInfo = $psi
          if (-not $proc.Start()) { throw 'DXC failed to start.' }
          $stdout = $proc.StandardOutput.ReadToEnd()
          $stderr = $proc.StandardError.ReadToEnd()
          $proc.WaitForExit()
          if ($stdout) { Write-Host $stdout }
          if ($stderr) { Write-Host $stderr }
          if ($proc.ExitCode -ne 0) { throw "DXC failed with exit code $($proc.ExitCode)." }
          if (-not (Test-Path -LiteralPath $out)) { throw 'DXC did not produce the DXIL library.' }

      - name: Build Direct Lighting Experiment 12 runtime
        shell: pwsh
        working-directory: work
        run: ./scripts/build-windows-stable-clear-v2.2.ps1 -Configuration '${{ inputs.configuration }}'

      - name: Package Experiment 12 DELTA only
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          $delta = 'delta-dxr-direct-lighting-exp12'
          if (Test-Path $delta) { Remove-Item $delta -Recurse -Force }
          New-Item -ItemType Directory -Path $delta -Force | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $delta 'main') -Force | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $delta 'SOURCE_PATCH') -Force | Out-Null
          if (-not (Test-Path -LiteralPath 'dist/WolfSP.exe')) { throw 'WolfSP.exe was not produced.' }
          Copy-Item 'dist/WolfSP.exe' $delta -Force
          Copy-Item 'DXR_DIRECT_LIGHTING_EXP12_RUN_AND_COLLECT.ps1' $delta -Force
          Copy-Item 'RUN_DXR_DIRECT_LIGHTING_EXP12.bat' $delta -Force
          Copy-Item 'main/dxr_direct_lighting_exp12.cfg' (Join-Path $delta 'main') -Force
          foreach ($patch in @(
            'patches/100-d3d12-real-mipmaps-production.patch',
            'patches/110-d3d12-polygon-offset-ab.patch',
            'patches/160-d3d12-direct-lighting-isolation-exp12.patch'
          )) {
            Copy-Item $patch (Join-Path $delta 'SOURCE_PATCH') -Force
          }
          @(
            'DXR Direct Lighting Component Isolation Experiment 12',
            'Base: Stable Clear v2.2 + confirmed Real Mipmaps + confirmed Polygon Offset.',
            'Experiments 10 and 11 are intentionally excluded.',
            'Experiment scope: src/opengl/gl_d3d12raylight.cpp only.',
            'Run RUN_DXR_DIRECT_LIGHTING_EXP12.bat.',
            'Find the exact camera angle where the torch stripes are visible and keep the camera completely still.',
            'Press F6 through F12 with a 2-3 second pause, then optionally press 1 and 2.',
            'This is the final narrow diagnostic before moving on to planned graphics improvements.'
          ) | Set-Content (Join-Path $delta 'README.txt') -Encoding UTF8
          Get-FileHash -Algorithm SHA256 -LiteralPath (Join-Path $delta 'WolfSP.exe') |
            Format-List | Out-String | Set-Content (Join-Path $delta 'WOLFSP_SHA256.txt') -Encoding UTF8

      - name: Show DELTA files
        shell: pwsh
        run: Get-ChildItem -Path work/delta-dxr-direct-lighting-exp12 -Recurse | Format-Table FullName, Length

      - name: Upload Experiment 12 DELTA
        uses: actions/upload-artifact@v4
        with:
          name: DarkWolf-D3D12-Direct-Lighting-Exp12-${{ inputs.configuration }}
          path: work/delta-dxr-direct-lighting-exp12/**
          if-no-files-found: error
          retention-days: 14
