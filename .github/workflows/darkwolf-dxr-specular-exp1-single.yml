name: DarkWolf DXR Specular Experiment 1 - Single File

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: Build configuration
        required: true
        default: Release
        type: choice
        options:
          - Release
          - Debug

jobs:
  build-and-validate:
    runs-on: windows-2022
    steps:
      - name: Checkout canonical Stable Clear v2.2 snapshot
        uses: actions/checkout@v4
        with:
          ref: 229cd5d93b4c24ba705c9821a871cccf31b34b96
          fetch-depth: 1
          path: work

      - name: Materialize isolated Experiment 1 files
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $files = @(
            [pscustomobject]@{ Path = 'patches/40-dxr-specular-normalization-exp1.patch'; Sha256 = 'DC46906FB974EB1C1A2FEF23998CCEEFF5545BE38F4FAAFE1ED79DF81486A479'; Data = '' }
            [pscustomobject]@{ Path = 'scripts/apply-dxr-specular-normalization-exp1.ps1'; Sha256 = 'A1FB354E829D7045C22E39B53C2D88FD192A127E025E616035282DCB333D7405'; Data = '' }
            [pscustomobject]@{ Path = 'scripts/validate-dxr-specular-exp1.ps1'; Sha256 = 'C19AC48898416426FAD2B0B7BF014050691B3FCB4806BFEA8BD5A71965A43424'; Data = '' }
            [pscustomobject]@{ Path = 'scripts/package-dxr-specular-exp1-delta.ps1'; Sha256 = '7117E0AAE7FD666A19B270CA5AE5C833983BE20861CE2255E059F184CF3B4F9D'; Data = '' }
            [pscustomobject]@{ Path = 'main/dxr_specular_exp1_baseline.cfg'; Sha256 = 'C9B5875028E9F333F47BFD4B399A941E6FA689AE43D67B8D6A033BD2B1E41325'; Data = '' }
            [pscustomobject]@{ Path = 'main/dxr_specular_exp1_normalized.cfg'; Sha256 = '175B150C0A49019AE3E1D22FE36A3C8FB28B40CA77995911F60CF018040BCA9F'; Data = '' }
            [pscustomobject]@{ Path = 'main/dxr_specular_exp1_ab.cfg'; Sha256 = 'A5A72900B167FD2D30EAB8D59E7F9F130076D5CB17A15211272950406E438541'; Data = '' }
          )
          foreach ($item in $files) {
            $target = Join-Path 'work' $item.Path
            New-Item -ItemType Directory -Path (Split-Path -Parent $target) -Force | Out-Null
            [IO.File]::WriteAllBytes($target, [Convert]::FromBase64String($item.Data))
            $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $target).Hash
            if ($actual -ne $item.Sha256) { throw "Payload hash mismatch: $($item.Path)" }
            Write-Host "Materialized: $($item.Path)"
          }

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Apply Stable Clear v2.2 chain
        shell: pwsh
        working-directory: work
        run: |
          ./scripts/apply-dxr-clean-reference-rebase.ps1
          ./scripts/apply-dxr-stable-clear-v2.1.ps1
          ./scripts/apply-dxr-stable-clear-v2.2.ps1

      - name: Apply isolated specular experiment
        shell: pwsh
        working-directory: work
        run: ./scripts/apply-dxr-specular-normalization-exp1.ps1

      - name: Validate embedded HLSL with bundled DXC
        shell: pwsh
        working-directory: work
        run: ./scripts/validate-dxr-specular-exp1.ps1

      - name: Build experiment runtime
        shell: pwsh
        working-directory: work
        run: ./scripts/build-windows-stable-clear-v2.2.ps1 -Configuration '${{ inputs.configuration }}'

      - name: Package DELTA only
        shell: pwsh
        working-directory: work
        run: ./scripts/package-dxr-specular-exp1-delta.ps1 -Configuration '${{ inputs.configuration }}'

      - name: Show DELTA files
        shell: pwsh
        run: Get-ChildItem -Path work/delta-specular-exp1 -Recurse | Format-Table FullName, Length

      - name: Upload Specular Experiment 1 DELTA
        uses: actions/upload-artifact@v4
        with:
          name: DarkWolf-DXR-Specular-Exp1-DELTA-${{ inputs.configuration }}
          path: work/delta-specular-exp1/**
          if-no-files-found: error
