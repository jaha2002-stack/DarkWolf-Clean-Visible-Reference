      - name: Apply Bloom Visual Lab 18.1 final-scene patch
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          $patch = 'patches/261-d3d12-final-scene-bloom-exp18_1.patch'
