name: DarkWolf Bloom Visual Lab 18.1 - final scene after transparent effects

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: Build configuration
        required: true
        default: Release
        type: choice
        options:
          - Release
          - Debug

jobs:
  build-validate-package:
    runs-on: windows-2022
    steps:
      - name: Checkout canonical Stable Clear v2.2 snapshot
        uses: actions/checkout@v4
        with:
          ref: 229cd5d93b4c24ba705c9821a871cccf31b34b96
          fetch-depth: 1
          path: work

      - name: Materialize production through Experiment 18 payloads
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $target = Join-Path 'work' 'patches/200-d3d12-graphics-artifact-fix-v1-production.patch'
          New-Item -ItemType Directory -Path (Split-Path -Parent $target) -Force | Out-Null
          [IO.File]::WriteAllBytes($target, [Convert]::FromBase64String(''))
          $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $target).Hash
          if ($actual -ne '989C7943969B7A2C222FF93598195275383AFD217FCFCE1EDAC5D4E2A4231CBF') { throw 'Payload hash mismatch: patches/200-d3d12-graphics-artifact-fix-v1-production.patch' }
          Write-Host 'Materialized: patches/200-d3d12-graphics-artifact-fix-v1-production.patch'

          $target = Join-Path 'work' 'patches/220-d3d12-dynamic-light-quality-exp14.patch'
          New-Item -ItemType Directory -Path (Split-Path -Parent $target) -Force | Out-Null
          [IO.File]::WriteAllBytes($target, [Convert]::FromBase64String(''))
          $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $target).Hash
          if ($actual -ne 'E0A642AEE913B14B7F0313AD7F549D2C2C33923E8B65133E6336BF2E7C849FA9') { throw 'Payload hash mismatch: patches/220-d3d12-dynamic-light-quality-exp14.patch' }
          Write-Host 'Materialized: patches/220-d3d12-dynamic-light-quality-exp14.patch'

          $target = Join-Path 'work' 'patches/230-d3d12-atmospheric-fog-exp15.patch'
          New-Item -ItemType Directory -Path (Split-Path -Parent $target) -Force | Out-Null
          [IO.File]::WriteAllBytes($target, [Convert]::FromBase64String(''))
          $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $target).Hash
          if ($actual -ne '87FC96D63AB1A431902ADEDFFA6137B056BE7CA5048E7847DF775263F7F72EE0') { throw 'Payload hash mismatch: patches/230-d3d12-atmospheric-fog-exp15.patch' }
          Write-Host 'Materialized: patches/230-d3d12-atmospheric-fog-exp15.patch'

          $target = Join-Path 'work' 'patches/231-d3d12-atmospheric-fog-refinement-15_1.patch'
          New-Item -ItemType Directory -Path (Split-Path -Parent $target) -Force | Out-Null
          [IO.File]::WriteAllBytes($target, [Convert]::FromBase64String(''))
          $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $target).Hash
          if ($actual -ne '4976FBEA86AF39713F990376D7F1DDE70F0DB1073926F98C2FC8DA0FA39A9A49') { throw 'Payload hash mismatch: patches/231-d3d12-atmospheric-fog-refinement-15_1.patch' }
          Write-Host 'Materialized: patches/231-d3d12-atmospheric-fog-refinement-15_1.patch'

          $target = Join-Path 'work' 'patches/240-d3d12-material-aware-specular-roughness-exp16.patch'
          New-Item -ItemType Directory -Path (Split-Path -Parent $target) -Force | Out-Null
          [IO.File]::WriteAllBytes($target, [Convert]::FromBase64String(''))
          $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $target).Hash
          if ($actual -ne 'D1A2C6B1A0A5F9AC7C309368C01C80969AEEAC7FE797CB9C777D92D8624EA230') { throw 'Payload hash mismatch: patches/240-d3d12-material-aware-specular-roughness-exp16.patch' }
          Write-Host 'Materialized: patches/240-d3d12-material-aware-specular-roughness-exp16.patch'

          $target = Join-Path 'work' 'patches/241-d3d12-msvc-hlsl-runtime-join-exp16-r2.patch'
          New-Item -ItemType Directory -Path (Split-Path -Parent $target) -Force | Out-Null
          [IO.File]::WriteAllBytes($target, [Convert]::FromBase64String(''))
          $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $target).Hash
          if ($actual -ne '4012DE97CF83F29EE1F15DA622BB18A31922EB7A4887D9051A174C9632276FAF') { throw 'Payload hash mismatch: patches/241-d3d12-msvc-hlsl-runtime-join-exp16-r2.patch' }
          Write-Host 'Materialized: patches/241-d3d12-msvc-hlsl-runtime-join-exp16-r2.patch'

          $target = Join-Path 'work' 'patches/242-d3d12-renderer-material-api-declarations-exp16-r3.patch'
          New-Item -ItemType Directory -Path (Split-Path -Parent $target) -Force | Out-Null
          [IO.File]::WriteAllBytes($target, [Convert]::FromBase64String(''))
          $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $target).Hash
          if ($actual -ne '095C36E1D4C58E6FD98B538E220C4B0DC735067D0939C2543982D33A9141FAE7') { throw 'Payload hash mismatch: patches/242-d3d12-renderer-material-api-declarations-exp16-r3.patch' }
          Write-Host 'Materialized: patches/242-d3d12-renderer-material-api-declarations-exp16-r3.patch'

          $target = Join-Path 'work' 'material_specular_exp16.cfg'
          New-Item -ItemType Directory -Path (Split-Path -Parent $target) -Force | Out-Null
          [IO.File]::WriteAllBytes($target, [Convert]::FromBase64String(''))
          $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $target).Hash
          if ($actual -ne 'FF99A15128ABEFA238ECBE3AB1126A4738957AD7F24ED9A6743C58C77620E09B') { throw 'Payload hash mismatch: material_specular_exp16.cfg' }
          Write-Host 'Materialized: material_specular_exp16.cfg'

          $target = Join-Path 'work' 'RUN_MATERIAL_SPECULAR_ROUGHNESS_EXP16.bat'
          New-Item -ItemType Directory -Path (Split-Path -Parent $target) -Force | Out-Null
          [IO.File]::WriteAllBytes($target, [Convert]::FromBase64String(''))
          $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $target).Hash
          if ($actual -ne '7E5DB6BFB25B77B346C6E26004AAFA9457F345AB20A02A195A39E9F730385BE8') { throw 'Payload hash mismatch: RUN_MATERIAL_SPECULAR_ROUGHNESS_EXP16.bat' }
          Write-Host 'Materialized: RUN_MATERIAL_SPECULAR_ROUGHNESS_EXP16.bat'

          $target = Join-Path 'work' 'MATERIAL_SPECULAR_EXP16_RUN_AND_COLLECT.ps1'
          New-Item -ItemType Directory -Path (Split-Path -Parent $target) -Force | Out-Null
          [IO.File]::WriteAllBytes($target, [Convert]::FromBase64String(''))
          $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $target).Hash
          if ($actual -ne '9D5723F3977DAF24F7B013FF05C408DAA4F3B6705302A234D3C7B1CED2BE082A') { throw 'Payload hash mismatch: MATERIAL_SPECULAR_EXP16_RUN_AND_COLLECT.ps1' }
          Write-Host 'Materialized: MATERIAL_SPECULAR_EXP16_RUN_AND_COLLECT.ps1'

          $target = Join-Path 'work' 'patches/250-d3d12-hdr-like-tonemapping-exp17.patch'
          New-Item -ItemType Directory -Path (Split-Path -Parent $target) -Force | Out-Null
          [IO.File]::WriteAllBytes($target, [Convert]::FromBase64String(''))
          $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $target).Hash
          if ($actual -ne '91F93E729EAF8C6062287E78CCBDAA88F667D6EE680F322DB79D60C59BB3001F') { throw 'Payload hash mismatch: 250-d3d12-hdr-like-tonemapping-exp17.patch' }
          Write-Host 'Materialized: 250-d3d12-hdr-like-tonemapping-exp17.patch'

          $target = Join-Path 'work' 'hdr_tonemapping_exp17.cfg'
          New-Item -ItemType Directory -Path (Split-Path -Parent $target) -Force | Out-Null
          [IO.File]::WriteAllBytes($target, [Convert]::FromBase64String(''))
          $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $target).Hash
          if ($actual -ne '0E48B4981956305CDD82E762AF9D80E4A84B2844560046399B7C0A8699952185') { throw 'Payload hash mismatch: hdr_tonemapping_exp17.cfg' }
          Write-Host 'Materialized: hdr_tonemapping_exp17.cfg'

          $target = Join-Path 'work' 'RUN_HDR_TONEMAPPING_EXP17.bat'
          New-Item -ItemType Directory -Path (Split-Path -Parent $target) -Force | Out-Null
          [IO.File]::WriteAllBytes($target, [Convert]::FromBase64String(''))
          $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $target).Hash
          if ($actual -ne '89CE05727380ED30E615CF3C531D77F3C08885E0E57D455C58E73674EE8C17F2') { throw 'Payload hash mismatch: RUN_HDR_TONEMAPPING_EXP17.bat' }
          Write-Host 'Materialized: RUN_HDR_TONEMAPPING_EXP17.bat'

          $target = Join-Path 'work' 'HDR_TONEMAP_EXP17_RUN_AND_COLLECT.ps1'
          New-Item -ItemType Directory -Path (Split-Path -Parent $target) -Force | Out-Null
          [IO.File]::WriteAllBytes($target, [Convert]::FromBase64String(''))
          $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $target).Hash
          if ($actual -ne 'AD365481B768E1C1E01FA4C33BC6A614AD717F72145EC8156549EE0515F8A076') { throw 'Payload hash mismatch: HDR_TONEMAP_EXP17_RUN_AND_COLLECT.ps1' }
          Write-Host 'Materialized: HDR_TONEMAP_EXP17_RUN_AND_COLLECT.ps1'

          $target = Join-Path 'work' 'patches/260-d3d12-bloom-visual-lab-exp18.patch'
          New-Item -ItemType Directory -Path (Split-Path -Parent $target) -Force | Out-Null
          [IO.File]::WriteAllBytes($target, [Convert]::FromBase64String(''))
          $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $target).Hash
          if ($actual -ne '1DB3248B9F3DE91A74FF7F215ED6EBF2025783BF8B14AACA9D580048683B86BC') { throw 'Payload hash mismatch: 260-d3d12-bloom-visual-lab-exp18.patch' }
          Write-Host 'Materialized: 260-d3d12-bloom-visual-lab-exp18.patch'

          $target = Join-Path 'work' 'bloom_exp18.cfg'
          New-Item -ItemType Directory -Path (Split-Path -Parent $target) -Force | Out-Null
          [IO.File]::WriteAllBytes($target, [Convert]::FromBase64String(''))
          $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $target).Hash
          if ($actual -ne 'C52B9EC5B37A429431F735D64D42DEDDD49A286D1C6DDD523EB0F30E93D63CE3') { throw 'Payload hash mismatch: bloom_exp18.cfg' }
          Write-Host 'Materialized: bloom_exp18.cfg'

          $target = Join-Path 'work' 'RUN_BLOOM_EXP18.bat'
          New-Item -ItemType Directory -Path (Split-Path -Parent $target) -Force | Out-Null
          [IO.File]::WriteAllBytes($target, [Convert]::FromBase64String(''))
          $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $target).Hash
          if ($actual -ne 'F406536E97078F093EAE44227F0A2A34E1C13A10370931D4A77550970504C79B') { throw 'Payload hash mismatch: RUN_BLOOM_EXP18.bat' }
          Write-Host 'Materialized: RUN_BLOOM_EXP18.bat'

          $target = Join-Path 'work' 'BLOOM_EXP18_RUN_AND_COLLECT.ps1'
          New-Item -ItemType Directory -Path (Split-Path -Parent $target) -Force | Out-Null
          [IO.File]::WriteAllBytes($target, [Convert]::FromBase64String(''))
          $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $target).Hash
          if ($actual -ne '19560CD9B3D06DD2D3F1D803C1B23DAC837B25EFE755010E29DB07109E950E49') { throw 'Payload hash mismatch: BLOOM_EXP18_RUN_AND_COLLECT.ps1' }
          Write-Host 'Materialized: BLOOM_EXP18_RUN_AND_COLLECT.ps1'


      - name: Materialize Bloom 18.1 final-scene payloads
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $target = Join-Path 'work' 'patches/261-d3d12-final-scene-bloom-exp18_1.patch'
          New-Item -ItemType Directory -Path (Split-Path -Parent $target) -Force | Out-Null
          [IO.File]::WriteAllBytes($target, [Convert]::FromBase64String(''))
          $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $target).Hash
          if ($actual -ne '96E12A2E95BE0C09C2B1B79ED538B3586BE5B7BFB3EBFB57CB95EF401768C833') { throw 'Payload hash mismatch: 261-d3d12-final-scene-bloom-exp18_1.patch' }
          Write-Host 'Materialized: 261-d3d12-final-scene-bloom-exp18_1.patch'

          $target = Join-Path 'work' 'bloom_exp18_1.cfg'
          # root payload
          [IO.File]::WriteAllBytes($target, [Convert]::FromBase64String(''))
          $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $target).Hash
          if ($actual -ne 'D6D0BB962CE45DE7B1E78D7B0E828F55F7B70FA2BADCD8D297C7CE373AE081D1') { throw 'Payload hash mismatch: bloom_exp18_1.cfg' }
          Write-Host 'Materialized: bloom_exp18_1.cfg'

          $target = Join-Path 'work' 'RUN_BLOOM_EXP18_1.bat'
          # root payload
          [IO.File]::WriteAllBytes($target, [Convert]::FromBase64String(''))
          $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $target).Hash
          if ($actual -ne 'F42BBA15F5BAB700D9A02330DAACC84B38D19839F1824B29F8A767E5EF33711D') { throw 'Payload hash mismatch: RUN_BLOOM_EXP18_1.bat' }
          Write-Host 'Materialized: RUN_BLOOM_EXP18_1.bat'

          $target = Join-Path 'work' 'BLOOM_EXP18_1_RUN_AND_COLLECT.ps1'
          # root payload
          [IO.File]::WriteAllBytes($target, [Convert]::FromBase64String(''))
          $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $target).Hash
          if ($actual -ne '7CE512544B001CE92B12E0696B81C7B46D7F90CC19BBB018773338BC8839E439') { throw 'Payload hash mismatch: BLOOM_EXP18_1_RUN_AND_COLLECT.ps1' }
          Write-Host 'Materialized: BLOOM_EXP18_1_RUN_AND_COLLECT.ps1'

      - name: Validate Bloom 18.1 collector PowerShell syntax
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          $tokens = $null
          $parseErrors = $null
          [void][System.Management.Automation.Language.Parser]::ParseFile(
            (Join-Path (Get-Location) 'BLOOM_EXP18_1_RUN_AND_COLLECT.ps1'),
            [ref]$tokens,
            [ref]$parseErrors
          )
          if ($parseErrors.Count -gt 0) {
            $parseErrors | ForEach-Object { Write-Error $_.Message }
            throw "BLOOM_EXP18_1_RUN_AND_COLLECT.ps1 contains $($parseErrors.Count) PowerShell parse error(s)."
          }
          Write-Host 'Bloom 18.1 collector PowerShell syntax: PASSED'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Apply Stable Clear v2.2 chain
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          ./scripts/apply-dxr-clean-reference-rebase.ps1
          ./scripts/apply-dxr-stable-clear-v2.1.ps1
          ./scripts/apply-dxr-stable-clear-v2.2.ps1

      - name: Apply approved production patches through Fog 15.1
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          $patches = @(
            'patches/200-d3d12-graphics-artifact-fix-v1-production.patch',
            'patches/220-d3d12-dynamic-light-quality-exp14.patch',
            'patches/230-d3d12-atmospheric-fog-exp15.patch',
            'patches/231-d3d12-atmospheric-fog-refinement-15_1.patch'
          )
          foreach ($patch in $patches) {
            Write-Host "Applying $patch"
            git apply --check $patch
            if ($LASTEXITCODE -ne 0) { throw "Patch does not apply: $patch" }
            git apply $patch
            if ($LASTEXITCODE -ne 0) { throw "Patch application failed: $patch" }
            git diff --check
            if ($LASTEXITCODE -ne 0) { throw "git diff --check failed after $patch" }
          }

          $ray = Get-Content -LiteralPath 'src/opengl/gl_d3d12raylight.cpp' -Raw
          $shim = Get-Content -LiteralPath 'src/opengl/gl_d3d12shim.cpp' -Raw
          foreach ($marker in @(
            'DynamicLightPointFalloff',
            'ApplyDXRAtmosphere',
            'gAtmosphereControls',
            'ComputeWorldLowFog',
            'extraMipLevels',
            'polygonOffsetFill'
          )) {
            if (-not ($ray.Contains($marker) -or $shim.Contains($marker))) {
              throw "Approved production marker missing: $marker"
            }
          }

      - name: Apply Material-Aware Specular Roughness Experiment 16
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          $patch = 'patches/240-d3d12-material-aware-specular-roughness-exp16.patch'
          $expected = @(
            'src/opengl/gl_d3d12raylight.cpp',
            'src/opengl/gl_d3d12shim.cpp',
            'src/opengl/opengl.h',
            'src/renderer/tr_backend.cpp',
            'src/renderer/tr_init.cpp',
            'src/renderer/tr_local.h'
          ) | Sort-Object
          $headers = @(Select-String -LiteralPath $patch -Pattern '^diff --git a/(.+) b/(.+)$')
          $actual = @($headers | ForEach-Object { $_.Matches[0].Groups[1].Value } | Sort-Object)
          if ($headers.Count -ne 6 -or (($actual -join '|') -ne ($expected -join '|'))) {
            throw "Experiment 16 patch scope mismatch: $($actual -join ', ')"
          }

          git apply --check $patch
          if ($LASTEXITCODE -ne 0) { throw 'Experiment 16 patch does not apply.' }
          git apply $patch
          if ($LASTEXITCODE -ne 0) { throw 'Experiment 16 patch application failed.' }
          git diff --check
          if ($LASTEXITCODE -ne 0) { throw 'Experiment 16 git diff --check failed.' }
          git apply --check -R $patch
          if ($LASTEXITCODE -ne 0) { throw 'Experiment 16 reverse-check failed.' }

          $ray = Get-Content -LiteralPath 'src/opengl/gl_d3d12raylight.cpp' -Raw
          $shim = Get-Content -LiteralPath 'src/opengl/gl_d3d12shim.cpp' -Raw
          $backend = Get-Content -LiteralPath 'src/renderer/tr_backend.cpp' -Raw
          $init = Get-Content -LiteralPath 'src/renderer/tr_init.cpp' -Raw
          $local = Get-Content -LiteralPath 'src/renderer/tr_local.h' -Raw
          $header = Get-Content -LiteralPath 'src/opengl/opengl.h' -Raw
          foreach ($marker in @(
            'gMaterialSpecularMode',
            'ComputeMaterialGGXSpecular',
            'ComputeRoughnessOnlyGGXSpecular',
            'DXR_MATERIAL_STONE',
            'DXR_MATERIAL_ORGANIC',
            'RB_DXRSelectSurfaceMaterial',
            'MATERIAL_SPECULAR_EXP16 mode=',
            'r_dxrMaterialSpecularMode',
            'glRaytracingLightingSetMaterialSpecularMode',
            'material id into the fractional part',
            'static_assert(sizeof(glRaytracingLightingConstants_t) == 336'
          )) {
            if (-not ($ray.Contains($marker) -or $shim.Contains($marker) -or $backend.Contains($marker) -or $init.Contains($marker) -or $local.Contains($marker) -or $header.Contains($marker))) {
              throw "Missing Experiment 16 marker: $marker"
            }
          }
          foreach ($forbidden in @(
            'TEMPORAL_EXP13',
            'SHADOW_SELF_INTERSECTION_EXP10',
            'DYNAMIC_LIGHT_PROJECTION_EXP11',
            'DXR_DIRECT_EXP12'
          )) {
            if ($ray.Contains($forbidden) -or $backend.Contains($forbidden)) {
              throw "Rejected experiment leaked into build: $forbidden"
            }
          }

      - name: Apply MSVC-safe HLSL runtime join fix R2
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          $patch = 'patches/241-d3d12-msvc-hlsl-runtime-join-exp16-r2.patch'
          $headers = @(Select-String -LiteralPath $patch -Pattern '^\+\+\+ b/(.+)$')
          $targets = @($headers | ForEach-Object { $_.Matches[0].Groups[1].Value } | Sort-Object -Unique)
          if ($targets.Count -ne 1 -or $targets[0] -ne 'src/opengl/gl_d3d12raylight.cpp') {
            throw "R2 patch scope mismatch: $($targets -join ', ')"
          }

          git apply --check $patch
          if ($LASTEXITCODE -ne 0) { throw 'R2 HLSL runtime-join patch does not apply.' }
          git apply $patch
          if ($LASTEXITCODE -ne 0) { throw 'R2 HLSL runtime-join patch application failed.' }
          git diff --check
          if ($LASTEXITCODE -ne 0) { throw 'R2 git diff --check failed.' }
          git apply --check -R $patch
          if ($LASTEXITCODE -ne 0) { throw 'R2 reverse-check failed.' }

          $ray = Get-Content -LiteralPath 'src/opengl/gl_d3d12raylight.cpp' -Raw
          foreach ($marker in @(
            '#include <string>',
            'g_glRaytracingLightingHlslPart0',
            'g_glRaytracingLightingHlslPart5',
            'glRaytracingLightingBuildHlsl',
            'hlslSource.c_str()'
          )) {
            if (-not $ray.Contains($marker)) { throw "Missing R2 marker: $marker" }
          }
          if ($ray.Contains('static const char* g_glRaytracingLightingHlsl =')) {
            throw 'Compile-time concatenated DXR HLSL string is still present.'
          }

      - name: Apply renderer material API declarations fix R3
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          $patch = 'patches/242-d3d12-renderer-material-api-declarations-exp16-r3.patch'
          $headers = @(Select-String -LiteralPath $patch -Pattern '^\+\+\+ b/(.+)$')
          $targets = @($headers | ForEach-Object { $_.Matches[0].Groups[1].Value } | Sort-Object -Unique)
          if ($targets.Count -ne 1 -or $targets[0] -ne 'src/opengl/opengl.h') {
            throw "R3 patch scope mismatch: $($targets -join ', ')"
          }

          git apply --check $patch
          if ($LASTEXITCODE -ne 0) { throw 'R3 renderer API declaration patch does not apply.' }
          git apply $patch
          if ($LASTEXITCODE -ne 0) { throw 'R3 renderer API declaration patch application failed.' }
          git diff --check
          if ($LASTEXITCODE -ne 0) { throw 'R3 git diff --check failed.' }
          git apply --check -R $patch
          if ($LASTEXITCODE -ne 0) { throw 'R3 reverse-check failed.' }

          $header = Get-Content -LiteralPath 'src/opengl/opengl.h' -Raw
          $shim = Get-Content -LiteralPath 'src/opengl/gl_d3d12shim.cpp' -Raw
          foreach ($declaration in @(
            'void APIENTRY glSurfaceRoughnessf(GLfloat roughness);',
            'void APIENTRY glMaterialTypef(GLfloat materialType);'
          )) {
            if (-not $header.Contains($declaration)) {
              throw "Missing renderer-visible declaration: $declaration"
            }
          }
          foreach ($definition in @(
            'void APIENTRY glSurfaceRoughnessf(GLfloat roughness)',
            'void APIENTRY glMaterialTypef(GLfloat materialType)'
          )) {
            if (-not $shim.Contains($definition)) {
              throw "Missing D3D12 shim definition: $definition"
            }
          }

      - name: Apply HDR-Like Lighting Tone Mapping Experiment 17
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          $patch = 'patches/250-d3d12-hdr-like-tonemapping-exp17.patch'
          $expected = @(
            'src/opengl/gl_d3d12raylight.cpp',
            'src/opengl/opengl.h',
            'src/renderer/tr_backend.cpp',
            'src/renderer/tr_init.cpp',
            'src/renderer/tr_local.h'
          ) | Sort-Object
          $headers = @(Select-String -LiteralPath $patch -Pattern '^diff --git a/(.+) b/(.+)$')
          $actual = @($headers | ForEach-Object { $_.Matches[0].Groups[1].Value } | Sort-Object)
          if ($headers.Count -ne 5 -or (($actual -join '|') -ne ($expected -join '|'))) {
            throw "Experiment 17 patch scope mismatch: $($actual -join ', ')"
          }

          git apply --check $patch
          if ($LASTEXITCODE -ne 0) { throw 'Experiment 17 patch does not apply.' }
          git apply $patch
          if ($LASTEXITCODE -ne 0) { throw 'Experiment 17 patch application failed.' }
          git diff --check
          if ($LASTEXITCODE -ne 0) { throw 'Experiment 17 git diff --check failed.' }
