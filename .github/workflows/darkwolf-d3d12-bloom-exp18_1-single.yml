          }
          foreach ($marker in @('Texture2D<float4> gInput', 'float3 ExtractBloom', 'float4 PSBright', 'float4 PSBlur')) {
            if (-not $hlslBody.Contains($marker)) { throw "Missing final Bloom HLSL marker: $marker" }
          }

