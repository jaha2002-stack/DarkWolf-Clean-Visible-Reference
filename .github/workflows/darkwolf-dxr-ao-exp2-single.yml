name: DarkWolf DXR AO Experiment 2 - Single File

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: Build configuration
        required: true
        default: Release
        type: choice
        options:
          - Release
          - Debug

jobs:
  build-and-validate:
    runs-on: windows-2022
    steps:
      - name: Checkout canonical Stable Clear v2.2 snapshot
        uses: actions/checkout@v4
        with:
          ref: 229cd5d93b4c24ba705c9821a871cccf31b34b96
          fetch-depth: 1
          path: work

      - name: Materialize isolated AO Experiment 2 files
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $files = @(
            [pscustomobject]@{ Path = 'patches/50-dxr-ao-deterministic-exp2.patch'; Sha256 = '7AD07878091419A502789EBBD98A214C990FDCA39F770517EE2B9E9A8488A52C'; Data = '' }
            [pscustomobject]@{ Path = 'scripts/apply-dxr-ao-exp2.ps1'; Sha256 = '4C6FD4404BA0BF33612BC547E1D0201F34175664728D80B883E76B002CF118E8'; Data = '' }
            [pscustomobject]@{ Path = 'scripts/validate-dxr-ao-exp2.ps1'; Sha256 = '363F10F650465B2C692D3D2472A4CEED05C3B74674F2E7D2E6B80E3E2A029CCA'; Data = '' }
            [pscustomobject]@{ Path = 'scripts/package-dxr-ao-exp2-delta.ps1'; Sha256 = '68DF7598D002B3D8BC42ABAB6EB20BFFE55FDBDA05340FB266D9DB08CE85BF13'; Data = '' }
            [pscustomobject]@{ Path = 'main/dxr_ao_exp2_ab.cfg'; Sha256 = 'D9C1EE89B60E0E43BD7AFAB5E1A46F5679EAE0CDF30D2C838B326DD9D7928314'; Data = '' }
            [pscustomobject]@{ Path = 'main/dxr_ao_exp2_baseline.cfg'; Sha256 = '735E14AE102139DCB29F1348C2D5B0F37B3F529A23E0760D7D2D26DFCB6AE575'; Data = '' }
            [pscustomobject]@{ Path = 'main/dxr_ao_exp2_off.cfg'; Sha256 = 'F4733D78FA77EE1442D5CF56C1D172E047114F70CEEF82A8D75B09299BA23FFC'; Data = '' }
            [pscustomobject]@{ Path = 'main/dxr_ao_exp2_stable.cfg'; Sha256 = '6F97C351042025475FC4DD8B6BCB5D572EB957DC1F366994A8469F4869B8F6E4'; Data = '' }
          )
          foreach ($item in $files) {
            $target = Join-Path 'work' $item.Path
            New-Item -ItemType Directory -Path (Split-Path -Parent $target) -Force | Out-Null
            [IO.File]::WriteAllBytes($target, [Convert]::FromBase64String($item.Data))
            $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $target).Hash
            if ($actual -ne $item.Sha256) { throw "Payload hash mismatch: $($item.Path)" }
            Write-Host "Materialized: $($item.Path)"
          }

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Apply Stable Clear v2.2 chain
        shell: pwsh
        working-directory: work
        run: |
          ./scripts/apply-dxr-clean-reference-rebase.ps1
          ./scripts/apply-dxr-stable-clear-v2.1.ps1
          ./scripts/apply-dxr-stable-clear-v2.2.ps1

      - name: Apply isolated deterministic AO experiment
        shell: pwsh
        working-directory: work
        run: ./scripts/apply-dxr-ao-exp2.ps1

      - name: Validate embedded HLSL with DXC
        shell: pwsh
        working-directory: work
        run: ./scripts/validate-dxr-ao-exp2.ps1

      - name: Build AO experiment runtime
        shell: pwsh
        working-directory: work
        run: ./scripts/build-windows-stable-clear-v2.2.ps1 -Configuration '${{ inputs.configuration }}'

      - name: Package DELTA only
        shell: pwsh
        working-directory: work
        run: ./scripts/package-dxr-ao-exp2-delta.ps1 -Configuration '${{ inputs.configuration }}'

      - name: Show DELTA files
        shell: pwsh
        run: Get-ChildItem -Path work/delta-ao-exp2 -Recurse | Format-Table FullName, Length

      - name: Upload AO Experiment 2 DELTA
        uses: actions/upload-artifact@v4
        with:
          name: DarkWolf-DXR-AO-Exp2-DELTA-${{ inputs.configuration }}
          path: work/delta-ao-exp2/**
          if-no-files-found: error
          retention-days: 14
