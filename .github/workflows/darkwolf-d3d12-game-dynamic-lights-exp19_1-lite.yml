name: DarkWolf Game Dynamic Lights Experiment 19.1 Lite

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: Build configuration
        required: true
        default: Release
        type: choice
        options:
          - Release
          - Debug

permissions:
  contents: read

concurrency:
  group: darkwolf-exp19-1-lite-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-validate-package:
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: Checkout workflow support files
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Checkout canonical Stable Clear v2.2 snapshot
        uses: actions/checkout@v4
        with:
          ref: 229cd5d93b4c24ba705c9821a871cccf31b34b96
          fetch-depth: 1
          path: work

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build and package Experiment 19.1
        shell: pwsh
        run: >-
          ./ci/exp19_1/build-exp19_1.ps1
          -Configuration '${{ inputs.configuration }}'
          -WorkDir 'work'

      - name: Upload compact Experiment 19.1 test overlay
        uses: actions/upload-artifact@v4
        with:
          name: DarkWolf-D3D12-Game-Dynamic-Lights-Exp19.1-Lite-${{ inputs.configuration }}
          path: work/release-game-dynamic-lights-exp19_1-compact/**
          if-no-files-found: error
          retention-days: 30
