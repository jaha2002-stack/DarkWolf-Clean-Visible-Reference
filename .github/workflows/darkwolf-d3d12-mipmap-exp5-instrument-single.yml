name: DarkWolf D3D12 Mipmap Experiment 5 Instrumentation

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: Build configuration
        required: true
        default: Release
        type: choice
        options:
          - Release
          - Debug

jobs:
  build-instrument-package:
    runs-on: windows-2022
    steps:
      - name: Checkout canonical Stable Clear v2.2 snapshot
        uses: actions/checkout@v4
        with:
          ref: 229cd5d93b4c24ba705c9821a871cccf31b34b96
          fetch-depth: 1
          path: work

      - name: Materialize mipmap R2 and instrumentation files
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $files = @(
            [pscustomobject]@{ Path = 'patches/80-d3d12-real-mipmaps-exp5-r2.patch'; Sha256 = '00804AC6D63776E8FA50570553C93FBF7A8D1EDD7775CD3FE0F9DB21FF482584'; Data = '' },
            [pscustomobject]@{ Path = 'patches/81-d3d12-mipmap-exp5-instrument.patch'; Sha256 = '8D48CEED458516E9CD13AB69C4EBB4B0F6ACD1B9A0BCCD7A0BDED0897390485B'; Data = '' },
            [pscustomobject]@{ Path = 'main/dxr_mipmap_exp5_instrument.cfg'; Sha256 = '2C37440957C4D6929A93A9403C1A326FBC3B3AA5673AAF8AA0EDD67BE37239C0'; Data = '' },
            [pscustomobject]@{ Path = 'RUN_MIP_EXP5_INSTRUMENT_BASELINE.bat'; Sha256 = '7D41420731FC22D65D9BE7FD9324E109454CB6B477BC292DE88F57C940F08641'; Data = '' },
            [pscustomobject]@{ Path = 'RUN_MIP_EXP5_INSTRUMENT_REAL_MIPS.bat'; Sha256 = 'B00CDA97B290BB635B02FD4B644628EFF77FF7AB5A4EED330A33F1730E6CBB4E'; Data = '' },
            [pscustomobject]@{ Path = 'MIP_EXP5_INSTRUMENT_RUN_AND_COLLECT.ps1'; Sha256 = 'EB596334EA95DDE028CB247C74FF3AA07A5B450F8CB934F4857B247C08FE5467'; Data = '' },
            [pscustomobject]@{ Path = 'README_MIP_EXP5_INSTRUMENT_RU.txt'; Sha256 = 'C011174C8D566F67B5200325B8F3E392BC80E776C51EBD756D1680F5FF836B22'; Data = '' }
          )
          $root = Join-Path $PWD 'work'
          foreach ($item in $files) {
            $target = Join-Path $root $item.Path
            $parent = Split-Path -Parent $target
            if ($parent) { New-Item -ItemType Directory -Path $parent -Force | Out-Null }
            [IO.File]::WriteAllBytes($target, [Convert]::FromBase64String($item.Data))
            $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $target).Hash
            if ($actual -ne $item.Sha256) { throw "Payload hash mismatch: $($item.Path)" }
            Write-Host "Materialized: $($item.Path)"
          }

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Apply Stable Clear v2.2 chain
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          ./scripts/apply-dxr-clean-reference-rebase.ps1
          ./scripts/apply-dxr-stable-clear-v2.1.ps1
          ./scripts/apply-dxr-stable-clear-v2.2.ps1

      - name: Apply real-mipmap R2 source patch
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          $patch = 'patches/80-d3d12-real-mipmaps-exp5-r2.patch'
          $headers = @(Select-String -LiteralPath $patch -Pattern '^diff --git a/(.+) b/(.+)$')
          if ($headers.Count -ne 1 -or $headers[0].Line -ne 'diff --git a/src/opengl/gl_d3d12shim.cpp b/src/opengl/gl_d3d12shim.cpp') { throw 'Patch 80 must modify only gl_d3d12shim.cpp.' }
          git apply --check $patch
          if ($LASTEXITCODE -ne 0) { throw 'Patch 80 does not apply cleanly.' }
          git apply $patch
          if ($LASTEXITCODE -ne 0) { throw 'Patch 80 application failed.' }
          git apply --check -R $patch
          if ($LASTEXITCODE -ne 0) { throw 'Patch 80 reverse check failed.' }

      - name: Apply minimal instrumentation patch
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          $patch = 'patches/81-d3d12-mipmap-exp5-instrument.patch'
          $headers = @(Select-String -LiteralPath $patch -Pattern '^diff --git a/(.+) b/(.+)$')
          if ($headers.Count -ne 1 -or $headers[0].Line -ne 'diff --git a/src/opengl/gl_d3d12shim.cpp b/src/opengl/gl_d3d12shim.cpp') { throw 'Patch 81 must modify only gl_d3d12shim.cpp.' }
          git apply --check $patch
          if ($LASTEXITCODE -ne 0) { throw 'Patch 81 does not apply cleanly after patch 80.' }
          git apply $patch
          if ($LASTEXITCODE -ne 0) { throw 'Patch 81 application failed.' }
          git diff --check
          if ($LASTEXITCODE -ne 0) { throw 'git diff --check failed.' }
          git apply --check -R $patch
          if ($LASTEXITCODE -ne 0) { throw 'Patch 81 reverse check failed.' }

      - name: Validate instrumentation source markers
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          $source = Get-Content -LiteralPath 'src/opengl/gl_d3d12shim.cpp' -Raw
          foreach ($marker in @(
            'MIP_EXP5_INSTRUMENT revision=1',
            'GL_TEXIMAGE2D call=',
            'GL_COMPRESSED_TEXIMAGE2D call=',
            'extraVector=%llu extraDefined=%u',
            'RESOURCE_CREATE_REQUEST',
            'RESOURCE_CREATED',
            'SRV_WRITE',
            'UPLOAD_DISPATCH',
            'UploadTextureMipChain',
            'UploadTextureLegacy',
            'GetModuleFileNameA(nullptr, modulePath',
            'mipmap_exp5_instrument.log'
          )) {
            if (-not $source.Contains($marker)) { throw "Missing instrumentation marker: $marker" }
          }
          $badCalls = [regex]::Matches($source, 'std::(?:min|max)\(')
          if ($badCalls.Count -ne 0) { throw 'Naked std::min/std::max call detected; Windows macro collision risk.' }
          Write-Host 'Instrumentation markers and MSVC macro safety validated.'

      - name: Build instrumented runtime
        shell: pwsh
        working-directory: work
        run: ./scripts/build-windows-stable-clear-v2.2.ps1 -Configuration '${{ inputs.configuration }}'

      - name: Package instrumented DELTA only
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          $delta = Join-Path $PWD 'delta-mip-exp5-instrument'
          if (Test-Path -LiteralPath $delta) { Remove-Item -LiteralPath $delta -Recurse -Force }
          New-Item -ItemType Directory -Path $delta -Force | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $delta 'main') -Force | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $delta 'SOURCE_PATCH') -Force | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $delta 'SOURCE_FILES\src\opengl') -Force | Out-Null
          $exe = Join-Path $PWD 'dist\WolfSP.exe'
          if (!(Test-Path -LiteralPath $exe)) { throw "Built WolfSP.exe missing: $exe" }
          Copy-Item -LiteralPath $exe -Destination $delta -Force
          foreach ($file in @(
            'RUN_MIP_EXP5_INSTRUMENT_BASELINE.bat',
            'RUN_MIP_EXP5_INSTRUMENT_REAL_MIPS.bat',
            'MIP_EXP5_INSTRUMENT_RUN_AND_COLLECT.ps1',
            'README_MIP_EXP5_INSTRUMENT_RU.txt'
          )) { Copy-Item -LiteralPath (Join-Path $PWD $file) -Destination $delta -Force }
          Copy-Item -LiteralPath (Join-Path $PWD 'main\dxr_mipmap_exp5_instrument.cfg') -Destination (Join-Path $delta 'main') -Force
          Copy-Item -LiteralPath (Join-Path $PWD 'patches\80-d3d12-real-mipmaps-exp5-r2.patch') -Destination (Join-Path $delta 'SOURCE_PATCH') -Force
          Copy-Item -LiteralPath (Join-Path $PWD 'patches\81-d3d12-mipmap-exp5-instrument.patch') -Destination (Join-Path $delta 'SOURCE_PATCH') -Force
          Copy-Item -LiteralPath (Join-Path $PWD 'src\opengl\gl_d3d12shim.cpp') -Destination (Join-Path $delta 'SOURCE_FILES\src\opengl') -Force
          $manifest = @(
            'DarkWolf D3D12 Mipmap Experiment 5 Instrumentation',
            'CanonicalBase=229cd5d93b4c24ba705c9821a871cccf31b34b96',
            'PatchChain=10 -> 20 -> 30 -> 80 R2 -> 81 instrumentation',
            'ChangedSourceFile=src/opengl/gl_d3d12shim.cpp',
            'PrimaryRuntimeLog=mipmap_exp5_instrument.log beside WolfSP.exe',
            'VisualAlgorithm=unchanged from Mipmap Exp5 R2'
          )
          Set-Content -LiteralPath (Join-Path $delta 'MANIFEST.txt') -Value $manifest -Encoding UTF8
          Get-ChildItem -LiteralPath $delta -File -Recurse | Sort-Object FullName | ForEach-Object { $hash=(Get-FileHash -Algorithm SHA256 -LiteralPath $_.FullName).Hash; Add-Content -LiteralPath (Join-Path $delta 'MANIFEST_SHA256.txt') -Value "$hash  $($_.FullName.Substring($delta.Length + 1))" }
          Write-Host "Instrumented DELTA prepared: $delta"

      - name: Show DELTA files
        shell: pwsh
        run: Get-ChildItem -Path work/delta-mip-exp5-instrument -Recurse | Format-Table FullName, Length

      - name: Upload instrumented DELTA
        uses: actions/upload-artifact@v4
        with:
          name: DarkWolf-D3D12-Mipmap-Exp5-Instrument-DELTA-${{ inputs.configuration }}
          path: work/delta-mip-exp5-instrument/**
          if-no-files-found: error
          retention-days: 14
