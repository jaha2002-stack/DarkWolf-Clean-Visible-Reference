name: DarkWolf D3D12 Shadow Self-Intersection A-B Experiment 10 R3 - MSVC string literal split

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: Build configuration
        required: true
        default: Release
        type: choice
        options:
          - Release
          - Debug

jobs:
  build-validate-package:
    runs-on: windows-2022
    steps:
      - name: Checkout canonical Stable Clear v2.2 snapshot
        uses: actions/checkout@v4
        with:
          ref: 229cd5d93b4c24ba705c9821a871cccf31b34b96
          fetch-depth: 1
          path: work

      - name: Materialize Experiment 10 payload
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $files = @(
            [pscustomobject]@{ Path = 'patches/100-d3d12-real-mipmaps-production.patch'; Sha256 = 'A87B006B998BF78F85B5D1139B8DD7CE33F3913DF489175C0F9BC910DADA7558'; Data = '' },
            [pscustomobject]@{ Path = 'patches/110-d3d12-polygon-offset-ab.patch'; Sha256 = '02D59D40DEFFAEAE18D695BF830E095E94FB233E98FB58A96ABF1F54BE04CD7C'; Data = '' },
            [pscustomobject]@{ Path = 'patches/140-d3d12-shadow-self-intersection-exp10.patch'; Sha256 = '994A9ACB40F79DFEBDE508224E0BA19364B15E3150FE0C756C09D6A94D934437'; Data = '' },
            [pscustomobject]@{ Path = 'SHADOW_SELF_INTERSECTION_EXP10_RUN_AND_COLLECT.ps1'; Sha256 = '291B093E716EC86340E5CF9EED7D4BB34B0248874DA804E4F4202F2ACBAD6509'; Data = '' },
            [pscustomobject]@{ Path = 'RUN_SHADOW_SELF_INTERSECTION_EXP10.bat'; Sha256 = 'C056BFC5BAC424501684C31139B9F351FA6F5AF8E67F49D1986960807B69B83C'; Data = '' },
            [pscustomobject]@{ Path = 'main/shadow_self_intersection_exp10.cfg'; Sha256 = 'C16D8A5EB3B66D177FBB5F69A934AC5574D07A359B87CAE32210B7D600ADFB77'; Data = '' }
          )
          foreach ($item in $files) {
            $target = Join-Path 'work' $item.Path
            New-Item -ItemType Directory -Path (Split-Path -Parent $target) -Force | Out-Null
            [IO.File]::WriteAllBytes($target, [Convert]::FromBase64String($item.Data))
            $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $target).Hash
            if ($actual -ne $item.Sha256) { throw "Payload hash mismatch: $($item.Path)" }
            Write-Host "Materialized: $($item.Path)"
          }

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Apply Stable Clear v2.2 chain
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          ./scripts/apply-dxr-clean-reference-rebase.ps1
          ./scripts/apply-dxr-stable-clear-v2.1.ps1
          ./scripts/apply-dxr-stable-clear-v2.2.ps1

      - name: Apply confirmed Real Mipmaps production fix
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          $patch = 'patches/100-d3d12-real-mipmaps-production.patch'
          git apply --check $patch
          if ($LASTEXITCODE -ne 0) { throw 'Production mipmap patch check failed.' }
          git apply $patch
          if ($LASTEXITCODE -ne 0) { throw 'Production mipmap patch failed.' }

      - name: Apply confirmed Polygon Offset implementation
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          $patch = 'patches/110-d3d12-polygon-offset-ab.patch'
          git apply --check $patch
          if ($LASTEXITCODE -ne 0) { throw 'Polygon Offset patch check failed.' }
          git apply $patch
          if ($LASTEXITCODE -ne 0) { throw 'Polygon Offset patch failed.' }

      - name: Apply one-file Shadow Self-Intersection experiment
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          $patch = 'patches/140-d3d12-shadow-self-intersection-exp10.patch'
          $headers = @(Select-String -LiteralPath $patch -Pattern '^diff --git a/(.+) b/(.+)$')
          if ($headers.Count -ne 1) { throw 'Experiment 10 patch must contain exactly one file diff.' }
          $changed = $headers[0].Matches[0].Groups[1].Value
          if ($changed -ne 'src/opengl/gl_d3d12raylight.cpp') { throw "Unexpected Experiment 10 file: $changed" }
          git apply --check $patch
          if ($LASTEXITCODE -ne 0) { throw 'Experiment 10 patch check failed.' }
          git apply $patch
          if ($LASTEXITCODE -ne 0) { throw 'Experiment 10 patch failed.' }
          git diff --check
          if ($LASTEXITCODE -ne 0) { throw 'git diff --check failed.' }
          git apply --check -R $patch
          if ($LASTEXITCODE -ne 0) { throw 'Experiment 10 reverse-check failed.' }

          $source = Get-Content -LiteralPath 'src/opengl/gl_d3d12raylight.cpp' -Raw
          foreach ($marker in @(
            'SHADOW_EXP10_POINT_SHADOWS_OFF',
            'TraceShadowCullFront',
            'TraceShadowCullBack',
            'TraceShadowNoCull',
            'RobustOffsetRayOrigin',
            'AdaptivePointShadowOrigin',
            'SHADOW_SELF_INTERSECTION_EXP10'
          )) {
            if (-not $source.Contains($marker)) { throw "Missing Experiment 10 marker: $marker" }
          }
          Write-Host 'Experiment 10 patch scope and markers validated.'

      - name: Validate embedded DXR HLSL with native x64 DXC
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          $source = Get-Content -LiteralPath 'src/opengl/gl_d3d12raylight.cpp' -Raw
          $assignmentMarker = 'static const char* g_glRaytracingLightingHlsl ='
          $assignmentStart = $source.IndexOf($assignmentMarker, [StringComparison]::Ordinal)
          if ($assignmentStart -lt 0) { throw 'Could not find g_glRaytracingLightingHlsl assignment.' }

          # The embedded DXR library is split across several adjacent C++ raw-string
          # literals: R"(... )" R"(... )". Parse and concatenate every segment
          # instead of stopping at the first )", which would leave C++ tokens in HLSL.
          $cursor = $assignmentStart + $assignmentMarker.Length
          $segments = [System.Collections.Generic.List[string]]::new()
          while ($true) {
            while ($cursor -lt $source.Length -and [char]::IsWhiteSpace($source[$cursor])) { $cursor++ }
            if ($cursor -ge $source.Length) { throw 'Unexpected end while parsing DXR raw strings.' }

            if ($source[$cursor] -eq ';') {
              $cursor++
              break
            }

            if ($cursor + 3 -gt $source.Length -or $source.Substring($cursor, 3) -ne 'R"(') {
              $previewLength = [Math]::Min(80, $source.Length - $cursor)
              $preview = $source.Substring($cursor, $previewLength).Replace("`r", ' ').Replace("`n", ' ')
              throw "Unexpected token while parsing DXR raw strings near: $preview"
            }

            $bodyStart = $cursor + 3
            $bodyEnd = $source.IndexOf(')"', $bodyStart, [StringComparison]::Ordinal)
            if ($bodyEnd -lt 0) { throw 'Unterminated DXR raw-string segment.' }
            $segments.Add($source.Substring($bodyStart, $bodyEnd - $bodyStart))
            $cursor = $bodyEnd + 2
          }

          if ($segments.Count -lt 1) { throw 'No DXR HLSL raw-string segments were extracted.' }

          # MSVC C2026 guard: keep every individual C++ string literal below
          # the compiler limit. Adjacent raw strings are concatenated by C++.
          $segmentLengths = @($segments | ForEach-Object { $_.Length })
          $maxSegmentLength = ($segmentLengths | Measure-Object -Maximum).Maximum
          Write-Host "DXR raw-string segment lengths: $($segmentLengths -join ', '); maximum=$maxSegmentLength"
          if ($maxSegmentLength -gt 15000) {
            throw "Embedded DXR raw-string segment is too large for MSVC: $maxSegmentLength characters."
          }

          $shaderSource = [string]::Concat($segments)
          if ([string]::IsNullOrWhiteSpace($shaderSource)) { throw 'Extracted DXR HLSL is empty.' }
          foreach ($marker in @(
            '[shader("raygeneration")]',
            '[shader("miss")]',
            '[shader("closesthit")]',
            'AdaptivePointShadowOrigin',
            'TraceShadowNoCull'
          )) {
            if (-not $shaderSource.Contains($marker)) { throw "Missing DXR HLSL marker: $marker" }
          }
          $hlsl = Join-Path $env:RUNNER_TEMP 'shadow-self-intersection-exp10.hlsl'
          [IO.File]::WriteAllText($hlsl, $shaderSource, [Text.UTF8Encoding]::new($false))
          Write-Host "Extracted DXR HLSL: $($shaderSource.Length) characters from $($segments.Count) raw-string segments."

          $searchRoots = @(
            "$env:ProgramFiles\Windows Kits\10\bin",
            "${env:ProgramFiles(x86)}\Windows Kits\10\bin"
          ) | Where-Object { $_ -and (Test-Path -LiteralPath $_) }
          $dxc = $null
          $x64PathSegment = [IO.Path]::DirectorySeparatorChar + 'x64' + [IO.Path]::DirectorySeparatorChar
          foreach ($root in $searchRoots) {
            $candidate = Get-ChildItem -LiteralPath $root -Filter dxc.exe -File -Recurse -ErrorAction SilentlyContinue |
              Where-Object { $_.FullName.IndexOf($x64PathSegment, [StringComparison]::OrdinalIgnoreCase) -ge 0 } |
              Sort-Object FullName -Descending |
              Select-Object -First 1
            if ($candidate) { $dxc = $candidate.FullName; break }
          }

          if (-not $dxc) {
            Write-Warning 'Native x64 dxc.exe was not found; MSBuild and runtime DXC remain the final shader checks.'
            exit 0
          }

          Write-Host "Using native x64 DXC: $dxc"
          $out = Join-Path $env:RUNNER_TEMP 'shadow-self-intersection-exp10.dxil'
          $psi = [System.Diagnostics.ProcessStartInfo]::new()
          $psi.FileName = $dxc
          $psi.UseShellExecute = $false
          $psi.RedirectStandardOutput = $true
          $psi.RedirectStandardError = $true
          $psi.Arguments = "-T lib_6_3 -Fo `"$out`" `"$hlsl`""
          $proc = [System.Diagnostics.Process]::new()
          $proc.StartInfo = $psi
          if (-not $proc.Start()) { throw 'DXC failed to start.' }
          $stdout = $proc.StandardOutput.ReadToEnd()
          $stderr = $proc.StandardError.ReadToEnd()
          $proc.WaitForExit()
          if ($stdout) { Write-Host $stdout }
          if ($stderr) { Write-Host $stderr }
          if ($proc.ExitCode -ne 0) { throw "DXC failed with exit code $($proc.ExitCode)." }
          if (-not (Test-Path -LiteralPath $out)) { throw 'DXC did not produce the DXIL library.' }

      - name: Build Shadow Self-Intersection Experiment 10 runtime
        shell: pwsh
        working-directory: work
        run: ./scripts/build-windows-stable-clear-v2.2.ps1 -Configuration '${{ inputs.configuration }}'

      - name: Package Experiment 10 DELTA only
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          $delta = 'delta-shadow-self-intersection-exp10'
          if (Test-Path $delta) { Remove-Item $delta -Recurse -Force }
          New-Item -ItemType Directory -Path $delta -Force | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $delta 'main') -Force | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $delta 'SOURCE_PATCH') -Force | Out-Null
          Copy-Item 'dist/WolfSP.exe' $delta -Force
          Copy-Item 'SHADOW_SELF_INTERSECTION_EXP10_RUN_AND_COLLECT.ps1' $delta -Force
          Copy-Item 'RUN_SHADOW_SELF_INTERSECTION_EXP10.bat' $delta -Force
          Copy-Item 'main/shadow_self_intersection_exp10.cfg' (Join-Path $delta 'main') -Force
          foreach ($patch in @(
            'patches/100-d3d12-real-mipmaps-production.patch',
            'patches/110-d3d12-polygon-offset-ab.patch',
            'patches/140-d3d12-shadow-self-intersection-exp10.patch'
          )) { Copy-Item $patch (Join-Path $delta 'SOURCE_PATCH') -Force }
          @(
            'Shadow Self-Intersection A/B Experiment 10 R3',
            'Confirmed base fixes active: real mipmaps and Polygon Offset fixed mode.',
            'Only src/opengl/gl_d3d12raylight.cpp is changed by the experiment patch.',
            'R3 splits the embedded HLSL into MSVC-safe adjacent raw-string literals.',
            'Run RUN_SHADOW_SELF_INTERSECTION_EXP10.bat.',
            'Use F6 through F12 in one unchanged scene and pause 2-3 seconds after each key.',
            'F7 is the decisive point-shadow-off control.',
            'Do not overwrite another experimental WolfSP.exe with this build.'
          ) | Set-Content (Join-Path $delta 'README.txt') -Encoding UTF8

      - name: Show DELTA files
        shell: pwsh
        run: Get-ChildItem -Path work/delta-shadow-self-intersection-exp10 -Recurse | Format-Table FullName, Length

      - name: Upload Experiment 10 DELTA
        uses: actions/upload-artifact@v4
        with:
          name: DarkWolf-D3D12-Shadow-Self-Intersection-Exp10-R3-${{ inputs.configuration }}
          path: work/delta-shadow-self-intersection-exp10/**
          if-no-files-found: error
          retention-days: 14
