name: DarkWolf DXR Rect-light Sampling Experiment 3

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: Build configuration
        required: true
        default: Release
        type: choice
        options:
          - Release
          - Debug

jobs:
  build-validate-package:
    runs-on: windows-2022
    steps:
      - name: Checkout canonical Stable Clear v2.2 snapshot
        uses: actions/checkout@v4
        with:
          ref: 229cd5d93b4c24ba705c9821a871cccf31b34b96
          fetch-depth: 1
          path: work

      - name: Materialize isolated Rect-light Experiment 3 files
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $files = @(
            [pscustomobject]@{ Path = 'patches/60-dxr-rectlight-center-exp3.patch'; Sha256 = 'DC87DF38AE95FCB9E2DDE62289F3714EE67E5BE757863F6E7D0A6FB0F6D35B57'; Data = '' }
            [pscustomobject]@{ Path = 'scripts/validate-dxr-rectlight-exp3.ps1'; Sha256 = 'C90DC4E3347B8998F479E66EBF21A3BD66D4EAB8D2481C8A1A4CEDA2CF16BEDA'; Data = '' }
            [pscustomobject]@{ Path = 'scripts/package-dxr-rectlight-exp3-delta.ps1'; Sha256 = 'CA52CA755C85242798E7C4FD35A3A9D2ED427499E17C199108615CA086084C7A'; Data = '' }
            [pscustomobject]@{ Path = 'main/dxr_rectlight_exp3_ab.cfg'; Sha256 = '4F949432C846930921FE7AE362B1E5559AAA90F5B011CAD1E1FE9BB04031641C'; Data = '' }
            [pscustomobject]@{ Path = 'main/dxr_rectlight_exp3_baseline.cfg'; Sha256 = '958747906C8848E80CD2ED1BB26CAEB843480BDE9F2315727C273396EC631D36'; Data = '' }
            [pscustomobject]@{ Path = 'main/dxr_rectlight_exp3_center.cfg'; Sha256 = '9C056F639E64ECA8450ED5C4E4B0A471D1ECCFC6F599E82C9CFBF9552FF474A4'; Data = '' }
            [pscustomobject]@{ Path = 'main/dxr_rectlight_exp3_off.cfg'; Sha256 = '5C73A1A04A6CE0D125FE031183D2AF9886C44FAC5DDC1BB3132B63380E34F4A2'; Data = '' }
          )
          foreach ($item in $files) {
            $target = Join-Path 'work' $item.Path
            New-Item -ItemType Directory -Path (Split-Path -Parent $target) -Force | Out-Null
            [IO.File]::WriteAllBytes($target, [Convert]::FromBase64String($item.Data))
            $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $target).Hash
            if ($actual -ne $item.Sha256) { throw "Payload hash mismatch: $($item.Path)" }
            Write-Host "Materialized: $($item.Path)"
          }

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Apply Stable Clear v2.2 chain
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          ./scripts/apply-dxr-clean-reference-rebase.ps1
          ./scripts/apply-dxr-stable-clear-v2.1.ps1
          ./scripts/apply-dxr-stable-clear-v2.2.ps1

      - name: Apply isolated rect-light sampling patch
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          $patch = 'patches/60-dxr-rectlight-center-exp3.patch'
          $headers = @(Select-String -LiteralPath $patch -Pattern '^diff --git a/(.+) b/(.+)$')
          if ($headers.Count -ne 1) { throw 'Experiment patch must modify exactly one file.' }
          if ($headers[0].Line -ne 'diff --git a/src/opengl/gl_d3d12raylight.cpp b/src/opengl/gl_d3d12raylight.cpp') { throw 'Unexpected file in Experiment 3 patch.' }
          git apply --check $patch
          if ($LASTEXITCODE -ne 0) { throw 'Rect-light Experiment 3 patch does not apply cleanly.' }
          git apply $patch
          if ($LASTEXITCODE -ne 0) { throw 'Rect-light Experiment 3 patch application failed.' }
          $source = Get-Content -LiteralPath 'src/opengl/gl_d3d12raylight.cpp' -Raw
          foreach ($marker in @('rectCenterMode','rectDisabled','rectSignalAccum','gDebugMode == 9')) {
            if (!$source.Contains($marker)) { throw "Applied source lacks marker: $marker" }
          }
          git apply --check -R $patch
          if ($LASTEXITCODE -ne 0) { throw 'Reverse-check failed; patch is not cleanly reversible.' }
          Write-Host 'Rect-light Experiment 3 patch applied and reverse-check passed.'

      - name: Verify native x64 DXC validator revision
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          $validator = Get-Content -LiteralPath './scripts/validate-dxr-rectlight-exp3.ps1' -Raw
          if ($validator.Contains('*>')) { throw 'Obsolete PowerShell native redirection is present.' }
          if (!$validator.Contains('[System.Diagnostics.ProcessStartInfo]::new()')) { throw 'ProcessStartInfo DXC launcher is absent.' }
          if (!$validator.Contains('x64Candidates')) { throw 'Native x64 DXC selector is absent.' }
          Write-Host 'RECT_EXP3_WORKFLOW_REVISION=R1_NATIVE_X64_DXC_AND_FIXED_CAPTURE_20260721'

      - name: Validate embedded HLSL with native x64 DXC
        shell: pwsh
        working-directory: work
        run: ./scripts/validate-dxr-rectlight-exp3.ps1

      - name: Build Rect-light Experiment 3 runtime
        shell: pwsh
        working-directory: work
        run: ./scripts/build-windows-stable-clear-v2.2.ps1 -Configuration '${{ inputs.configuration }}'

      - name: Package DELTA only
        shell: pwsh
        working-directory: work
        run: ./scripts/package-dxr-rectlight-exp3-delta.ps1 -Configuration '${{ inputs.configuration }}'

      - name: Show DELTA files
        shell: pwsh
        run: Get-ChildItem -Path work/delta-rectlight-exp3 -Recurse | Format-Table FullName, Length

      - name: Upload Rect-light Experiment 3 DELTA
        uses: actions/upload-artifact@v4
        with:
          name: DarkWolf-DXR-RectLight-Exp3-DELTA-${{ inputs.configuration }}
          path: work/delta-rectlight-exp3/**
          if-no-files-found: error
          retention-days: 14
