name: DarkWolf D3D12 Renderer Real Mipmap A-B Experiment 6

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: Build configuration
        required: true
        default: Release
        type: choice
        options:
          - Release
          - Debug

jobs:
  build-validate-package:
    runs-on: windows-2022
    steps:
      - name: Checkout canonical Stable Clear v2.2 snapshot
        uses: actions/checkout@v4
        with:
          ref: 229cd5d93b4c24ba705c9821a871cccf31b34b96
          fetch-depth: 1
          path: work

      - name: Materialize isolated Experiment 6 payload
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $files = @(
            [pscustomobject]@{ Path = 'MIP_EXP6_RUN_AND_COLLECT.ps1'; Sha256 = '3846C75A56D1705476D0F3CD318BF5247A12FA306F33B0702384F03491B3DF26'; Data = '' },
            [pscustomobject]@{ Path = 'README_MIP_EXP6_RU.txt'; Sha256 = 'F996557C8EC6E3710007C8D6DE21AFC776DAD8A556010988F3FFF9BA6006264B'; Data = '' },
            [pscustomobject]@{ Path = 'RUN_MIP_EXP6_BASELINE.bat'; Sha256 = '525AB7E5927BE608991A1DCDD7E718CF420BB6FE97A87DA4AA54EACB8554227B'; Data = '' },
            [pscustomobject]@{ Path = 'RUN_MIP_EXP6_REAL_MIPS.bat'; Sha256 = '4657F2FAEB9DF03171B8683954FD179B6040B923B4C221803083D5F55FFD2165'; Data = '' },
            [pscustomobject]@{ Path = 'main/dxr_mipmap_exp6.cfg'; Sha256 = '08E6DA24949EDFE928A2862A6DA664768741D03242856740A6DA974BF065B1EB'; Data = '' },
            [pscustomobject]@{ Path = 'patches/90-d3d12-renderer-real-mipmaps-exp6.patch'; Sha256 = 'E4B0707614812DA645280326E7F240FC8D9A00BDA7F66DA6B0A2EC95C7C3DAF9'; Data = '' },
            [pscustomobject]@{ Path = 'scripts/package-d3d12-mipmap-exp6-delta.ps1'; Sha256 = '659737E10746ABE779AEE3512DBF040B33628F8D5E108916A5BE6B3551131E5E'; Data = '' },
            [pscustomobject]@{ Path = 'scripts/validate-d3d12-mipmap-exp6.ps1'; Sha256 = '954D898A86C387A59CECBFD0713A0E733B68A3ADA4E12F2A9E3DC5909CFFF055'; Data = '' }
          )
          foreach ($item in $files) {
            $target = Join-Path 'work' $item.Path
            New-Item -ItemType Directory -Path (Split-Path -Parent $target) -Force | Out-Null
            [IO.File]::WriteAllBytes($target, [Convert]::FromBase64String($item.Data))
            $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $target).Hash
            if ($actual -ne $item.Sha256) { throw "Payload hash mismatch: $($item.Path)" }
            Write-Host "Materialized: $($item.Path)"
          }

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Apply Stable Clear v2.2 chain
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          ./scripts/apply-dxr-clean-reference-rebase.ps1
          ./scripts/apply-dxr-stable-clear-v2.1.ps1
          ./scripts/apply-dxr-stable-clear-v2.2.ps1

      - name: Apply exact two-file mipmap Experiment 6 patch
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          $patch = 'patches/90-d3d12-renderer-real-mipmaps-exp6.patch'
          $headers = @(Select-String -LiteralPath $patch -Pattern '^diff --git a/(.+) b/(.+)$')
          $expected = @('src/opengl/gl_d3d12shim.cpp','src/renderer/tr_image.cpp') | Sort-Object
          $actual = @($headers | ForEach-Object { $_.Matches[0].Groups[1].Value } | Sort-Object)
          if ($headers.Count -ne 2 -or (($actual -join '|') -ne ($expected -join '|'))) {
            throw "Experiment 6 patch must modify exactly the two approved files. Found: $($actual -join ' , ')"
          }
          git apply --check $patch
          if ($LASTEXITCODE -ne 0) { throw 'Experiment 6 patch does not apply cleanly.' }
          git apply $patch
          if ($LASTEXITCODE -ne 0) { throw 'Experiment 6 patch application failed.' }
          git diff --check
          if ($LASTEXITCODE -ne 0) { throw 'git diff --check failed.' }
          git apply --check -R $patch
          if ($LASTEXITCODE -ne 0) { throw 'Reverse-check failed.' }
          Write-Host 'Experiment 6 patch applied; exact-two-file and reverse checks passed.'

      - name: Validate Experiment 6 source markers
        shell: pwsh
        working-directory: work
        run: ./scripts/validate-d3d12-mipmap-exp6.ps1

      - name: Build Experiment 6 runtime
        shell: pwsh
        working-directory: work
        run: ./scripts/build-windows-stable-clear-v2.2.ps1 -Configuration '${{ inputs.configuration }}'

      - name: Package DELTA only
        shell: pwsh
        working-directory: work
        run: ./scripts/package-d3d12-mipmap-exp6-delta.ps1 -Configuration '${{ inputs.configuration }}'

      - name: Show DELTA files
        shell: pwsh
        run: Get-ChildItem -Path work/delta-mipmap-exp6 -Recurse | Format-Table FullName, Length

      - name: Upload Experiment 6 DELTA
        uses: actions/upload-artifact@v4
        with:
          name: DarkWolf-D3D12-Mipmap-Exp6-DELTA-${{ inputs.configuration }}
          path: work/delta-mipmap-exp6/**
          if-no-files-found: error
          retention-days: 14
