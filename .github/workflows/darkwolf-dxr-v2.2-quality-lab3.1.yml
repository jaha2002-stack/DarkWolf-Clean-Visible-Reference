name: DarkWolf DXR v2.2 Quality Lab 3.1 Startup Safe

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: Build configuration
        required: true
        default: Release
        type: choice
        options:
          - Release
          - Debug

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout stable v2.2 repository source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Apply proven Clean Visible Reference patch
        shell: pwsh
        run: ./scripts/apply-dxr-clean-reference-rebase.ps1

      - name: Apply Stable Clear v2.1 foundation
        shell: pwsh
        run: ./scripts/apply-dxr-stable-clear-v2.1.ps1

      - name: Apply Stable Clear v2.2 visual correctness
        shell: pwsh
        run: ./scripts/apply-dxr-stable-clear-v2.2.ps1

      - name: Apply v2.2 Quality Lab 1 multi-light foundation
        shell: pwsh
        run: ./scripts/apply-dxr-v2.2-quality-lab1.ps1

      - name: Apply v2.2 Quality Lab 2 shadow authority
        shell: pwsh
        run: ./scripts/apply-dxr-v2.2-quality-lab2.ps1

      - name: Apply v2.2 Quality Lab 3 source-size and selection
        shell: pwsh
        run: ./scripts/apply-dxr-v2.2-quality-lab3.ps1

      - name: Apply v2.2 Quality Lab 3.1 startup-safe history removal
        shell: pwsh
        run: ./scripts/apply-dxr-v2.2-quality-lab3.1.ps1

      - name: Build v2.2 Quality Lab 3.1 startup-safe runtime
        shell: pwsh
        run: ./scripts/build-windows-v2.2-quality-lab3.1.ps1 -Configuration '${{ inputs.configuration }}'

      - name: Show packaged files
        shell: pwsh
        run: Get-ChildItem -Path dist -Recurse | Format-Table FullName, Length

      - name: Upload v2.2 Quality Lab 3.1 runtime artifact
        uses: actions/upload-artifact@v4
        with:
          name: DarkWolf-DXR-v2.2-Quality-Lab3.1-Startup-Safe-${{ inputs.configuration }}
          path: dist/**
          if-no-files-found: error
