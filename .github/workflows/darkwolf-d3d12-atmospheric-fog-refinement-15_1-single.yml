name: DarkWolf Atmospheric Fog Refinement 15.1

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: Build configuration
        required: true
        default: Release
        type: choice
        options:
          - Release
          - Debug

jobs:
  build-validate-package:
    runs-on: windows-2022
    steps:
      - name: Checkout canonical Stable Clear v2.2 snapshot
        uses: actions/checkout@v4
        with:
          ref: 229cd5d93b4c24ba705c9821a871cccf31b34b96
          fetch-depth: 1
          path: work

      - name: Materialize production, Dynamic Light Quality, fog and refinement payloads
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $target = Join-Path 'work' 'patches/200-d3d12-graphics-artifact-fix-v1-production.patch'
          New-Item -ItemType Directory -Path (Split-Path -Parent $target) -Force | Out-Null
          [IO.File]::WriteAllBytes($target, [Convert]::FromBase64String(''))
          $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $target).Hash
          if ($actual -ne '989C7943969B7A2C222FF93598195275383AFD217FCFCE1EDAC5D4E2A4231CBF') { throw 'Payload hash mismatch: 200-d3d12-graphics-artifact-fix-v1-production.patch' }
          Write-Host 'Materialized: 200-d3d12-graphics-artifact-fix-v1-production.patch'
          $target = Join-Path 'work' 'patches/220-d3d12-dynamic-light-quality-exp14.patch'
          New-Item -ItemType Directory -Path (Split-Path -Parent $target) -Force | Out-Null
          [IO.File]::WriteAllBytes($target, [Convert]::FromBase64String(''))
          $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $target).Hash
          if ($actual -ne 'E0A642AEE913B14B7F0313AD7F549D2C2C33923E8B65133E6336BF2E7C849FA9') { throw 'Payload hash mismatch: 220-d3d12-dynamic-light-quality-exp14.patch' }
          Write-Host 'Materialized: 220-d3d12-dynamic-light-quality-exp14.patch'
          $target = Join-Path 'work' 'patches/230-d3d12-atmospheric-fog-exp15.patch'
          New-Item -ItemType Directory -Path (Split-Path -Parent $target) -Force | Out-Null
          [IO.File]::WriteAllBytes($target, [Convert]::FromBase64String(''))
          $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $target).Hash
          if ($actual -ne '87FC96D63AB1A431902ADEDFFA6137B056BE7CA5048E7847DF775263F7F72EE0') { throw 'Payload hash mismatch: 230-d3d12-atmospheric-fog-exp15.patch' }
          Write-Host 'Materialized: 230-d3d12-atmospheric-fog-exp15.patch'
          $target = Join-Path 'work' 'patches/231-d3d12-atmospheric-fog-refinement-15_1.patch'
          [IO.File]::WriteAllBytes($target, [Convert]::FromBase64String(''))
          $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $target).Hash
          if ($actual -ne '4976FBEA86AF39713F990376D7F1DDE70F0DB1073926F98C2FC8DA0FA39A9A49') { throw 'Payload hash mismatch: 231-d3d12-atmospheric-fog-refinement-15_1.patch' }
          Write-Host 'Materialized: 231-d3d12-atmospheric-fog-refinement-15_1.patch'
          $target = Join-Path 'work' 'atmospheric_fog_exp15.cfg'
          New-Item -ItemType Directory -Path (Split-Path -Parent $target) -Force | Out-Null
          [IO.File]::WriteAllBytes($target, [Convert]::FromBase64String(''))
          $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $target).Hash
          if ($actual -ne '8D9CFC824452682CEC88E26EC82C298F44F611AFF932D9EBA8C57D7D4AEDE4E0') { throw 'Payload hash mismatch: atmospheric_fog_exp15.cfg' }
          Write-Host 'Materialized: atmospheric_fog_exp15.cfg'
          $target = Join-Path 'work' 'RUN_ATMOSPHERIC_FOG_EXP15.bat'
          New-Item -ItemType Directory -Path (Split-Path -Parent $target) -Force | Out-Null
          [IO.File]::WriteAllBytes($target, [Convert]::FromBase64String(''))
          $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $target).Hash
          if ($actual -ne '053E8553C61D48967B0A8D0E6D8594529FA0EFDCD5862E1A1497E6FF47928A62') { throw 'Payload hash mismatch: RUN_ATMOSPHERIC_FOG_EXP15.bat' }
          Write-Host 'Materialized: RUN_ATMOSPHERIC_FOG_EXP15.bat'
          $target = Join-Path 'work' 'ATMOSPHERIC_FOG_EXP15_RUN_AND_COLLECT.ps1'
          New-Item -ItemType Directory -Path (Split-Path -Parent $target) -Force | Out-Null
          [IO.File]::WriteAllBytes($target, [Convert]::FromBase64String(''))
          $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $target).Hash
          if ($actual -ne 'AC299CD08A18CC55515494956BBAE00A443D6979A54A57932EFEFA76C4E4EB17') { throw 'Payload hash mismatch: ATMOSPHERIC_FOG_EXP15_RUN_AND_COLLECT.ps1' }
          Write-Host 'Materialized: ATMOSPHERIC_FOG_EXP15_RUN_AND_COLLECT.ps1'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Apply Stable Clear v2.2 chain
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          ./scripts/apply-dxr-clean-reference-rebase.ps1
          ./scripts/apply-dxr-stable-clear-v2.1.ps1
          ./scripts/apply-dxr-stable-clear-v2.2.ps1

      - name: Apply confirmed production fixes
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          $patch = 'patches/200-d3d12-graphics-artifact-fix-v1-production.patch'
          git apply --check $patch
          if ($LASTEXITCODE -ne 0) { throw 'Graphics Artifact Fix v1 does not apply.' }
          git apply $patch
          if ($LASTEXITCODE -ne 0) { throw 'Graphics Artifact Fix v1 application failed.' }
          git diff --check
          if ($LASTEXITCODE -ne 0) { throw 'Production baseline git diff --check failed.' }

          $changed = @(git diff --name-only | Sort-Object -Unique)
          foreach ($required in @('src/opengl/gl_d3d12shim.cpp','src/renderer/tr_image.cpp')) {
            if ($changed -notcontains $required) { throw "Confirmed production source missing: $required" }
          }

      - name: Apply approved Dynamic Light Quality profiles
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          $patch = 'patches/220-d3d12-dynamic-light-quality-exp14.patch'
          $expected = @(
            'src/opengl/gl_d3d12raylight.cpp',
            'src/opengl/opengl.h',
            'src/renderer/tr_backend.cpp',
            'src/renderer/tr_init.cpp',
            'src/renderer/tr_local.h'
          ) | Sort-Object
          $headers = @(Select-String -LiteralPath $patch -Pattern '^diff --git a/(.+) b/(.+)$')
          $actual = @($headers | ForEach-Object { $_.Matches[0].Groups[1].Value } | Sort-Object)
          if ($headers.Count -ne 5 -or (($actual -join '|') -ne ($expected -join '|'))) {
            throw "Dynamic Light Quality patch scope mismatch: $($actual -join ', ')"
          }

          git apply --check $patch
          if ($LASTEXITCODE -ne 0) { throw 'Dynamic Light Quality patch does not apply.' }
          git apply $patch
          if ($LASTEXITCODE -ne 0) { throw 'Dynamic Light Quality patch application failed.' }
          git diff --check
          if ($LASTEXITCODE -ne 0) { throw 'Dynamic Light Quality git diff --check failed.' }

          $ray = Get-Content -LiteralPath 'src/opengl/gl_d3d12raylight.cpp' -Raw
          $init = Get-Content -LiteralPath 'src/renderer/tr_init.cpp' -Raw
          foreach ($marker in @('gDynamicLightQualityMode','DynamicLightPointFalloff','r_dxrDynamicLightQualityMode')) {
            if (-not ($ray.Contains($marker) -or $init.Contains($marker))) {
              throw "Missing approved Dynamic Light Quality marker: $marker"
            }
          }
          @(git diff --name-only | Sort-Object -Unique) |
            Set-Content -LiteralPath '.exp15-approved-baseline-files.txt' -Encoding ASCII

      - name: Apply Atmospheric Fog Experiment 15
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          $patch = 'patches/230-d3d12-atmospheric-fog-exp15.patch'
          $expected = @(
            'src/opengl/gl_d3d12raylight.cpp',
            'src/opengl/opengl.h',
            'src/renderer/tr_backend.cpp',
            'src/renderer/tr_init.cpp',
            'src/renderer/tr_local.h'
          ) | Sort-Object
          $headers = @(Select-String -LiteralPath $patch -Pattern '^diff --git a/(.+) b/(.+)$')
          $actual = @($headers | ForEach-Object { $_.Matches[0].Groups[1].Value } | Sort-Object)
          if ($headers.Count -ne 5 -or (($actual -join '|') -ne ($expected -join '|'))) {
            throw "Atmospheric Fog patch scope mismatch: $($actual -join ', ')"
          }

          git apply --check $patch
          if ($LASTEXITCODE -ne 0) { throw 'Atmospheric Fog Experiment 15 patch does not apply.' }
          git apply $patch
          if ($LASTEXITCODE -ne 0) { throw 'Atmospheric Fog Experiment 15 patch application failed.' }
          git diff --check
          if ($LASTEXITCODE -ne 0) { throw 'Experiment 15 git diff --check failed.' }
          git apply --check -R $patch
          if ($LASTEXITCODE -ne 0) { throw 'Experiment 15 reverse-check failed.' }

          $approved = @(Get-Content -LiteralPath '.exp15-approved-baseline-files.txt' | Where-Object { $_ } | Sort-Object -Unique)
          $changed = @(git diff --name-only | Sort-Object -Unique)
          if (($changed -join '|') -ne ($approved -join '|')) {
            $unexpected = @($changed | Where-Object { $approved -notcontains $_ })
            $missing = @($approved | Where-Object { $changed -notcontains $_ })
            throw ("Unexpected total source changes. Unexpected=[{0}] Missing=[{1}] Actual=[{2}]" -f `
              ($unexpected -join ', '), ($missing -join ', '), ($changed -join ', '))
          }

          $ray = Get-Content -LiteralPath 'src/opengl/gl_d3d12raylight.cpp' -Raw
          $backend = Get-Content -LiteralPath 'src/renderer/tr_backend.cpp' -Raw
          $init = Get-Content -LiteralPath 'src/renderer/tr_init.cpp' -Raw
          $header = Get-Content -LiteralPath 'src/opengl/opengl.h' -Raw
          foreach ($marker in @(
            'gAtmosphereMode',
            'gMapFogMode',
            'ApplyDXRAtmosphere',
            'ComputeMapFogAmount',
            'glRaytracingLightingSetAtmosphereOptions',
            'ATMOSPHERIC_FOG_EXP15 mode=',
            'r_dxrAtmosphereMode',
            'static_assert(sizeof(glRaytracingLightingConstants_t) == 304'
          )) {
            if (-not ($ray.Contains($marker) -or $backend.Contains($marker) -or $init.Contains($marker) -or $header.Contains($marker))) {
              throw "Missing Experiment 15 marker: $marker"
            }
          }
          foreach ($forbidden in @(
            'TEMPORAL_EXP13',
            'SHADOW_SELF_INTERSECTION_EXP10',
            'DYNAMIC_LIGHT_PROJECTION_EXP11',
            'DXR_DIRECT_EXP12'
          )) {
            if ($ray.Contains($forbidden) -or $backend.Contains($forbidden)) {
              throw "Old experiment leaked into build: $forbidden"
            }
          }

      - name: Apply Atmospheric Fog Refinement 15.1
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          $patch = 'patches/231-d3d12-atmospheric-fog-refinement-15_1.patch'
          $expected = @(
            'src/opengl/gl_d3d12raylight.cpp',
            'src/opengl/opengl.h',
            'src/renderer/tr_backend.cpp',
            'src/renderer/tr_init.cpp',
            'src/renderer/tr_local.h'
          ) | Sort-Object
          $headers = @(Select-String -LiteralPath $patch -Pattern '^diff --git a/(.+) b/(.+)$')
          $actual = @($headers | ForEach-Object { $_.Matches[0].Groups[1].Value } | Sort-Object)
          if ($headers.Count -ne 5 -or (($actual -join '|') -ne ($expected -join '|'))) {
            throw "Atmospheric Fog Refinement patch scope mismatch: $($actual -join ', ')"
          }

          git apply --check $patch
          if ($LASTEXITCODE -ne 0) { throw 'Atmospheric Fog Refinement 15.1 patch does not apply.' }
          git apply $patch
          if ($LASTEXITCODE -ne 0) { throw 'Atmospheric Fog Refinement 15.1 patch application failed.' }
          git diff --check
          if ($LASTEXITCODE -ne 0) { throw 'Atmospheric Fog Refinement 15.1 git diff --check failed.' }
          git apply --check -R $patch
          if ($LASTEXITCODE -ne 0) { throw 'Atmospheric Fog Refinement 15.1 reverse-check failed.' }

          $ray = Get-Content -LiteralPath 'src/opengl/gl_d3d12raylight.cpp' -Raw
          $backend = Get-Content -LiteralPath 'src/renderer/tr_backend.cpp' -Raw
          $init = Get-Content -LiteralPath 'src/renderer/tr_init.cpp' -Raw
          $local = Get-Content -LiteralPath 'src/renderer/tr_local.h' -Raw
          foreach ($marker in @(
            'gAtmosphereControls',
            'gAtmosphereHeight',
            'ComputeWorldLowFog',
            'r_dxrAtmosphereStrength',
            'r_dxrAtmosphereDistanceScale',
            'r_dxrAtmosphereMaxOpacity',
            'r_dxrFogBaseHeight',
            'r_dxrFogHeightFalloff',
            'ATMOSPHERIC_FOG_EXP15_1 mode=',
            'static_assert(sizeof(glRaytracingLightingConstants_t) == 336'
          )) {
            if (-not ($ray.Contains($marker) -or $backend.Contains($marker) -or $init.Contains($marker) -or $local.Contains($marker))) {
              throw "Missing Atmospheric Fog Refinement marker: $marker"
            }
          }

      - name: Validate embedded DXR HLSL with native x64 DXC
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          $source = Get-Content -LiteralPath 'src/opengl/gl_d3d12raylight.cpp' -Raw
          $assign = 'static const char* g_glRaytracingLightingHlsl = '
          $assignPos = $source.IndexOf($assign, [StringComparison]::Ordinal)
          if ($assignPos -lt 0) { throw 'DXR HLSL assignment was not found.' }
          $cursor = $assignPos + $assign.Length
          $segments = [System.Collections.Generic.List[string]]::new()

          while ($true) {
            while ($cursor -lt $source.Length -and [char]::IsWhiteSpace($source[$cursor])) { $cursor++ }
            if ($cursor -lt $source.Length -and $source[$cursor] -eq ';') { break }
            if ($cursor + 3 -gt $source.Length -or $source.Substring($cursor, 3) -ne 'R"(') {
              $previewLength = [Math]::Min(80, $source.Length - $cursor)
              $preview = $source.Substring($cursor, $previewLength).Replace("`r", ' ').Replace("`n", ' ')
              throw "Unexpected token while parsing DXR raw strings near: $preview"
            }
            $bodyStart = $cursor + 3
            $bodyEnd = $source.IndexOf(')"', $bodyStart, [StringComparison]::Ordinal)
            if ($bodyEnd -lt 0) { throw 'Unterminated DXR raw-string segment.' }
            $segments.Add($source.Substring($bodyStart, $bodyEnd - $bodyStart))
            $cursor = $bodyEnd + 2
          }

          if ($segments.Count -lt 2) { throw 'Expected multiple MSVC-safe DXR raw-string segments.' }
          $segmentLengths = @($segments | ForEach-Object { $_.Length })
          $maxSegmentLength = ($segmentLengths | Measure-Object -Maximum).Maximum
          Write-Host "DXR raw-string segment lengths: $($segmentLengths -join ', '); maximum=$maxSegmentLength"
          if ($maxSegmentLength -gt 15000) {
            throw "Embedded DXR raw-string segment is too large for MSVC: $maxSegmentLength characters."
          }

          $shaderSource = [string]::Concat($segments)
          foreach ($marker in @(
            '[shader("raygeneration")]',
            '[shader("miss")]',
            '[shader("closesthit")]',
            'gDynamicLightQualityMode',
            'gAtmosphereMode',
            'gMapFogMode',
            'ApplyDXRAtmosphere',
            'ComputeMapFogAmount',
            'gAtmosphereControls',
            'gAtmosphereHeight',
            'ComputeWorldLowFog'
          )) {
            if (-not $shaderSource.Contains($marker)) { throw "Missing DXR HLSL marker: $marker" }
          }
          $hlsl = Join-Path $env:RUNNER_TEMP 'atmospheric-fog-exp15.hlsl'
          [IO.File]::WriteAllText($hlsl, $shaderSource, [Text.UTF8Encoding]::new($false))
          Write-Host "Extracted DXR HLSL: $($shaderSource.Length) characters from $($segments.Count) raw-string segments."

          $searchRoots = @(
            "$env:ProgramFiles\Windows Kits\10\bin",
            "${env:ProgramFiles(x86)}\Windows Kits\10\bin"
          ) | Where-Object { $_ -and (Test-Path -LiteralPath $_) }
          $dxc = $null
          $x64PathSegment = [IO.Path]::DirectorySeparatorChar + 'x64' + [IO.Path]::DirectorySeparatorChar
          foreach ($root in $searchRoots) {
            $candidate = Get-ChildItem -LiteralPath $root -Filter dxc.exe -File -Recurse -ErrorAction SilentlyContinue |
              Where-Object { $_.FullName.IndexOf($x64PathSegment, [StringComparison]::OrdinalIgnoreCase) -ge 0 } |
              Sort-Object FullName -Descending |
              Select-Object -First 1
            if ($candidate) { $dxc = $candidate.FullName; break }
          }
          if (-not $dxc) {
            Write-Warning 'Native x64 dxc.exe was not found; MSBuild remains the final shader check.'
            exit 0
          }

          Write-Host "Using native x64 DXC: $dxc"
          $out = Join-Path $env:RUNNER_TEMP 'atmospheric-fog-exp15.dxil'
          $psi = [System.Diagnostics.ProcessStartInfo]::new()
          $psi.FileName = $dxc
          $psi.UseShellExecute = $false
          $psi.RedirectStandardOutput = $true
          $psi.RedirectStandardError = $true
          $psi.Arguments = "-T lib_6_3 -Fo `"$out`" `"$hlsl`""
          $proc = [System.Diagnostics.Process]::new()
          $proc.StartInfo = $psi
          if (-not $proc.Start()) { throw 'DXC failed to start.' }
          $stdout = $proc.StandardOutput.ReadToEnd()
          $stderr = $proc.StandardError.ReadToEnd()
          $proc.WaitForExit()
          if ($stdout) { Write-Host $stdout }
          if ($stderr) { Write-Host $stderr }
          if ($proc.ExitCode -ne 0) { throw "DXC failed with exit code $($proc.ExitCode)." }
          if (-not (Test-Path -LiteralPath $out)) { throw 'DXC did not produce the DXIL library.' }

      - name: Install Fog Refinement 15.1 test config
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          Copy-Item 'atmospheric_fog_exp15.cfg' 'main/atmospheric_fog_exp15.cfg' -Force

      - name: Build Atmospheric Fog Refinement 15.1 runtime
        shell: pwsh
        working-directory: work
        run: ./scripts/build-windows-stable-clear-v2.2.ps1 -Configuration '${{ inputs.configuration }}'

      - name: Package Fog Refinement 15.1 DELTA
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          $delta = 'delta-atmospheric-fog-refinement-15_1'
          if (Test-Path $delta) { Remove-Item $delta -Recurse -Force }
          New-Item -ItemType Directory -Path $delta -Force | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $delta 'main') -Force | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $delta 'SOURCE_PATCH') -Force | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $delta 'SOURCE_FILES/src/opengl') -Force | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $delta 'SOURCE_FILES/src/renderer') -Force | Out-Null

          Copy-Item 'dist/WolfSP.exe' $delta -Force
          Copy-Item 'RUN_ATMOSPHERIC_FOG_EXP15.bat' $delta -Force
          Copy-Item 'ATMOSPHERIC_FOG_EXP15_RUN_AND_COLLECT.ps1' $delta -Force
          Copy-Item 'main/atmospheric_fog_exp15.cfg' (Join-Path $delta 'main') -Force
          Copy-Item 'patches/200-d3d12-graphics-artifact-fix-v1-production.patch' (Join-Path $delta 'SOURCE_PATCH') -Force
          Copy-Item 'patches/220-d3d12-dynamic-light-quality-exp14.patch' (Join-Path $delta 'SOURCE_PATCH') -Force
          Copy-Item 'patches/230-d3d12-atmospheric-fog-exp15.patch' (Join-Path $delta 'SOURCE_PATCH') -Force
          Copy-Item 'patches/231-d3d12-atmospheric-fog-refinement-15_1.patch' (Join-Path $delta 'SOURCE_PATCH') -Force
          Copy-Item 'src/opengl/gl_d3d12shim.cpp' (Join-Path $delta 'SOURCE_FILES/src/opengl') -Force
          Copy-Item 'src/opengl/gl_d3d12raylight.cpp' (Join-Path $delta 'SOURCE_FILES/src/opengl') -Force
          Copy-Item 'src/opengl/opengl.h' (Join-Path $delta 'SOURCE_FILES/src/opengl') -Force
          Copy-Item 'src/renderer/tr_backend.cpp' (Join-Path $delta 'SOURCE_FILES/src/renderer') -Force
          Copy-Item 'src/renderer/tr_image.cpp' (Join-Path $delta 'SOURCE_FILES/src/renderer') -Force
          Copy-Item 'src/renderer/tr_init.cpp' (Join-Path $delta 'SOURCE_FILES/src/renderer') -Force
          Copy-Item 'src/renderer/tr_local.h' (Join-Path $delta 'SOURCE_FILES/src/renderer') -Force

          @(
            'DarkWolf Atmospheric Fog Refinement 15.1',
            'Base=Stable Clear v2.2 + Real Mipmaps + Polygon Offset + approved Dynamic Light Quality + Atmospheric Fog',
            'Dynamic Light Quality mode 5 is fixed for every F6-F12 atmosphere comparison.',
            'F6=off / production baseline',
            'F7=restore map-authored fog only',
            'F8=map fog or subtle neutral haze',
            'F9=cold distance fog',
            'F10=warm dust haze',
            'F11=low-lying mist',
            'F12=cinematic layered fog',
            'New adjustable cvars:',
            'r_dxrAtmosphereStrength 0.0..2.0',
            'r_dxrAtmosphereDistanceScale 0.05..8.0 (>1 pushes fog farther)',
            'r_dxrAtmosphereMaxOpacity 0.0..1.0',
            'r_dxrFogBaseHeight world-space Z',
            'r_dxrFogHeightFalloff 1..8192 world units',
            'Run=RUN_ATMOSPHERIC_FOG_EXP15.bat',
            'Use a long corridor, courtyard or large exterior and keep the camera fixed.'
          ) | Set-Content (Join-Path $delta 'README.txt') -Encoding UTF8
          Get-FileHash -Algorithm SHA256 'dist/WolfSP.exe' | Format-List | Out-String |
            Set-Content (Join-Path $delta 'WolfSP_SHA256.txt') -Encoding UTF8

      - name: Upload Atmospheric Fog Refinement 15.1 DELTA
        uses: actions/upload-artifact@v4
        with:
          name: DarkWolf-D3D12-Atmospheric-Fog-Refinement-15_1-${{ inputs.configuration }}
          path: work/delta-atmospheric-fog-refinement-15_1/**
          if-no-files-found: error
          retention-days: 14
