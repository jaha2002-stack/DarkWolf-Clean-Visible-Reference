name: DarkWolf DXR Pass Isolation Diagnostic Experiment 4

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: Build configuration
        required: true
        default: Release
        type: choice
        options:
          - Release
          - Debug

jobs:
  build-validate-package:
    runs-on: windows-2022
    steps:
      - name: Checkout canonical Stable Clear v2.2 snapshot
        uses: actions/checkout@v4
        with:
          ref: 229cd5d93b4c24ba705c9821a871cccf31b34b96
          fetch-depth: 1
          path: work

      - name: Materialize isolated Pass Diagnostic Experiment 4 files
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $files = @(
            [pscustomobject]@{ Path = 'patches/70-dxr-pass-isolation-exp4.patch'; Sha256 = 'EC592164B6A823D26BC48BA7C67A4C15B0E3F45CA4C1C9F1CE772B5DE99C8B07'; Data = '' },
            [pscustomobject]@{ Path = 'scripts/validate-dxr-passdiag-exp4.ps1'; Sha256 = '7FBED9CC47240832659BAC2451F959361DB7BEC232DF51A6DB1B512F3C3A9323'; Data = '' },
            [pscustomobject]@{ Path = 'scripts/package-dxr-passdiag-exp4-delta.ps1'; Sha256 = 'E56F96C07E405085874BC983D07C6E82CC5864E9B1E6E629BD8F33F4B0570708'; Data = '' },
            [pscustomobject]@{ Path = 'main/dxr_passdiag_exp4_gbuffer.cfg'; Sha256 = '47F54E55281DE52620880435560535E997EAAF708E921A75BB6DD2483DF062A3'; Data = '' },
            [pscustomobject]@{ Path = 'main/dxr_passdiag_exp4_lighting.cfg'; Sha256 = '69E35C35C6166D800C87262B68834571295469673799C496675A7CD71760CDB1'; Data = '' }
          )
          foreach ($item in $files) {
            $target = Join-Path 'work' $item.Path
            New-Item -ItemType Directory -Path (Split-Path -Parent $target) -Force | Out-Null
            [IO.File]::WriteAllBytes($target, [Convert]::FromBase64String($item.Data))
            $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $target).Hash
            if ($actual -ne $item.Sha256) { throw "Payload hash mismatch: $($item.Path)" }
            Write-Host "Materialized: $($item.Path)"
          }

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Apply Stable Clear v2.2 chain
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          ./scripts/apply-dxr-clean-reference-rebase.ps1
          ./scripts/apply-dxr-stable-clear-v2.1.ps1
          ./scripts/apply-dxr-stable-clear-v2.2.ps1

      - name: Apply isolated pass diagnostic patch
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          $patch = 'patches/70-dxr-pass-isolation-exp4.patch'
          $headers = @(Select-String -LiteralPath $patch -Pattern '^diff --git a/(.+) b/(.+)$')
          if ($headers.Count -ne 1) { throw 'Diagnostic patch must modify exactly one file.' }
          if ($headers[0].Line -ne 'diff --git a/src/opengl/gl_d3d12raylight.cpp b/src/opengl/gl_d3d12raylight.cpp') { throw 'Unexpected file in diagnostic patch.' }
          git apply --check $patch
          if ($LASTEXITCODE -ne 0) { throw 'Pass diagnostic patch does not apply cleanly.' }
          git apply $patch
          if ($LASTEXITCODE -ne 0) { throw 'Pass diagnostic patch application failed.' }
          $source = Get-Content -LiteralPath 'src/opengl/gl_d3d12raylight.cpp' -Raw
          foreach ($marker in @('ambientSkySignal','pointDiffuseSignal','rectDiffuseSignal','gDebugMode == 13')) {
            if (!$source.Contains($marker)) { throw "Applied source lacks marker: $marker" }
          }
          git apply --check -R $patch
          if ($LASTEXITCODE -ne 0) { throw 'Reverse-check failed; patch is not cleanly reversible.' }
          Write-Host 'Pass diagnostic patch applied and reverse-check passed.'

      - name: Verify Experiment 4 validator revision
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          $validator = Get-Content -LiteralPath './scripts/validate-dxr-passdiag-exp4.ps1' -Raw
          if ($validator.Contains('*>')) { throw 'Obsolete PowerShell native redirection is present.' }
          if (!$validator.Contains('[System.Diagnostics.ProcessStartInfo]::new()')) { throw 'ProcessStartInfo DXC launcher is absent.' }
          if (!$validator.Contains('x64Candidates')) { throw 'Native x64 DXC selector is absent.' }
          Write-Host 'PASSDIAG_EXP4_WORKFLOW_REVISION=R1_NATIVE_X64_DXC_20260721'

      - name: Validate embedded HLSL with native x64 DXC
        shell: pwsh
        working-directory: work
        run: ./scripts/validate-dxr-passdiag-exp4.ps1

      - name: Build Pass Diagnostic Experiment 4 runtime
        shell: pwsh
        working-directory: work
        run: ./scripts/build-windows-stable-clear-v2.2.ps1 -Configuration '${{ inputs.configuration }}'

      - name: Package DELTA only
        shell: pwsh
        working-directory: work
        run: ./scripts/package-dxr-passdiag-exp4-delta.ps1 -Configuration '${{ inputs.configuration }}'

      - name: Show DELTA files
        shell: pwsh
        run: Get-ChildItem -Path work/delta-passdiag-exp4 -Recurse | Format-Table FullName, Length

      - name: Upload Pass Diagnostic Experiment 4 DELTA
        uses: actions/upload-artifact@v4
        with:
          name: DarkWolf-DXR-PassDiag-Exp4-DELTA-${{ inputs.configuration }}
          path: work/delta-passdiag-exp4/**
          if-no-files-found: error
          retention-days: 14
