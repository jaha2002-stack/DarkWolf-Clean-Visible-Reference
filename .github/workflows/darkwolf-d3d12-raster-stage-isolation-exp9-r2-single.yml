name: DarkWolf D3D12 Raster Stage Isolation Experiment 9 R2 - HLSL extraction fix

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: Build configuration
        required: true
        default: Release
        type: choice
        options:
          - Release
          - Debug

jobs:
  build-validate-package:
    runs-on: windows-2022
    steps:
      - name: Checkout canonical Stable Clear v2.2 snapshot
        uses: actions/checkout@v4
        with:
          ref: 229cd5d93b4c24ba705c9821a871cccf31b34b96
          fetch-depth: 1
          path: work

      - name: Materialize Raster Stage Isolation payload
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $files = @(
                      [pscustomobject]@{ Path = 'patches/100-d3d12-real-mipmaps-production.patch'; Sha256 = 'A87B006B998BF78F85B5D1139B8DD7CE33F3913DF489175C0F9BC910DADA7558'; Data = '' },
                      [pscustomobject]@{ Path = 'patches/110-d3d12-polygon-offset-ab.patch'; Sha256 = '02D59D40DEFFAEAE18D695BF830E095E94FB233E98FB58A96ABF1F54BE04CD7C'; Data = '' },
                      [pscustomobject]@{ Path = 'patches/130-d3d12-raster-stage-isolation-exp9.patch'; Sha256 = '0425DA9BA9F9FE140019EF22F29BD35A5592F9A8713DC930D581819818DBD221'; Data = '' },
                      [pscustomobject]@{ Path = 'RASTER_STAGE_ISOLATION_RUN_AND_COLLECT.ps1'; Sha256 = '183CBD07E10FDBEA84EB3F86A436A2B9F8EBA48597355BD85B2CEDE3484BA3E3'; Data = '' },
                      [pscustomobject]@{ Path = 'RUN_RASTER_STAGE_ISOLATION_EXP9.bat'; Sha256 = '25E074EB4F1387C24ED73EEEC740CAFC5E4073A689A75768FF88F3BF4733A10A'; Data = '' },
                      [pscustomobject]@{ Path = 'main/raster_stage_isolation.cfg'; Sha256 = 'FBE3F7A2FE9BB0DD6433B84F59EA202A5729AA0F1FCD0E1620E6E36CC2A947ED'; Data = '' }
          )
          foreach ($item in $files) {
            $target = Join-Path 'work' $item.Path
            New-Item -ItemType Directory -Path (Split-Path -Parent $target) -Force | Out-Null
            [IO.File]::WriteAllBytes($target, [Convert]::FromBase64String($item.Data))
            $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $target).Hash
            if ($actual -ne $item.Sha256) { throw "Payload hash mismatch: $($item.Path)" }
            Write-Host "Materialized: $($item.Path)"
          }

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Apply Stable Clear v2.2 chain
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          ./scripts/apply-dxr-clean-reference-rebase.ps1
          ./scripts/apply-dxr-stable-clear-v2.1.ps1
          ./scripts/apply-dxr-stable-clear-v2.2.ps1

      - name: Apply confirmed production mipmaps
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          $patch = 'patches/100-d3d12-real-mipmaps-production.patch'
          git apply --check $patch
          if ($LASTEXITCODE -ne 0) { throw 'Production mipmap patch check failed.' }
          git apply $patch
          if ($LASTEXITCODE -ne 0) { throw 'Production mipmap patch failed.' }

      - name: Apply confirmed Polygon Offset implementation
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          $patch = 'patches/110-d3d12-polygon-offset-ab.patch'
          git apply --check $patch
          if ($LASTEXITCODE -ne 0) { throw 'Polygon Offset patch check failed.' }
          git apply $patch
          if ($LASTEXITCODE -ne 0) { throw 'Polygon Offset patch failed.' }

      - name: Apply one-file Raster Stage Isolation patch
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          $patch = 'patches/130-d3d12-raster-stage-isolation-exp9.patch'
          $headers = @(Select-String -LiteralPath $patch -Pattern '^diff --git a/(.+) b/(.+)$')
          if ($headers.Count -ne 1) { throw 'Raster Stage patch must contain exactly one file diff.' }
          $changed = $headers[0].Matches[0].Groups[1].Value
          if ($changed -ne 'src/opengl/gl_d3d12shim.cpp') { throw "Unexpected Raster Stage file: $changed" }
          git apply --check $patch
          if ($LASTEXITCODE -ne 0) { throw 'Raster Stage patch check failed.' }
          git apply $patch
          if ($LASTEXITCODE -ne 0) { throw 'Raster Stage patch failed.' }
          git diff --check
          if ($LASTEXITCODE -ne 0) { throw 'git diff --check failed.' }
          git apply --check -R $patch
          if ($LASTEXITCODE -ne 0) { throw 'Raster Stage reverse-check failed.' }
          $shim = Get-Content -LiteralPath 'src/opengl/gl_d3d12shim.cpp' -Raw
          foreach ($marker in @(
            'RASTER_STAGE_ISOLATION revision=9',
            'STAGE0_RAW',
            'STAGE1_RAW',
            'TEXTURE_COMBINE_NO_LOOK_NO_FOG',
            'TEXTURE_COMBINE_PLUS_FOG_NO_LOOK',
            'GetAsyncKeyState',
            'gMotionPad.x',
            'dc->_motionPad[0]'
          )) {
            if (-not $shim.Contains($marker)) { throw "Missing Raster Stage marker: $marker" }
          }

      - name: Best-effort validate embedded fixed-function HLSL
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          $source = Get-Content -LiteralPath 'src/opengl/gl_d3d12shim.cpp' -Raw
          $startMarker = 'static const char* kQuakeWrapperHLSL = R"HLSL('
          $endMarker = ')HLSL";'
          $declarationStart = $source.IndexOf($startMarker, [StringComparison]::Ordinal)
          if ($declarationStart -lt 0) { throw 'Could not find kQuakeWrapperHLSL declaration.' }
          $bodyStart = $declarationStart + $startMarker.Length
          $bodyEnd = $source.IndexOf($endMarker, $bodyStart, [StringComparison]::Ordinal)
          if ($bodyEnd -lt 0) { throw 'Could not find the end of kQuakeWrapperHLSL.' }
          $shaderSource = $source.Substring($bodyStart, $bodyEnd - $bodyStart)
          if ([string]::IsNullOrWhiteSpace($shaderSource)) { throw 'Extracted kQuakeWrapperHLSL is empty.' }
          foreach ($entryName in @('VSMain','PSMain','PSMainAlphaTest','PSMainUntextured','PSMainColorOnly','PSMainAlphaTestColorOnly','PSMainUntexturedColorOnly')) {
            if (-not $shaderSource.Contains($entryName)) { throw "Missing HLSL entry point in extracted source: $entryName" }
          }
          $hlsl = Join-Path $env:RUNNER_TEMP 'qd3d12-raster-stage-exp9.hlsl'
          [IO.File]::WriteAllText($hlsl, $shaderSource, [Text.UTF8Encoding]::new($false))
          Write-Host "Extracted kQuakeWrapperHLSL: $($shaderSource.Length) characters."

          $searchRoots = @(
            "$env:ProgramFiles\Windows Kits\10\bin",
            "${env:ProgramFiles(x86)}\Windows Kits\10\bin"
          ) | Where-Object { $_ -and (Test-Path -LiteralPath $_) }
          $dxc = $null
          foreach ($root in $searchRoots) {
            $candidate = Get-ChildItem -LiteralPath $root -Filter dxc.exe -File -Recurse -ErrorAction SilentlyContinue |
              Where-Object { $_.FullName -match '\x64\' } |
              Sort-Object FullName -Descending |
              Select-Object -First 1
            if ($candidate) { $dxc = $candidate.FullName; break }
          }

          if (-not $dxc) {
            Write-Warning 'Native x64 dxc.exe was not found; MSBuild will continue, and runtime D3DCompile remains the final shader check.'
            exit 0
          }

          Write-Host "Using native x64 DXC: $dxc"
          $entries = @(
            @('VSMain','vs_6_0'),
            @('PSMain','ps_6_0'),
            @('PSMainAlphaTest','ps_6_0'),
            @('PSMainUntextured','ps_6_0'),
            @('PSMainColorOnly','ps_6_0'),
            @('PSMainAlphaTestColorOnly','ps_6_0'),
            @('PSMainUntexturedColorOnly','ps_6_0')
          )
          foreach ($entry in $entries) {
            $out = Join-Path $env:RUNNER_TEMP ("$($entry[0]).dxil")
            $psi = [System.Diagnostics.ProcessStartInfo]::new()
            $psi.FileName = $dxc
            $psi.UseShellExecute = $false
            $psi.RedirectStandardOutput = $true
            $psi.RedirectStandardError = $true
            $psi.Arguments = "-T $($entry[1]) -E $($entry[0]) -Fo `"$out`" `"$hlsl`""
            $proc = [System.Diagnostics.Process]::new()
            $proc.StartInfo = $psi
            if (-not $proc.Start()) { throw "DXC failed to start for $($entry[0])." }
            $stdout = $proc.StandardOutput.ReadToEnd()
            $stderr = $proc.StandardError.ReadToEnd()
            $proc.WaitForExit()
            if ($stdout) { Write-Host $stdout }
            if ($stderr) { Write-Host $stderr }
            if ($proc.ExitCode -ne 0) { throw "DXC failed for $($entry[0]) with exit code $($proc.ExitCode)." }
          }

      - name: Build Raster Stage Isolation runtime
        shell: pwsh
        working-directory: work
        run: ./scripts/build-windows-stable-clear-v2.2.ps1 -Configuration '${{ inputs.configuration }}'

      - name: Package Raster Stage Isolation DELTA only
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          $delta = 'delta-raster-stage-isolation-exp9'
          if (Test-Path $delta) { Remove-Item $delta -Recurse -Force }
          New-Item -ItemType Directory -Path $delta -Force | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $delta 'main') -Force | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $delta 'SOURCE_PATCH') -Force | Out-Null
          Copy-Item 'dist/WolfSP.exe' $delta -Force
          Copy-Item 'RASTER_STAGE_ISOLATION_RUN_AND_COLLECT.ps1' $delta -Force
          Copy-Item 'RUN_RASTER_STAGE_ISOLATION_EXP9.bat' $delta -Force
          Copy-Item 'main/raster_stage_isolation.cfg' (Join-Path $delta 'main') -Force
          foreach ($patch in @(
            'patches/100-d3d12-real-mipmaps-production.patch',
            'patches/110-d3d12-polygon-offset-ab.patch',
            'patches/130-d3d12-raster-stage-isolation-exp9.patch'
          )) { Copy-Item $patch (Join-Path $delta 'SOURCE_PATCH') -Force }
          @(
            'Raster Stage Isolation Experiment 9',
            'Confirmed fixes active: real mipmaps and Polygon Offset fixed mode.',
            'Run RUN_RASTER_STAGE_ISOLATION_EXP9.bat.',
            'Use F6 through F12 in the same scene and keep the camera still.',
            'External PNG screenshots and logs are collected automatically.',
            'Do not combine this experimental WolfSP.exe with the Sampler A/B build.'
          ) | Set-Content (Join-Path $delta 'README.txt') -Encoding UTF8

      - name: Show DELTA files
        shell: pwsh
        run: Get-ChildItem -Path work/delta-raster-stage-isolation-exp9 -Recurse | Format-Table FullName, Length

      - name: Upload Raster Stage Isolation DELTA
        uses: actions/upload-artifact@v4
        with:
          name: DarkWolf-D3D12-Raster-Stage-Isolation-Exp9-${{ inputs.configuration }}
          path: work/delta-raster-stage-isolation-exp9/**
          if-no-files-found: error
          retention-days: 14
