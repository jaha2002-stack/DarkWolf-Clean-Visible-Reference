name: DarkWolf D3D12 Graphics Artifact Fix v1 Full Runtime Kit

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: Build configuration
        required: true
        default: Release
        type: choice
        options:
          - Release
          - Debug

jobs:
  build-validate-package:
    runs-on: windows-2022
    steps:
      - name: Checkout canonical Stable Clear v2.2 snapshot
        uses: actions/checkout@v4
        with:
          ref: 229cd5d93b4c24ba705c9821a871cccf31b34b96
          fetch-depth: 1
          path: work

      - name: Materialize combined production patch
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $target = 'work/patches/200-d3d12-graphics-artifact-fix-v1-production.patch'
          New-Item -ItemType Directory -Path (Split-Path -Parent $target) -Force | Out-Null
          $payload = '' +`
            '' +`
            '' +`
            '' +`
            '' +`
            ''
          [IO.File]::WriteAllBytes($target, [Convert]::FromBase64String($payload))
          $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $target).Hash
          if ($actual -ne '989C7943969B7A2C222FF93598195275383AFD217FCFCE1EDAC5D4E2A4231CBF') { throw "Payload hash mismatch: $actual" }
          Write-Host "Materialized production patch SHA256=$actual"

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Apply Stable Clear v2.2 chain
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          ./scripts/apply-dxr-clean-reference-rebase.ps1
          ./scripts/apply-dxr-stable-clear-v2.1.ps1
          ./scripts/apply-dxr-stable-clear-v2.2.ps1

      - name: Apply Graphics Artifact Fix v1 production patch
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          $patch = 'patches/200-d3d12-graphics-artifact-fix-v1-production.patch'
          $headers = @(Select-String -LiteralPath $patch -Pattern '^diff --git a/(.+) b/(.+)$')
          $expected = @('src/opengl/gl_d3d12shim.cpp','src/renderer/tr_image.cpp') | Sort-Object
          $actual = @($headers | ForEach-Object { $_.Matches[0].Groups[1].Value } | Sort-Object)
          if ($headers.Count -ne 2 -or (($actual -join '|') -ne ($expected -join '|'))) {
            throw "Production patch must modify exactly two approved files. Found: $($actual -join ', ')"
          }
          git apply --check $patch
          if ($LASTEXITCODE -ne 0) { throw 'Production patch does not apply cleanly.' }
          git apply $patch
          if ($LASTEXITCODE -ne 0) { throw 'Production patch application failed.' }
          git diff --check
          if ($LASTEXITCODE -ne 0) { throw 'git diff --check failed.' }
          git apply --check -R $patch
          if ($LASTEXITCODE -ne 0) { throw 'Reverse-check failed.' }

          $renderer = Get-Content -LiteralPath 'src/renderer/tr_image.cpp' -Raw
          $shim = Get-Content -LiteralPath 'src/opengl/gl_d3d12shim.cpp' -Raw
          if ($renderer.Contains('mipmap = qfalse; // jmarshall fixme')) { throw 'Forced renderer mipmap disable still present.' }
          foreach ($marker in @('UploadTextureMipChain','extraMipLevels','rd.MipLevels = (UINT16)desiredMipLevels','sd.Texture2D.MipLevels = desiredMipLevels','GL_POLYGON_OFFSET_FILL','SlopeScaledDepthBias','key.polygonOffsetFill = g_gl.polygonOffsetFill')) {
            if (-not $shim.Contains($marker)) { throw "Missing production marker: $marker" }
          }
          foreach ($forbidden in @('QD3D12_MIPMAP_MODE','QD3D12_POLYGON_OFFSET_MODE','POLYOFFSET_AB','EXP10','EXP11','EXP12')) {
            if ($shim.Contains($forbidden)) { throw "Experimental marker leaked into production source: $forbidden" }
          }

      - name: Build final production runtime
        shell: pwsh
        working-directory: work
        run: ./scripts/build-windows-stable-clear-v2.2.ps1 -Configuration '${{ inputs.configuration }}'

      - name: Package complete playable runtime kit
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'

          $kitName = 'DarkWolf_DXR_Stable_Clear_v2.2_RealMips_PolygonOffset_FULL_KIT'
          $stageRoot = 'full-kit-stage'
          $kitRoot = Join-Path $stageRoot $kitName
          $outputRoot = 'full-kit-output'

          foreach ($path in @($stageRoot, $outputRoot)) {
            if (Test-Path -LiteralPath $path) {
              Remove-Item -LiteralPath $path -Recurse -Force
            }
            New-Item -ItemType Directory -Path $path -Force | Out-Null
          }
          New-Item -ItemType Directory -Path $kitRoot -Force | Out-Null

          # The freshly compiled executable is always taken from dist.
          $wolf = 'dist/WolfSP.exe'
          if (!(Test-Path -LiteralPath $wolf)) {
            throw 'Compiled dist/WolfSP.exe is missing.'
          }
          Copy-Item -LiteralPath $wolf -Destination (Join-Path $kitRoot 'WolfSP.exe') -Force

          # Copy every root runtime DLL from the pinned Stable Clear v2.2 repository.
          # This includes OpenAL, DXC/DXIL, NVIDIA NGX and Streamline components.
          $runtimeDlls = @(Get-ChildItem -LiteralPath '.' -Filter '*.dll' -File | Sort-Object Name)
          if ($runtimeDlls.Count -lt 10) {
            throw "Unexpectedly few root runtime DLLs were found: $($runtimeDlls.Count)"
          }
          foreach ($dll in $runtimeDlls) {
            Copy-Item -LiteralPath $dll.FullName -Destination $kitRoot -Force
          }

          # Copy the complete runtime main folder, not only the newly built VM DLLs.
          if (!(Test-Path -LiteralPath 'main')) {
            throw 'Repository main folder is missing.'
          }
          Copy-Item -LiteralPath 'main' -Destination $kitRoot -Recurse -Force

          # Overlay the freshly packaged VM DLLs and v2.2 profiles from dist/main.
          if (Test-Path -LiteralPath 'dist/main') {
            Copy-Item -Path 'dist/main/*' -Destination (Join-Path $kitRoot 'main') -Recurse -Force
          }

          # Copy all tested Stable Clear v2.2 launchers generated by the canonical build script.
          $launchers = @(Get-ChildItem -LiteralPath 'dist' -Filter 'RUN_*.bat' -File | Sort-Object Name)
          if ($launchers.Count -lt 5) {
            throw "Expected at least five Stable Clear launchers, found $($launchers.Count)."
          }
          foreach ($launcher in $launchers) {
            Copy-Item -LiteralPath $launcher.FullName -Destination $kitRoot -Force
          }

          # Add one obvious production entry point that uses the primary v2.2 profile.
          @(
            '@echo off',
            'setlocal',
            'cd /d "%~dp0"',
            'echo Starting DarkWolf RTCW DXR: Stable Clear v2.2 + Real Mipmaps + Polygon Offset',
            'WolfSP.exe +set r_picmip 0 +set r_picmip2 0 +set r_roundImagesDown 0 +set r_simpleMipMaps 0 +set r_texturebits 32 +set r_textureMode GL_LINEAR_MIPMAP_LINEAR +exec dxr_stable_clear_v22.cfg'
          ) | Set-Content -LiteralPath (Join-Path $kitRoot 'RUN_DXR_V22_REAL_MIPS_POLYGON_OFFSET.bat') -Encoding ASCII

          # Keep technical provenance outside the clean game root.
          $infoRoot = Join-Path $kitRoot '_BUILD_INFO'
          New-Item -ItemType Directory -Path $infoRoot -Force | Out-Null
          Copy-Item -LiteralPath 'patches/200-d3d12-graphics-artifact-fix-v1-production.patch' -Destination $infoRoot -Force

          $readme = @'
          DarkWolf RTCW DXR - Full Production Runtime Kit
          ================================================
          
          Base:
            Stable Clear v2.2
            canonical commit 229cd5d93b4c24ba705c9821a871cccf31b34b96
          
          Confirmed production fixes:
            1. Real Mipmaps
            2. OpenGL Polygon Offset translated to D3D12 Depth Bias
          
          This is a COMPLETE runtime package produced from the pinned repository. It
          contains the newly compiled WolfSP.exe, all root runtime DLLs present in the
          Stable Clear v2.2 repository, the complete main folder, and the tested v2.2
          launch BAT files.
          
          Recommended start:
            RUN_DXR_V22_REAL_MIPS_POLYGON_OFFSET.bat
          
          Also available:
            RUN_DXR_STABLE_CLEAR_V22.bat
            RUN_DXR_STABLE_CLEAR_FAST_V22.bat
            RUN_DXR_STABLE_REAL_LIGHTS_V22.bat
            RUN_DXR_REFERENCE_QUALITY_V22.bat
            RUN_DXR_SHADOW_MASK_SAFE_V22.bat
          
          Installation:
            1. Extract the entire folder without changing its internal structure.
            2. Do not move WolfSP.exe away from the DLL files.
            3. Keep the main folder next to WolfSP.exe.
            4. Start with RUN_DXR_V22_REAL_MIPS_POLYGON_OFFSET.bat.
          
          Not included in production:
            Sampler A/B experiment
            Raster Stage Experiment 9
            Shadow Self-Intersection Experiment 10
            Dynamic Light Projection Experiment 11
            Direct Lighting Experiment 12
            Temporal Stability Experiment 13
          
          The unresolved angle-dependent line/grid artifact is intentionally not treated
          by this release. Work on that artifact and on shadows is postponed.
          '@
          Set-Content -LiteralPath (Join-Path $kitRoot 'README_FULL_PRODUCTION_KIT.txt') -Value $readme -Encoding UTF8

          @(
            'Product=DarkWolf RTCW DXR Full Production Runtime Kit',
            'CanonicalBase=229cd5d93b4c24ba705c9821a871cccf31b34b96',
            'PatchChain=10 -> 20 -> 30 -> 200',
            'Fix1=Real Mipmaps',
            'Fix2=Polygon Offset / D3D12 Depth Bias',
            "Configuration=${{ inputs.configuration }}",
            "RootRuntimeDllCount=$($runtimeDlls.Count)",
            "LauncherCount=$($launchers.Count)",
            "MainFileCount=$((Get-ChildItem -LiteralPath (Join-Path $kitRoot 'main') -File -Recurse).Count)"
          ) | Set-Content -LiteralPath (Join-Path $infoRoot 'BUILD_INFO.txt') -Encoding UTF8

          # Validate the exact runtime structure requested for a standalone kit.
          $requiredRoot = @(
            'WolfSP.exe',
            'OpenAL32.dll',
            'dxcompiler.dll',
            'dxil.dll',
            'NvLowLatencyVk.dll',
            'nvngx_dlss.dll',
            'nvngx_dlssd.dll',
            'sl.interposer.dll',
            'sl.common.dll',
            'RUN_DXR_V22_REAL_MIPS_POLYGON_OFFSET.bat'
          )
          foreach ($required in $requiredRoot) {
            if (!(Test-Path -LiteralPath (Join-Path $kitRoot $required))) {
              throw "Full kit is missing required root file: $required"
            }
          }

          $requiredMain = @(
            'dxr_stable_clear_v22.cfg',
            'dxr_stable_clear_fast_v22.cfg',
            'dxr_stable_real_lights_v22.cfg',
            'dxr_stable_reference_quality_v22.cfg',
            'dxr_stable_shadow_mask_v22.cfg'
          )
          foreach ($required in $requiredMain) {
            if (!(Test-Path -LiteralPath (Join-Path (Join-Path $kitRoot 'main') $required))) {
              throw "Full kit is missing required main file: $required"
            }
          }

          $mainFiles = @(Get-ChildItem -LiteralPath (Join-Path $kitRoot 'main') -File -Recurse)
          if ($mainFiles.Count -lt 100) {
            throw "The packaged main folder is unexpectedly incomplete: $($mainFiles.Count) files."
          }

          # Create deterministic human-readable manifests before compression.
          Get-ChildItem -LiteralPath $kitRoot -File -Recurse |
            Sort-Object FullName |
            ForEach-Object {
              $relative = $_.FullName.Substring((Resolve-Path $kitRoot).Path.Length + 1)
              "{0}`t{1}" -f $relative, $_.Length
            } | Set-Content -LiteralPath (Join-Path $infoRoot 'FULL_KIT_CONTENTS.txt') -Encoding UTF8

          Get-ChildItem -LiteralPath $kitRoot -File -Recurse |
            Sort-Object FullName |
            ForEach-Object {
              $hash = Get-FileHash -Algorithm SHA256 -LiteralPath $_.FullName
              $relative = $_.FullName.Substring((Resolve-Path $kitRoot).Path.Length + 1)
              "{0}  {1}" -f $hash.Hash, $relative
            } | Set-Content -LiteralPath (Join-Path $infoRoot 'FULL_KIT_FILE_SHA256.txt') -Encoding UTF8

          $zipPath = Join-Path $outputRoot ($kitName + '.zip')
          Compress-Archive -LiteralPath $kitRoot -DestinationPath $zipPath -CompressionLevel Optimal -Force
          if (!(Test-Path -LiteralPath $zipPath)) {
            throw 'Full runtime ZIP was not created.'
          }

          $zipHash = Get-FileHash -Algorithm SHA256 -LiteralPath $zipPath
          @(
            "File=$($zipHash.Path | Split-Path -Leaf)",
            "SHA256=$($zipHash.Hash)",
            "Bytes=$((Get-Item -LiteralPath $zipPath).Length)"
          ) | Set-Content -LiteralPath (Join-Path $outputRoot 'FULL_KIT_ZIP_SHA256.txt') -Encoding UTF8

          Copy-Item -LiteralPath (Join-Path $infoRoot 'BUILD_INFO.txt') -Destination $outputRoot -Force
          Copy-Item -LiteralPath (Join-Path $infoRoot 'FULL_KIT_CONTENTS.txt') -Destination $outputRoot -Force

          Write-Host 'Complete runtime kit prepared:'
          Get-ChildItem -LiteralPath $outputRoot | Format-Table Name, Length

      - name: Upload complete production runtime kit
        uses: actions/upload-artifact@v4
        with:
          name: DarkWolf-DXR-Stable-Clear-v2.2-RealMips-PolygonOffset-FULL-KIT-${{ inputs.configuration }}
          path: work/full-kit-output/**
          if-no-files-found: error
          retention-days: 14
