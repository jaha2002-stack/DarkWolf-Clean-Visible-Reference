name: DarkWolf Dynamic Light Quality Visual Lab 14

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: Build configuration
        required: true
        default: Release
        type: choice
        options:
          - Release
          - Debug

jobs:
  build-validate-package:
    runs-on: windows-2022
    steps:
      - name: Checkout canonical Stable Clear v2.2 snapshot
        uses: actions/checkout@v4
        with:
          ref: 229cd5d93b4c24ba705c9821a871cccf31b34b96
          fetch-depth: 1
          path: work

      - name: Materialize production and Experiment 14 payloads
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $target = Join-Path 'work' 'patches/200-d3d12-graphics-artifact-fix-v1-production.patch'
          New-Item -ItemType Directory -Path (Split-Path -Parent $target) -Force | Out-Null
          [IO.File]::WriteAllBytes($target, [Convert]::FromBase64String(''))
          $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $target).Hash
          if ($actual -ne '989C7943969B7A2C222FF93598195275383AFD217FCFCE1EDAC5D4E2A4231CBF') { throw 'Payload hash mismatch: patches/200-d3d12-graphics-artifact-fix-v1-production.patch' }
          Write-Host 'Materialized: patches/200-d3d12-graphics-artifact-fix-v1-production.patch'
          $target = Join-Path 'work' 'patches/220-d3d12-dynamic-light-quality-exp14.patch'
          New-Item -ItemType Directory -Path (Split-Path -Parent $target) -Force | Out-Null
          [IO.File]::WriteAllBytes($target, [Convert]::FromBase64String(''))
          $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $target).Hash
          if ($actual -ne 'E0A642AEE913B14B7F0313AD7F549D2C2C33923E8B65133E6336BF2E7C849FA9') { throw 'Payload hash mismatch: patches/220-d3d12-dynamic-light-quality-exp14.patch' }
          Write-Host 'Materialized: patches/220-d3d12-dynamic-light-quality-exp14.patch'
          $target = Join-Path 'work' 'dynamic_light_quality_exp14.cfg'
          New-Item -ItemType Directory -Path (Split-Path -Parent $target) -Force | Out-Null
          [IO.File]::WriteAllBytes($target, [Convert]::FromBase64String(''))
          $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $target).Hash
          if ($actual -ne '3C7E16FF6BC62A47B7FE80E89A038AEA3C66924FB7AD5261C04B7D39C13D4DD0') { throw 'Payload hash mismatch: dynamic_light_quality_exp14.cfg' }
          Write-Host 'Materialized: dynamic_light_quality_exp14.cfg'
          $target = Join-Path 'work' 'RUN_DYNAMIC_LIGHT_QUALITY_EXP14.bat'
          New-Item -ItemType Directory -Path (Split-Path -Parent $target) -Force | Out-Null
          [IO.File]::WriteAllBytes($target, [Convert]::FromBase64String(''))
          $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $target).Hash
          if ($actual -ne '3831BCD24FDE4505BEEA042C31ABE3E0133CFC6025D88056A42D049A8E3A6F0B') { throw 'Payload hash mismatch: RUN_DYNAMIC_LIGHT_QUALITY_EXP14.bat' }
          Write-Host 'Materialized: RUN_DYNAMIC_LIGHT_QUALITY_EXP14.bat'
          $target = Join-Path 'work' 'DYNAMIC_LIGHT_QUALITY_EXP14_RUN_AND_COLLECT.ps1'
          New-Item -ItemType Directory -Path (Split-Path -Parent $target) -Force | Out-Null
          [IO.File]::WriteAllBytes($target, [Convert]::FromBase64String(''))
          $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $target).Hash
          if ($actual -ne '4D87961FD1B9D22EF9E0B8FD66DAAB22AF46509917F043D60BFE7C792E6D212C') { throw 'Payload hash mismatch: DYNAMIC_LIGHT_QUALITY_EXP14_RUN_AND_COLLECT.ps1' }
          Write-Host 'Materialized: DYNAMIC_LIGHT_QUALITY_EXP14_RUN_AND_COLLECT.ps1'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Apply Stable Clear v2.2 chain
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          ./scripts/apply-dxr-clean-reference-rebase.ps1
          ./scripts/apply-dxr-stable-clear-v2.1.ps1
          ./scripts/apply-dxr-stable-clear-v2.2.ps1

      - name: Apply confirmed production fixes and record baseline
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          $patch = 'patches/200-d3d12-graphics-artifact-fix-v1-production.patch'
          git apply --check $patch
          if ($LASTEXITCODE -ne 0) { throw 'Graphics Artifact Fix v1 does not apply.' }
          git apply $patch
          if ($LASTEXITCODE -ne 0) { throw 'Graphics Artifact Fix v1 application failed.' }
          git diff --check
          if ($LASTEXITCODE -ne 0) { throw 'Production baseline git diff --check failed.' }

          $baselineChanged = @(git diff --name-only | Sort-Object -Unique)
          if ($baselineChanged.Count -eq 0) { throw 'Production baseline change list is empty.' }
          foreach ($required in @('src/opengl/gl_d3d12shim.cpp','src/renderer/tr_image.cpp')) {
            if ($baselineChanged -notcontains $required) {
              throw "Confirmed production source missing from baseline: $required"
            }
          }
          $baselineChanged | Set-Content -LiteralPath '.exp14-production-baseline-files.txt' -Encoding ASCII
          Write-Host "Recorded production baseline files ($($baselineChanged.Count)):"
          $baselineChanged | ForEach-Object { Write-Host "  $_" }

      - name: Apply Dynamic Light Quality Experiment 14
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          $patch = 'patches/220-d3d12-dynamic-light-quality-exp14.patch'
          $expected = @(
            'src/opengl/gl_d3d12raylight.cpp',
            'src/opengl/opengl.h',
            'src/renderer/tr_backend.cpp',
            'src/renderer/tr_init.cpp',
            'src/renderer/tr_local.h'
          ) | Sort-Object
          $headers = @(Select-String -LiteralPath $patch -Pattern '^diff --git a/(.+) b/(.+)$')
          $actual = @($headers | ForEach-Object { $_.Matches[0].Groups[1].Value } | Sort-Object)
          if ($headers.Count -ne 5 -or (($actual -join '|') -ne ($expected -join '|'))) {
            throw "Experiment patch scope mismatch: $($actual -join ', ')"
          }

          git apply --check $patch
          if ($LASTEXITCODE -ne 0) { throw 'Dynamic Light Quality Experiment 14 patch does not apply.' }
          git apply $patch
          if ($LASTEXITCODE -ne 0) { throw 'Experiment 14 patch application failed.' }
          git diff --check
          if ($LASTEXITCODE -ne 0) { throw 'Experiment 14 git diff --check failed.' }
          git apply --check -R $patch
          if ($LASTEXITCODE -ne 0) { throw 'Experiment 14 reverse-check failed.' }

          $baselineChanged = @(Get-Content -LiteralPath '.exp14-production-baseline-files.txt' | Where-Object { $_ } | Sort-Object -Unique)
          $changed = @(git diff --name-only | Sort-Object -Unique)
          $expectedTotal = @($baselineChanged + $expected) | Sort-Object -Unique
          if (($changed -join '|') -ne ($expectedTotal -join '|')) {
            $unexpected = @($changed | Where-Object { $expectedTotal -notcontains $_ })
            $missing = @($expectedTotal | Where-Object { $changed -notcontains $_ })
            throw ("Unexpected total source changes. Unexpected=[{0}] Missing=[{1}] Actual=[{2}]" -f `
              ($unexpected -join ', '), ($missing -join ', '), ($changed -join ', '))
          }

          $ray = Get-Content -LiteralPath 'src/opengl/gl_d3d12raylight.cpp' -Raw
          $backend = Get-Content -LiteralPath 'src/renderer/tr_backend.cpp' -Raw
          $init = Get-Content -LiteralPath 'src/renderer/tr_init.cpp' -Raw
          foreach ($marker in @(
            'gDynamicLightQualityMode',
            'DynamicLightPointFalloff',
            'DynamicLightRectFalloff',
            'DynamicLightColor',
            'DynamicLightSoftPeak',
            'DYNAMIC_LIGHT_QUALITY_EXP14 mode=',
            'r_dxrDynamicLightQualityMode'
          )) {
            if (-not ($ray.Contains($marker) -or $backend.Contains($marker) -or $init.Contains($marker))) {
              throw "Missing Experiment 14 marker: $marker"
            }
          }
          foreach ($forbidden in @(
            'TEMPORAL_EXP13',
            'SHADOW_SELF_INTERSECTION_EXP10',
            'DYNAMIC_LIGHT_PROJECTION_EXP11',
            'DXR_DIRECT_EXP12'
          )) {
            if ($ray.Contains($forbidden) -or $backend.Contains($forbidden)) {
              throw "Old experiment leaked into build: $forbidden"
            }
          }

      - name: Validate embedded DXR HLSL with native x64 DXC
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          $source = Get-Content -LiteralPath 'src/opengl/gl_d3d12raylight.cpp' -Raw
          $assign = 'static const char* g_glRaytracingLightingHlsl = '
          $assignPos = $source.IndexOf($assign, [StringComparison]::Ordinal)
          if ($assignPos -lt 0) { throw 'DXR HLSL assignment was not found.' }
          $cursor = $assignPos + $assign.Length
          $segments = [System.Collections.Generic.List[string]]::new()

          while ($true) {
            while ($cursor -lt $source.Length -and [char]::IsWhiteSpace($source[$cursor])) { $cursor++ }
            if ($cursor -lt $source.Length -and $source[$cursor] -eq ';') { break }
            if ($cursor + 3 -gt $source.Length -or $source.Substring($cursor, 3) -ne 'R"(') {
              $previewLength = [Math]::Min(80, $source.Length - $cursor)
              $preview = $source.Substring($cursor, $previewLength).Replace("`r", ' ').Replace("`n", ' ')
              throw "Unexpected token while parsing DXR raw strings near: $preview"
            }
            $bodyStart = $cursor + 3
            $bodyEnd = $source.IndexOf(')"', $bodyStart, [StringComparison]::Ordinal)
            if ($bodyEnd -lt 0) { throw 'Unterminated DXR raw-string segment.' }
            $segments.Add($source.Substring($bodyStart, $bodyEnd - $bodyStart))
            $cursor = $bodyEnd + 2
          }

          if ($segments.Count -lt 2) { throw 'Expected multiple MSVC-safe DXR raw-string segments.' }
          $segmentLengths = @($segments | ForEach-Object { $_.Length })
          $maxSegmentLength = ($segmentLengths | Measure-Object -Maximum).Maximum
          Write-Host "DXR raw-string segment lengths: $($segmentLengths -join ', '); maximum=$maxSegmentLength"
          if ($maxSegmentLength -gt 15000) {
            throw "Embedded DXR raw-string segment is too large for MSVC: $maxSegmentLength characters."
          }

          $shaderSource = [string]::Concat($segments)
          foreach ($marker in @(
            '[shader("raygeneration")]',
            '[shader("miss")]',
            '[shader("closesthit")]',
            'gDynamicLightQualityMode',
            'DynamicLightPointFalloff',
            'DynamicLightSoftPeak'
          )) {
            if (-not $shaderSource.Contains($marker)) { throw "Missing DXR HLSL marker: $marker" }
          }
          $hlsl = Join-Path $env:RUNNER_TEMP 'dynamic-light-quality-exp14.hlsl'
          [IO.File]::WriteAllText($hlsl, $shaderSource, [Text.UTF8Encoding]::new($false))
          Write-Host "Extracted DXR HLSL: $($shaderSource.Length) characters from $($segments.Count) raw-string segments."

          $searchRoots = @(
            "$env:ProgramFiles\Windows Kits\10\bin",
            "${env:ProgramFiles(x86)}\Windows Kits\10\bin"
          ) | Where-Object { $_ -and (Test-Path -LiteralPath $_) }
          $dxc = $null
          $x64PathSegment = [IO.Path]::DirectorySeparatorChar + 'x64' + [IO.Path]::DirectorySeparatorChar
          foreach ($root in $searchRoots) {
            $candidate = Get-ChildItem -LiteralPath $root -Filter dxc.exe -File -Recurse -ErrorAction SilentlyContinue |
              Where-Object { $_.FullName.IndexOf($x64PathSegment, [StringComparison]::OrdinalIgnoreCase) -ge 0 } |
              Sort-Object FullName -Descending |
              Select-Object -First 1
            if ($candidate) { $dxc = $candidate.FullName; break }
          }
          if (-not $dxc) {
            Write-Warning 'Native x64 dxc.exe was not found; MSBuild remains the final shader check.'
            exit 0
          }

          Write-Host "Using native x64 DXC: $dxc"
          $out = Join-Path $env:RUNNER_TEMP 'dynamic-light-quality-exp14.dxil'
          $psi = [System.Diagnostics.ProcessStartInfo]::new()
          $psi.FileName = $dxc
          $psi.UseShellExecute = $false
          $psi.RedirectStandardOutput = $true
          $psi.RedirectStandardError = $true
          $psi.Arguments = "-T lib_6_3 -Fo `"$out`" `"$hlsl`""
          $proc = [System.Diagnostics.Process]::new()
          $proc.StartInfo = $psi
          if (-not $proc.Start()) { throw 'DXC failed to start.' }
          $stdout = $proc.StandardOutput.ReadToEnd()
          $stderr = $proc.StandardError.ReadToEnd()
          $proc.WaitForExit()
          if ($stdout) { Write-Host $stdout }
          if ($stderr) { Write-Host $stderr }
          if ($proc.ExitCode -ne 0) { throw "DXC failed with exit code $($proc.ExitCode)." }
          if (-not (Test-Path -LiteralPath $out)) { throw 'DXC did not produce the DXIL library.' }

      - name: Install Experiment 14 test config
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          Copy-Item 'dynamic_light_quality_exp14.cfg' 'main/dynamic_light_quality_exp14.cfg' -Force

      - name: Build Dynamic Light Quality Experiment 14 runtime
        shell: pwsh
        working-directory: work
        run: ./scripts/build-windows-stable-clear-v2.2.ps1 -Configuration '${{ inputs.configuration }}'

      - name: Package Experiment 14 DELTA
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          $delta = 'delta-dynamic-light-quality-exp14'
          if (Test-Path $delta) { Remove-Item $delta -Recurse -Force }
          New-Item -ItemType Directory -Path $delta -Force | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $delta 'main') -Force | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $delta 'SOURCE_PATCH') -Force | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $delta 'SOURCE_FILES/src/opengl') -Force | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $delta 'SOURCE_FILES/src/renderer') -Force | Out-Null

          Copy-Item 'dist/WolfSP.exe' $delta -Force
          Copy-Item 'RUN_DYNAMIC_LIGHT_QUALITY_EXP14.bat' $delta -Force
          Copy-Item 'DYNAMIC_LIGHT_QUALITY_EXP14_RUN_AND_COLLECT.ps1' $delta -Force
          Copy-Item 'main/dynamic_light_quality_exp14.cfg' (Join-Path $delta 'main') -Force
          Copy-Item 'patches/200-d3d12-graphics-artifact-fix-v1-production.patch' (Join-Path $delta 'SOURCE_PATCH') -Force
          Copy-Item 'patches/220-d3d12-dynamic-light-quality-exp14.patch' (Join-Path $delta 'SOURCE_PATCH') -Force
          Copy-Item 'src/opengl/gl_d3d12raylight.cpp' (Join-Path $delta 'SOURCE_FILES/src/opengl') -Force
          Copy-Item 'src/opengl/opengl.h' (Join-Path $delta 'SOURCE_FILES/src/opengl') -Force
          Copy-Item 'src/renderer/tr_backend.cpp' (Join-Path $delta 'SOURCE_FILES/src/renderer') -Force
          Copy-Item 'src/renderer/tr_image.cpp' (Join-Path $delta 'SOURCE_FILES/src/renderer') -Force
          Copy-Item 'src/renderer/tr_init.cpp' (Join-Path $delta 'SOURCE_FILES/src/renderer') -Force
          Copy-Item 'src/renderer/tr_local.h' (Join-Path $delta 'SOURCE_FILES/src/renderer') -Force

          @(
            'DarkWolf Dynamic Light Quality Visual Lab 14',
            'Base=Stable Clear v2.2 + Real Mipmaps + Polygon Offset',
            'No temporal, shadow, GI or reflection experiments are included.',
            'F6=production baseline',
            'F7=smooth falloff',
            'F8=warm authored lights',
            'F9=soft highlight clamp',
            'F10=authored-light focus',
            'F11=balanced candidate',
            'F12=cinematic candidate',
            'Run=RUN_DYNAMIC_LIGHT_QUALITY_EXP14.bat',
            'Keep the camera fixed and wait for three captures after every mode key.'
          ) | Set-Content (Join-Path $delta 'README.txt') -Encoding UTF8
          Get-FileHash -Algorithm SHA256 'dist/WolfSP.exe' | Format-List | Out-String |
            Set-Content (Join-Path $delta 'WolfSP_SHA256.txt') -Encoding UTF8

      - name: Upload Dynamic Light Quality Experiment 14 DELTA
        uses: actions/upload-artifact@v4
        with:
          name: DarkWolf-D3D12-Dynamic-Light-Quality-Exp14-${{ inputs.configuration }}
          path: work/delta-dynamic-light-quality-exp14/**
          if-no-files-found: error
          retention-days: 14
