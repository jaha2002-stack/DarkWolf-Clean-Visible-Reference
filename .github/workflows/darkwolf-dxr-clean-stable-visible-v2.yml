name: DarkWolf DXR Clean Stable Visible v2

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: Build configuration
        required: true
        default: Release
        type: choice
        options:
          - Release
          - Debug

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout clean source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Apply proven Clean Visible Reference patch
        shell: pwsh
        run: ./scripts/apply-dxr-clean-reference-rebase.ps1

      - name: Apply stability performance and shadow patch v2
        shell: pwsh
        run: ./scripts/apply-dxr-clean-stable-visible-v2.ps1

      - name: Build Clean Stable Visible v2 runtime
        shell: pwsh
        run: ./scripts/build-windows-clean-stable-visible-v2.ps1 -Configuration '${{ inputs.configuration }}'

      - name: Show packaged files
        shell: pwsh
        run: Get-ChildItem -Path dist -Recurse | Format-Table FullName, Length

      - name: Upload Clean Stable Visible v2 runtime artifact
        uses: actions/upload-artifact@v4
        with:
          name: DarkWolf-DXR-Clean-Stable-Visible-v2-${{ inputs.configuration }}
          path: dist/**
          if-no-files-found: error
