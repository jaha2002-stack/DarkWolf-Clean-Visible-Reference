name: Force Cancel DarkWolf Experiment 19.1

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  force-cancel:
    name: Force-cancel stuck Experiment 19.1 runs
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Force-cancel queued and running Experiment 19.1 runs
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const workflowId = 'darkwolf-d3d12-game-dynamic-lights-exp19_1-compact.yml';
            const statuses = ['queued', 'in_progress', 'waiting', 'pending', 'requested'];
            const results = [];

            for (const status of statuses) {
              const runs = await github.paginate(
                github.rest.actions.listWorkflowRuns,
                {
                  owner,
                  repo,
                  workflow_id: workflowId,
                  status,
                  per_page: 100
                }
              );

              for (const run of runs) {
                try {
                  await github.request(
                    'POST /repos/{owner}/{repo}/actions/runs/{run_id}/force-cancel',
                    {
                      owner,
                      repo,
                      run_id: run.id,
                      headers: {
                        'X-GitHub-Api-Version': '2022-11-28'
                      }
                    }
                  );
                  core.info(`Force-cancel requested for run ${run.id} (${run.status})`);
                  results.push(`- Run ${run.id}: force-cancel requested (${run.status})`);
                } catch (error) {
                  core.warning(`Run ${run.id}: ${error.message}`);
                  results.push(`- Run ${run.id}: failed - ${error.message}`);
                }
              }
            }

            if (results.length === 0) {
              core.info('No queued or running Experiment 19.1 runs were found.');
              results.push('- No queued or running Experiment 19.1 runs were found.');
            }

            await core.summary
              .addHeading('Experiment 19.1 force-cancel result')
              .addRaw(results.join('\n'))
              .write();
