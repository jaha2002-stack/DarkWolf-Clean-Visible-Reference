name: DarkWolf D3D12 Dynamic Light Projection A-B Experiment 11 R2 - Polygon marker validation fix

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: Build configuration
        required: true
        default: Release
        type: choice
        options:
          - Release
          - Debug

jobs:
  build-validate-package:
    runs-on: windows-2022
    steps:
      - name: Checkout canonical Stable Clear v2.2 snapshot
        uses: actions/checkout@v4
        with:
          ref: 229cd5d93b4c24ba705c9821a871cccf31b34b96
          fetch-depth: 1
          path: work

      - name: Materialize Experiment 11 payload
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $files = @(
            [pscustomobject]@{ Path = 'patches/100-d3d12-real-mipmaps-production.patch'; Sha256 = 'A87B006B998BF78F85B5D1139B8DD7CE33F3913DF489175C0F9BC910DADA7558'; Data = '' },
            [pscustomobject]@{ Path = 'patches/110-d3d12-polygon-offset-ab.patch'; Sha256 = '02D59D40DEFFAEAE18D695BF830E095E94FB233E98FB58A96ABF1F54BE04CD7C'; Data = '' },
            [pscustomobject]@{ Path = 'patches/150-d3d12-dynamic-light-projection-exp11.patch'; Sha256 = '588998008E1C721FAFB9A2E06D63849B6F21FE4EA42C4DE6966B5C64C80E3494'; Data = '' },
            [pscustomobject]@{ Path = 'DYNAMIC_LIGHT_PROJECTION_EXP11_RUN_AND_COLLECT.ps1'; Sha256 = 'A75313595E3F33238E6DCD598EE46EA3D41A1053CF42DA6A1B2E994C4213CEF4'; Data = '' },
            [pscustomobject]@{ Path = 'RUN_DYNAMIC_LIGHT_PROJECTION_EXP11.bat'; Sha256 = 'DEE0F958307A14255887AF9C3C491F171AA5DBB2A6582D480A57C69A956CCF06'; Data = '' },
            [pscustomobject]@{ Path = 'main/dynamic_light_projection_exp11.cfg'; Sha256 = 'EB9DA33E7F0FE139DCCBA560BE6997973F6768D1903E8A6B4096B2B7AF0C1EF1'; Data = '' }
          )
          foreach ($file in $files) {
            $target = Join-Path 'work' $file.Path
            $parent = Split-Path -Parent $target
            if ($parent) { New-Item -ItemType Directory -Path $parent -Force | Out-Null }
            [IO.File]::WriteAllBytes($target, [Convert]::FromBase64String($file.Data))
            $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $target).Hash
            if ($actual -ne $file.Sha256) {
              throw "Payload hash mismatch for $($file.Path): expected $($file.Sha256), got $actual"
            }
            Write-Host "Materialized $($file.Path) SHA256=$actual"
          }

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Apply Stable Clear v2.2 chain
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          ./scripts/apply-dxr-clean-reference-rebase.ps1
          ./scripts/apply-dxr-stable-clear-v2.1.ps1
          ./scripts/apply-dxr-stable-clear-v2.2.ps1

      - name: Apply confirmed Real Mipmaps production fix
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          $patch = 'patches/100-d3d12-real-mipmaps-production.patch'
          git apply --check $patch
          if ($LASTEXITCODE -ne 0) { throw 'Production mipmap patch check failed.' }
          git apply $patch
          if ($LASTEXITCODE -ne 0) { throw 'Production mipmap patch failed.' }

      - name: Apply confirmed Polygon Offset implementation
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          $patch = 'patches/110-d3d12-polygon-offset-ab.patch'
          git apply --check $patch
          if ($LASTEXITCODE -ne 0) { throw 'Polygon Offset patch check failed.' }
          git apply $patch
          if ($LASTEXITCODE -ne 0) { throw 'Polygon Offset patch failed.' }

      - name: Apply narrow Dynamic Light Projection experiment
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          $patch = 'patches/150-d3d12-dynamic-light-projection-exp11.patch'
          $headers = @(Select-String -LiteralPath $patch -Pattern '^diff --git a/(.+) b/(.+)$')
          $expected = @(
            'src/renderer/tr_image.cpp',
            'src/renderer/tr_local.h',
            'src/renderer/tr_shade.cpp'
          )
          $changed = @($headers | ForEach-Object { $_.Matches[0].Groups[1].Value } | Sort-Object)
          $expectedSorted = @($expected | Sort-Object)
          if ($changed.Count -ne $expectedSorted.Count -or (Compare-Object $changed $expectedSorted)) {
            throw "Unexpected Experiment 11 patch scope: $($changed -join ', ')"
          }

          git apply --check $patch
          if ($LASTEXITCODE -ne 0) { throw 'Experiment 11 patch check failed.' }
          git apply $patch
          if ($LASTEXITCODE -ne 0) { throw 'Experiment 11 patch failed.' }
          git diff --check
          if ($LASTEXITCODE -ne 0) { throw 'git diff --check failed.' }
          git apply --check -R $patch
          if ($LASTEXITCODE -ne 0) { throw 'Experiment 11 reverse-check failed.' }

          $shade = Get-Content -LiteralPath 'src/renderer/tr_shade.cpp' -Raw
          $image = Get-Content -LiteralPath 'src/renderer/tr_image.cpp' -Raw
          $local = Get-Content -LiteralPath 'src/renderer/tr_local.h' -Raw
          foreach ($marker in @(
            'DLIGHT_EXP11_DISABLED',
            'DLIGHT_EXP11_LEQUAL_16',
            'DLIGHT_EXP11_EQUAL_256_MIPS',
            'DLIGHT_EXP11_LEQUAL_BIAS_256_MIPS',
            'DlightExp11State',
            'DYNAMIC_LIGHT_EXP11 mode=',
            'DYNAMIC_LIGHT_EXP11 branch='
          )) {
            if (-not $shade.Contains($marker)) { throw "Missing tr_shade Experiment 11 marker: $marker" }
          }
          foreach ($marker in @(
            'DLIGHT_EXP11_SIZE 256',
            '*dlight_exp11_256',
            'qtrue',
            'DYNAMIC_LIGHT_EXP11 images'
          )) {
            if (-not $image.Contains($marker)) { throw "Missing tr_image Experiment 11 marker: $marker" }
          }
          if (-not $local.Contains('dlightImageExp11')) { throw 'Missing dlightImageExp11 field.' }
          if (-not $shade.Contains('GLS_DEPTHTEST_DISABLE')) { throw 'F11 depth-test-off control is missing.' }
          if (-not $shade.Contains('glPolygonOffset( -1.0f, -2.0f )')) {
            throw 'Targeted F12 depth-bias control is missing.'
          }
          Write-Host 'Experiment 11 patch scope, reversibility and markers validated.'

      - name: Validate base fixes and exclude Shadow Experiment 10
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          $rendererImage = Get-Content -LiteralPath 'src/renderer/tr_image.cpp' -Raw
          $shim = Get-Content -LiteralPath 'src/opengl/gl_d3d12shim.cpp' -Raw
          $raylight = Get-Content -LiteralPath 'src/opengl/gl_d3d12raylight.cpp' -Raw
          if (-not $rendererImage.Contains('image->mipmap = mipmap;')) {
            throw 'Real Mipmaps renderer-side fix is missing.'
          }
          foreach ($marker in @(
            'extraMipLevels',
            'UploadTextureMipChain',
            'g_qd3d12PolygonOffsetMode',
            'GL_POLYGON_OFFSET_FILL',
            'SlopeScaledDepthBias',
            'DepthBias = (INT)key.polygonOffsetUnits'
          )) {
            if (-not $shim.Contains($marker)) { throw "Confirmed base fix marker missing: $marker" }
          }
          if ($raylight.Contains('SHADOW_EXP10_POINT_SHADOWS_OFF') -or
              $raylight.Contains('AdaptivePointShadowOrigin')) {
            throw 'Shadow Self-Intersection Experiment 10 must not be present in Experiment 11.'
          }
          Write-Host 'Confirmed base fixes present; Shadow Experiment 10 excluded.'

      - name: Build Dynamic Light Projection Experiment 11 runtime
        shell: pwsh
        working-directory: work
        run: ./scripts/build-windows-stable-clear-v2.2.ps1 -Configuration '${{ inputs.configuration }}'

      - name: Package Experiment 11 DELTA only
        shell: pwsh
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          $delta = 'delta-dynamic-light-projection-exp11'
          if (Test-Path $delta) { Remove-Item $delta -Recurse -Force }
          New-Item -ItemType Directory -Path $delta -Force | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $delta 'main') -Force | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $delta 'SOURCE_PATCH') -Force | Out-Null

          if (-not (Test-Path -LiteralPath 'dist/WolfSP.exe')) { throw 'WolfSP.exe was not produced.' }
          Copy-Item 'dist/WolfSP.exe' $delta -Force
          Copy-Item 'DYNAMIC_LIGHT_PROJECTION_EXP11_RUN_AND_COLLECT.ps1' $delta -Force
          Copy-Item 'RUN_DYNAMIC_LIGHT_PROJECTION_EXP11.bat' $delta -Force
          Copy-Item 'main/dynamic_light_projection_exp11.cfg' (Join-Path $delta 'main') -Force
          foreach ($patch in @(
            'patches/100-d3d12-real-mipmaps-production.patch',
            'patches/110-d3d12-polygon-offset-ab.patch',
            'patches/150-d3d12-dynamic-light-projection-exp11.patch'
          )) {
            Copy-Item $patch (Join-Path $delta 'SOURCE_PATCH') -Force
          }

          @(
            'Dynamic Light Projection A/B Experiment 11',
            'Base: Stable Clear v2.2 + confirmed Real Mipmaps + confirmed Polygon Offset.',
            'Shadow Self-Intersection Experiment 10 is intentionally excluded.',
            'Experiment scope: tr_shade.cpp, tr_image.cpp and one image pointer in tr_local.h.',
            'Run RUN_DYNAMIC_LIGHT_PROJECTION_EXP11.bat.',
            'Find an angle where the torch stripes are visible, then keep the camera completely still.',
            'Press F6 through F12 with a 2-3 second pause after each key.',
            'Repeat the sequence from another angle or torch when useful.',
            'F11 is diagnostic only and must never become the production solution.'
          ) | Set-Content (Join-Path $delta 'README.txt') -Encoding UTF8

          Get-FileHash -Algorithm SHA256 -LiteralPath (Join-Path $delta 'WolfSP.exe') |
            Format-List | Out-String | Set-Content (Join-Path $delta 'WOLFSP_SHA256.txt') -Encoding UTF8

      - name: Show DELTA files
        shell: pwsh
        run: Get-ChildItem -Path work/delta-dynamic-light-projection-exp11 -Recurse | Format-Table FullName, Length

      - name: Upload Experiment 11 DELTA
        uses: actions/upload-artifact@v4
        with:
          name: DarkWolf-D3D12-Dynamic-Light-Projection-Exp11-${{ inputs.configuration }}
          path: work/delta-dynamic-light-projection-exp11/**
          if-no-files-found: error
          retention-days: 14
