// Material-Aware Specular / Roughness Visual Lab 16
// Base: Stable Clear v2.2 + Real Mipmaps + Polygon Offset
//       + approved Dynamic Light Quality + approved Atmospheric Fog 15.1
exec dxr_stable_clear_v22.cfg

seta r_dxr 1
seta r_dxrDebugMode 0
seta r_dxrDebug 1
seta r_dxrFallbackLight 1
seta r_dxrFallbackCastsShadows 0
seta r_dxrFallbackLightRadius 900
seta r_dxrFallbackLightIntensity 6.0
seta r_dxrDynamicLightQualityMode 5
seta r_dxrAtmosphereMode 1
seta r_dxrAtmosphereStrength 1.0
seta r_dxrAtmosphereDistanceScale 1.0
seta r_dxrAtmosphereMaxOpacity 0.80
seta r_dxrFogBaseHeight 0.0
seta r_dxrFogHeightFalloff 320.0
seta r_dxrMaterialSpecularMode 0

bind F6  "seta r_dxrMaterialSpecularMode 0; echo MATERIAL16 F6 LEGACY_BASELINE"
bind F7  "seta r_dxrMaterialSpecularMode 1; echo MATERIAL16 F7 ROUGHNESS_CHANNEL_ONLY"
bind F8  "seta r_dxrMaterialSpecularMode 2; echo MATERIAL16 F8 MATERIAL_F0_NO_BRIGHTNESS_METAL_GUESS"
bind F9  "seta r_dxrMaterialSpecularMode 3; echo MATERIAL16 F9 CHARACTERS_MATTE_ONLY"
bind F10 "seta r_dxrMaterialSpecularMode 4; echo MATERIAL16 F10 WORLD_MATTE_ONLY"
bind F11 "seta r_dxrMaterialSpecularMode 5; echo MATERIAL16 F11 BALANCED_MATERIALS"
bind F12 "seta r_dxrMaterialSpecularMode 6; echo MATERIAL16 F12 STRICT_REALISTIC_MATERIALS"

echo "Material-Aware Specular / Roughness Experiment 16 loaded."
echo "Dynamic Light Quality mode 5 and authored map fog are fixed for every material mode."
echo "Use stone walls, a zombie/character, weapon metal, wood and a bright torch."
echo "Keep the camera fixed and press F6-F12, waiting for three captures after every key."
