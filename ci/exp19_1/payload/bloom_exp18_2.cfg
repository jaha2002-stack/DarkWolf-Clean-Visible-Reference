// Bloom Visual Lab 18.2 - Dual-Source Multi-Scale Bloom
// Base: Stable Clear v2.2 + approved production fixes
//       + Dynamic Light Quality 14 + Atmospheric Fog 15.1
//       + Material-Aware Specular 16 R3 + HDR-Like Tone Mapping 17
//       + final-scene architecture from Bloom 18.1
exec dxr_stable_clear_v22.cfg

seta r_dxr 1
seta r_dxrDebugMode 0
seta r_dxrDebug 1
seta r_dxrFallbackLight 1
seta r_dxrFallbackCastsShadows 0
seta r_dxrFallbackLightRadius 900
seta r_dxrFallbackLightIntensity 6.0
seta r_dxrDynamicLightQualityMode 5
seta r_dxrMaterialSpecularMode 5
seta r_dxrAtmosphereMode 1
seta r_dxrAtmosphereStrength 1.0
seta r_dxrAtmosphereDistanceScale 1.0
seta r_dxrAtmosphereMaxOpacity 0.80
seta r_dxrFogBaseHeight 0.0
seta r_dxrFogHeightFalloff 320.0

// Approved Experiment 17 default.
seta r_dxrExposure 1.15
seta r_dxrToneMappingMode 4
seta r_dxrToneMapWhitePoint 4.0
seta r_dxrToneMapSaturation 1.0
seta r_dxrToneMapContrast 1.0

// Bloom 18.2 controls.
// r_dxrBloomThreshold = source A: opaque FP16 HDR threshold.
// r_dxrBloomTransparentThreshold = source B: final SDR scene threshold.
// Source B contains transparent flames/particles, but also the final opaque scene.
seta r_dxrBloomThreshold 1.00
seta r_dxrBloomTransparentThreshold 0.65
seta r_dxrBloomStrength 0.38
seta r_dxrBloomRadius 18.0
seta r_dxrBloomSoftKnee 0.50
seta r_dxrBloomSourceGain 2.50
seta r_dxrBloomScatter 0.72
seta r_dxrBloomHdrWeight 1.00
seta r_dxrBloomTransparentWeight 1.20
seta r_dxrBloomMode 0

bind F6  "seta r_dxrBloomMode 0; echo BLOOM18_2 F6 OFF"
bind F7  "seta r_dxrBloomThreshold 0.80; seta r_dxrBloomTransparentThreshold 0.65; seta r_dxrBloomStrength 1.00; seta r_dxrBloomRadius 18.0; seta r_dxrBloomSoftKnee 0.45; seta r_dxrBloomSourceGain 2.50; seta r_dxrBloomScatter 0.72; seta r_dxrBloomHdrWeight 1.00; seta r_dxrBloomTransparentWeight 1.20; seta r_dxrBloomMode 1; echo BLOOM18_2 F7 HDR_SOURCE_MASK"
bind F8  "seta r_dxrBloomThreshold 1.00; seta r_dxrBloomTransparentThreshold 0.62; seta r_dxrBloomStrength 1.00; seta r_dxrBloomRadius 18.0; seta r_dxrBloomSoftKnee 0.45; seta r_dxrBloomSourceGain 3.00; seta r_dxrBloomScatter 0.72; seta r_dxrBloomHdrWeight 1.00; seta r_dxrBloomTransparentWeight 1.25; seta r_dxrBloomMode 2; echo BLOOM18_2 F8 FINAL_SCENE_SOURCE_MASK"
bind F9  "seta r_dxrBloomThreshold 1.00; seta r_dxrBloomTransparentThreshold 0.65; seta r_dxrBloomStrength 0.45; seta r_dxrBloomRadius 18.0; seta r_dxrBloomSoftKnee 0.50; seta r_dxrBloomSourceGain 2.50; seta r_dxrBloomScatter 0.72; seta r_dxrBloomHdrWeight 1.00; seta r_dxrBloomTransparentWeight 1.20; seta r_dxrBloomMode 3; echo BLOOM18_2 F9 COMBINED_BLOOM_ONLY"
bind F10 "seta r_dxrBloomThreshold 1.40; seta r_dxrBloomTransparentThreshold 0.78; seta r_dxrBloomStrength 0.18; seta r_dxrBloomRadius 12.0; seta r_dxrBloomSoftKnee 0.35; seta r_dxrBloomSourceGain 1.60; seta r_dxrBloomScatter 0.55; seta r_dxrBloomHdrWeight 0.75; seta r_dxrBloomTransparentWeight 0.80; seta r_dxrBloomMode 4; echo BLOOM18_2 F10 SUBTLE_GAMEPLAY"
bind F11 "seta r_dxrBloomThreshold 1.00; seta r_dxrBloomTransparentThreshold 0.65; seta r_dxrBloomStrength 0.38; seta r_dxrBloomRadius 18.0; seta r_dxrBloomSoftKnee 0.50; seta r_dxrBloomSourceGain 2.50; seta r_dxrBloomScatter 0.72; seta r_dxrBloomHdrWeight 1.00; seta r_dxrBloomTransparentWeight 1.20; seta r_dxrBloomMode 5; echo BLOOM18_2 F11 BALANCED_PRODUCTION"
bind F12 "seta r_dxrBloomThreshold 0.65; seta r_dxrBloomTransparentThreshold 0.48; seta r_dxrBloomStrength 0.75; seta r_dxrBloomRadius 28.0; seta r_dxrBloomSoftKnee 0.65; seta r_dxrBloomSourceGain 4.00; seta r_dxrBloomScatter 0.88; seta r_dxrBloomHdrWeight 1.30; seta r_dxrBloomTransparentWeight 1.70; seta r_dxrBloomMode 6; echo BLOOM18_2 F12 STRONG_CINEMATIC"

echo "Bloom Visual Lab 18.2 loaded: DUAL SOURCE + 1/2, 1/4, 1/8, 1/16 pyramid."
echo "F7=opaque HDR source mask, F8=final-scene source mask, F9=combined Bloom only."
echo "Use a torch, lamp, metal highlight, muzzle flash or explosion against a dark background."
echo "Keep the camera fixed and wait about 5 seconds after each key."
