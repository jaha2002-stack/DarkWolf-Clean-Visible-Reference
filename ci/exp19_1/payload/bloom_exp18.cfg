// Bloom Visual Lab 18
// Base: Stable Clear v2.2 + Real Mipmaps + Polygon Offset
//       + Dynamic Light Quality 14 + Fog 15.1 + Material Specular 16 R3
//       + HDR-Like Tone Mapping 17
exec dxr_stable_clear_v22.cfg

seta r_dxr 1
seta r_dxrDebugMode 0
seta r_dxrDebug 1
seta r_dxrFallbackLight 1
seta r_dxrFallbackCastsShadows 0
seta r_dxrFallbackLightRadius 900
seta r_dxrFallbackLightIntensity 6.0
seta r_dxrDynamicLightQualityMode 5
seta r_dxrMaterialSpecularMode 5
seta r_dxrAtmosphereMode 1
seta r_dxrAtmosphereStrength 1.0
seta r_dxrAtmosphereDistanceScale 1.0
seta r_dxrAtmosphereMaxOpacity 0.80
seta r_dxrFogBaseHeight 0.0
seta r_dxrFogHeightFalloff 320.0

// Neutral luminance was the most stable general-purpose result in Experiment 17.
seta r_dxrExposure 1.15
seta r_dxrToneMappingMode 4
seta r_dxrToneMapWhitePoint 4.0
seta r_dxrToneMapSaturation 1.0
seta r_dxrToneMapContrast 1.0

// User controls. Modes apply internal multipliers to these base values.
seta r_dxrBloomThreshold 1.20
seta r_dxrBloomStrength 0.22
seta r_dxrBloomRadius 6.0
seta r_dxrBloomSoftKnee 0.50
seta r_dxrBloomMode 0

bind F6  "seta r_dxrBloomMode 0; echo BLOOM18 F6 OFF"
bind F7  "seta r_dxrBloomMode 1; echo BLOOM18 F7 SUBTLE"
bind F8  "seta r_dxrBloomMode 2; echo BLOOM18 F8 SOFT_TORCH"
bind F9  "seta r_dxrBloomMode 3; echo BLOOM18 F9 HIGH_THRESHOLD_HIGHLIGHTS"
bind F10 "seta r_dxrBloomMode 4; echo BLOOM18 F10 WIDE_ATMOSPHERIC"
bind F11 "seta r_dxrBloomMode 5; echo BLOOM18 F11 BALANCED_CANDIDATE"
bind F12 "seta r_dxrBloomMode 6; echo BLOOM18 F12 CINEMATIC_STRONG"

echo "Bloom Visual Lab 18 loaded."
echo "Tone Mapping mode 4, Material mode 5, Dynamic Light Quality mode 5 and authored fog are fixed."
echo "Use torches, lamps, muzzle flashes, explosions and bright metal highlights."
echo "Keep the camera fixed and press F6-F12, waiting for three captures after every key."
