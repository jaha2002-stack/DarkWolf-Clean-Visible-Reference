// HDR-Like Linear Lighting / Tone Mapping Visual Lab 17
// Base: Stable Clear v2.2 + Real Mipmaps + Polygon Offset
//       + approved Dynamic Light Quality + Fog 15.1 + Material-Aware Specular 16 R3
exec dxr_stable_clear_v22.cfg

seta r_dxr 1
seta r_dxrDebugMode 0
seta r_dxrDebug 1
seta r_dxrFallbackLight 1
seta r_dxrFallbackCastsShadows 0
seta r_dxrFallbackLightRadius 900
seta r_dxrFallbackLightIntensity 6.0
seta r_dxrDynamicLightQualityMode 5
seta r_dxrMaterialSpecularMode 5
seta r_dxrAtmosphereMode 1
seta r_dxrAtmosphereStrength 1.0
seta r_dxrAtmosphereDistanceScale 1.0
seta r_dxrAtmosphereMaxOpacity 0.80
seta r_dxrFogBaseHeight 0.0
seta r_dxrFogHeightFalloff 320.0

seta r_dxrExposure 1.15
seta r_dxrToneMapWhitePoint 4.0
seta r_dxrToneMapSaturation 1.0
seta r_dxrToneMapContrast 1.0
seta r_dxrToneMappingMode 0

bind F6  "seta r_dxrToneMappingMode 0; echo HDR17 F6 LEGACY_LINEAR_CLAMP"
bind F7  "seta r_dxrToneMappingMode 1; echo HDR17 F7 EXTENDED_REINHARD"
bind F8  "seta r_dxrToneMappingMode 2; echo HDR17 F8 ACES_FITTED"
bind F9  "seta r_dxrToneMappingMode 3; echo HDR17 F9 HABLE_FILMIC"
bind F10 "seta r_dxrToneMappingMode 4; echo HDR17 F10 NEUTRAL_LUMINANCE"
bind F11 "seta r_dxrToneMappingMode 5; echo HDR17 F11 BALANCED_HDR_CANDIDATE"
bind F12 "seta r_dxrToneMappingMode 6; echo HDR17 F12 CINEMATIC_HDR_CANDIDATE"

echo "HDR-Like Lighting / Tone Mapping Experiment 17 loaded."
echo "Material mode 5, Dynamic Light Quality mode 5 and authored map fog are fixed."
echo "Use a scene with a bright torch, white wall highlights, deep shadows and visible material detail."
echo "Keep the camera fixed and press F6-F12, waiting for three captures after every key."
