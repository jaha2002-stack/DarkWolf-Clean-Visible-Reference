// DarkWolf Experiment 19.1 - transient/muzzle light isolation
// Preserved base: Stable Clear v2.2 + Real Mipmaps + Polygon Offset
// + Dynamic Light Quality 14 + Fog 15.1 + Materials 16 R3
// + HDR Tone Mapping 17 + Bloom 18.2.
exec dxr_stable_clear_v22.cfg

seta r_dxr 1
seta r_dxrDebug 1
seta r_dxrGameDynamicLightDebug 1
seta r_dxrDynamicLightQualityMode 5
seta r_dxrMaterialSpecularMode 5
seta r_dxrAtmosphereMode 1
seta r_dxrExposure 1.15
seta r_dxrToneMappingMode 4
seta r_dxrBloomMode 5
seta r_dxrBloomThreshold 1.00
seta r_dxrBloomTransparentThreshold 0.65
seta r_dxrBloomStrength 0.38
seta r_dxrBloomRadius 18.0
seta r_dxrBloomSoftKnee 0.50
seta r_dxrBloomSourceGain 2.50
seta r_dxrBloomScatter 0.72
seta r_dxrBloomHdrWeight 1.00
seta r_dxrBloomTransparentWeight 1.20

seta r_dxrGameDynamicLights 1
seta r_dxrGameDynamicLightStrength 1.0
seta r_dxrGameDynamicLightRadiusScale 1.0
seta r_dxrGameDynamicLightShadows 1
seta r_dxrGameLightFilterMode 0
seta r_dxrTransientLightStrength 1.0
seta r_dxrTransientLightRadiusScale 1.0
seta r_dxrTransientLightMaxDistance 224
seta r_dxrTransientLightMaxRadius 512
seta r_dxrTransientLightLifetimeFrames 10
seta r_dxrTransientLightReservedSlots 0
seta r_dxrTransientLightShadows 0

// F4 is an emergency attack release.
bind F4 "-attack; echo EXP19_1 ATTACK_RELEASED"

// F5 performs a repeatable pre-shot / shot / post-shot sequence.
set exp191_capture "screenshotJPEG; wait 4; +attack; wait 1; screenshotJPEG; wait 2; screenshotJPEG; wait 3; -attack; wait 10; screenshotJPEG; echo EXP19_1 CAPTURE_SEQUENCE_COMPLETE"
bind F5 "vstr exp191_capture"

// F6: exact production reference. Transient classification has no effect.
bind F6 "-attack; seta r_dxrDebugMode 0; seta r_dxrAmbientIntensity 1.35; seta r_dxrLegacyBlend 0.65; seta r_dxrBloomMode 5; seta r_dxrFallbackLight 1; seta r_dxrGameDynamicLights 1; seta r_dxrGameLightFilterMode 0; seta r_dxrGameDynamicLightStrength 1.0; seta r_dxrGameDynamicLightRadiusScale 1.0; seta r_dxrGameDynamicLightShadows 1; seta r_dxrTransientLightStrength 1.0; seta r_dxrTransientLightRadiusScale 1.0; seta r_dxrTransientLightReservedSlots 0; seta r_dxrTransientLightShadows 0; echo GAME_DLIGHT_EXP19_1 F6 PRODUCTION_REFERENCE"

// F7: causal control - no RTCW game dlights are submitted to DXR.
bind F7 "-attack; seta r_dxrDebugMode 0; seta r_dxrAmbientIntensity 1.35; seta r_dxrLegacyBlend 0.65; seta r_dxrBloomMode 5; seta r_dxrFallbackLight 1; seta r_dxrGameDynamicLights 0; seta r_dxrGameLightFilterMode 0; seta r_dxrTransientLightReservedSlots 0; echo GAME_DLIGHT_EXP19_1 F7 GAME_LIGHTS_OFF"

// F8: persistent/map game dlights only, without the camera fallback.
bind F8 "-attack; seta r_dxrDebugMode 0; seta r_dxrAmbientIntensity 1.35; seta r_dxrLegacyBlend 0.65; seta r_dxrBloomMode 5; seta r_dxrFallbackLight 0; seta r_dxrGameDynamicLights 1; seta r_dxrGameLightFilterMode 1; seta r_dxrGameDynamicLightStrength 1.0; seta r_dxrGameDynamicLightRadiusScale 1.0; seta r_dxrGameDynamicLightShadows 1; seta r_dxrTransientLightReservedSlots 0; echo GAME_DLIGHT_EXP19_1 F8 PERSISTENT_ONLY"

// F9: transient candidates only; two slots reserved; no shadow rays.
bind F9 "-attack; seta r_dxrDebugMode 0; seta r_dxrAmbientIntensity 1.35; seta r_dxrLegacyBlend 0.65; seta r_dxrBloomMode 5; seta r_dxrFallbackLight 0; seta r_dxrGameDynamicLights 1; seta r_dxrGameLightFilterMode 2; seta r_dxrTransientLightStrength 3.0; seta r_dxrTransientLightRadiusScale 1.0; seta r_dxrTransientLightReservedSlots 2; seta r_dxrTransientLightShadows 0; echo GAME_DLIGHT_EXP19_1 F9 TRANSIENT_ONLY_NO_SHADOWS"

// F10: transient lighting-only diagnostic on a dark base.
bind F10 "-attack; seta r_dxrDebugMode 1; seta r_dxrAmbientIntensity 0.0; seta r_dxrLegacyBlend 0.0; seta r_dxrBloomMode 0; seta r_dxrFallbackLight 0; seta r_dxrGameDynamicLights 1; seta r_dxrGameLightFilterMode 2; seta r_dxrTransientLightStrength 4.0; seta r_dxrTransientLightRadiusScale 1.0; seta r_dxrTransientLightReservedSlots 2; seta r_dxrTransientLightShadows 0; echo GAME_DLIGHT_EXP19_1 F10 TRANSIENT_LIGHTING_ONLY"

// F11: strong transient-only normal scene, no shadow rays.
bind F11 "-attack; seta r_dxrDebugMode 0; seta r_dxrAmbientIntensity 1.35; seta r_dxrLegacyBlend 0.65; seta r_dxrBloomMode 5; seta r_dxrFallbackLight 0; seta r_dxrGameDynamicLights 1; seta r_dxrGameLightFilterMode 2; seta r_dxrTransientLightStrength 5.0; seta r_dxrTransientLightRadiusScale 1.15; seta r_dxrTransientLightReservedSlots 2; seta r_dxrTransientLightShadows 0; echo GAME_DLIGHT_EXP19_1 F11 TRANSIENT_STRONG_NO_SHADOWS"

// F12: all normal lights plus prioritized transient candidates and transient shadows.
bind F12 "-attack; seta r_dxrDebugMode 0; seta r_dxrAmbientIntensity 1.35; seta r_dxrLegacyBlend 0.65; seta r_dxrBloomMode 5; seta r_dxrFallbackLight 1; seta r_dxrGameDynamicLights 1; seta r_dxrGameLightFilterMode 0; seta r_dxrGameDynamicLightStrength 1.0; seta r_dxrGameDynamicLightRadiusScale 1.0; seta r_dxrGameDynamicLightShadows 1; seta r_dxrTransientLightStrength 3.0; seta r_dxrTransientLightRadiusScale 1.10; seta r_dxrTransientLightReservedSlots 2; seta r_dxrTransientLightShadows 1; echo GAME_DLIGHT_EXP19_1 F12 ALL_PLUS_PRIORITIZED_TRANSIENT"

echo "Experiment 19.1 loaded. Wait 3 seconds in a fixed position, press F6-F12, then press F5 once."
echo "Use F4 if attack remains held. Exit normally after all modes."
