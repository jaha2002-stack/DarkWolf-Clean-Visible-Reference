// DarkWolf Game Dynamic Lights Bridge Experiment 19
// Base preserved: Stable Clear v2.2 + Real Mipmaps + Polygon Offset
// + Dynamic Light Quality 14 + Atmospheric Fog 15.1
// + Material-Aware Specular/Roughness 16 R3
// + HDR-Like Tone Mapping 17 + Bloom 18.2.
exec dxr_stable_clear_v22.cfg

seta r_dxr 1
seta r_dxrDebug 1
seta r_dxrDebugMode 0
seta r_dxrGameDynamicLightDebug 1

// Keep the approved visual stack fixed while testing only the game-light bridge.
seta r_dxrDynamicLightQualityMode 5
seta r_dxrMaterialSpecularMode 5
seta r_dxrAtmosphereMode 1
seta r_dxrAtmosphereStrength 1.0
seta r_dxrAtmosphereDistanceScale 1.0
seta r_dxrAtmosphereMaxOpacity 0.80
seta r_dxrFogBaseHeight 0.0
seta r_dxrFogHeightFalloff 320.0
seta r_dxrExposure 1.15
seta r_dxrToneMappingMode 4
seta r_dxrToneMapWhitePoint 4.0
seta r_dxrToneMapSaturation 1.0
seta r_dxrToneMapContrast 1.0
seta r_dxrBloomThreshold 1.00
seta r_dxrBloomTransparentThreshold 0.65
seta r_dxrBloomStrength 0.38
seta r_dxrBloomRadius 18.0
seta r_dxrBloomSoftKnee 0.50
seta r_dxrBloomSourceGain 2.50
seta r_dxrBloomScatter 0.72
seta r_dxrBloomHdrWeight 1.00
seta r_dxrBloomTransparentWeight 1.20
seta r_dxrBloomMode 5

// F6: compatibility reference. Same bridge strength/radius/shadow behavior as before Exp19.
bind F6  "seta r_dxrFallbackLight 1; seta r_dxrFallbackCastsShadows 0; seta r_dxrGameDynamicLights 1; seta r_dxrGameDynamicLightStrength 1.00; seta r_dxrGameDynamicLightRadiusScale 1.00; seta r_dxrGameDynamicLightShadows 1; echo GAME_DLIGHT_EXP19 F6 PRODUCTION_REFERENCE"

// F7: causal control. No game-authored transient lights; fallback remains unchanged.
bind F7  "seta r_dxrFallbackLight 1; seta r_dxrFallbackCastsShadows 0; seta r_dxrGameDynamicLights 0; seta r_dxrGameDynamicLightStrength 1.00; seta r_dxrGameDynamicLightRadiusScale 1.00; seta r_dxrGameDynamicLightShadows 1; echo GAME_DLIGHT_EXP19 F7 GAME_LIGHTS_OFF"

// F8: isolate the existing game-light bridge without the camera-side fallback.
bind F8  "seta r_dxrFallbackLight 0; seta r_dxrGameDynamicLights 1; seta r_dxrGameDynamicLightStrength 1.00; seta r_dxrGameDynamicLightRadiusScale 1.00; seta r_dxrGameDynamicLightShadows 1; echo GAME_DLIGHT_EXP19 F8 ISOLATED_BASELINE_SHADOWS_ON"

// F9: same as F8, but point-shadow rays are disabled only for game lights.
bind F9  "seta r_dxrFallbackLight 0; seta r_dxrGameDynamicLights 1; seta r_dxrGameDynamicLightStrength 1.00; seta r_dxrGameDynamicLightRadiusScale 1.00; seta r_dxrGameDynamicLightShadows 0; echo GAME_DLIGHT_EXP19 F9 ISOLATED_SHADOWS_OFF"

// F10: conservative visible candidate.
bind F10 "seta r_dxrFallbackLight 0; seta r_dxrGameDynamicLights 1; seta r_dxrGameDynamicLightStrength 1.50; seta r_dxrGameDynamicLightRadiusScale 1.10; seta r_dxrGameDynamicLightShadows 1; echo GAME_DLIGHT_EXP19 F10 BALANCED_NO_FALLBACK"

// F11: stronger diagnostic candidate to prove the bridge signal.
bind F11 "seta r_dxrFallbackLight 0; seta r_dxrGameDynamicLights 1; seta r_dxrGameDynamicLightStrength 2.25; seta r_dxrGameDynamicLightRadiusScale 1.20; seta r_dxrGameDynamicLightShadows 1; echo GAME_DLIGHT_EXP19 F11 ENHANCED_NO_FALLBACK"

// F12: proposed production-style combination if the test is visually accepted.
bind F12 "seta r_dxrFallbackLight 1; seta r_dxrFallbackCastsShadows 0; seta r_dxrGameDynamicLights 1; seta r_dxrGameDynamicLightStrength 1.50; seta r_dxrGameDynamicLightRadiusScale 1.10; seta r_dxrGameDynamicLightShadows 1; echo GAME_DLIGHT_EXP19 F12 PRODUCTION_CANDIDATE"

echo "Game Dynamic Lights Bridge Experiment 19 loaded."
echo "Stand close to a wall with a firearm. Press F6-F12 and fire repeatedly for 4-6 seconds after each key."
echo "The collector captures a rapid burst automatically; keep the camera position unchanged."
