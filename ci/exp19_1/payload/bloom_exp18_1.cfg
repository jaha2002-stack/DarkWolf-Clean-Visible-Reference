// Bloom Visual Lab 18.1 - Final Scene Bloom
// Base: Stable Clear v2.2 + approved production fixes
//       + Dynamic Light Quality 14 + Atmospheric Fog 15.1
//       + Material-Aware Specular 16 R3 + HDR-Like Tone Mapping 17
//       + rejected pre-transparent Bloom 18 code disabled by patch 261
exec dxr_stable_clear_v22.cfg

seta r_dxr 1
seta r_dxrDebugMode 0
seta r_dxrDebug 1
seta r_dxrFallbackLight 1
seta r_dxrFallbackCastsShadows 0
seta r_dxrFallbackLightRadius 900
seta r_dxrFallbackLightIntensity 6.0
seta r_dxrDynamicLightQualityMode 5
seta r_dxrMaterialSpecularMode 5
seta r_dxrAtmosphereMode 1
seta r_dxrAtmosphereStrength 1.0
seta r_dxrAtmosphereDistanceScale 1.0
seta r_dxrAtmosphereMaxOpacity 0.80
seta r_dxrFogBaseHeight 0.0
seta r_dxrFogHeightFalloff 320.0

// Approved Experiment 17 default.
seta r_dxrExposure 1.15
seta r_dxrToneMappingMode 4
seta r_dxrToneMapWhitePoint 4.0
seta r_dxrToneMapSaturation 1.0
seta r_dxrToneMapContrast 1.0

// Final-scene SDR bloom defaults. The pass runs after transparent 3D effects
// and before the HUD, so thresholds are intentionally below 1.0.
seta r_dxrBloomThreshold 0.72
seta r_dxrBloomStrength 0.26
seta r_dxrBloomRadius 10.0
seta r_dxrBloomSoftKnee 0.35
seta r_dxrBloomMode 0

bind F6  "seta r_dxrBloomThreshold 0.72; seta r_dxrBloomStrength 0.00; seta r_dxrBloomRadius 10.0; seta r_dxrBloomSoftKnee 0.35; seta r_dxrBloomMode 0; echo BLOOM18_1 F6 OFF"
bind F7  "seta r_dxrBloomThreshold 0.70; seta r_dxrBloomStrength 1.00; seta r_dxrBloomRadius 10.0; seta r_dxrBloomSoftKnee 0.35; seta r_dxrBloomMode 1; echo BLOOM18_1 F7 BRIGHT_PASS_MASK"
bind F8  "seta r_dxrBloomThreshold 0.70; seta r_dxrBloomStrength 1.00; seta r_dxrBloomRadius 12.0; seta r_dxrBloomSoftKnee 0.35; seta r_dxrBloomMode 2; echo BLOOM18_1 F8 BLOOM_ONLY"
bind F9  "seta r_dxrBloomThreshold 0.82; seta r_dxrBloomStrength 0.16; seta r_dxrBloomRadius 8.0;  seta r_dxrBloomSoftKnee 0.25; seta r_dxrBloomMode 3; echo BLOOM18_1 F9 SUBTLE"
bind F10 "seta r_dxrBloomThreshold 0.68; seta r_dxrBloomStrength 0.32; seta r_dxrBloomRadius 12.0; seta r_dxrBloomSoftKnee 0.40; seta r_dxrBloomMode 4; echo BLOOM18_1 F10 TORCH_LAMPS"
bind F11 "seta r_dxrBloomThreshold 0.72; seta r_dxrBloomStrength 0.26; seta r_dxrBloomRadius 10.0; seta r_dxrBloomSoftKnee 0.35; seta r_dxrBloomMode 5; echo BLOOM18_1 F11 BALANCED"
bind F12 "seta r_dxrBloomThreshold 0.58; seta r_dxrBloomStrength 0.55; seta r_dxrBloomRadius 16.0; seta r_dxrBloomSoftKnee 0.50; seta r_dxrBloomMode 6; echo BLOOM18_1 F12 CINEMATIC_STRONG"

echo "Bloom Visual Lab 18.1 loaded: FINAL SCENE after particles, before HUD."
echo "F7 must show the bright-pass mask. F8 must show bloom only."
echo "Use a torch, muzzle flash, explosion, smoke and a dark wall."
echo "Keep the camera fixed and wait about 5 seconds after each key."
