// QL3.1 quality profile. Use only after BALANCED starts and remains stable.
exec dxr_v22_ql31_balanced.cfg
seta r_dxrMaxLights 96
seta r_dxrLightSelectionLocalReserve 40
seta r_dxrShadowSamples 8
seta r_dxrRectShadowSamples 8
seta r_dxrPointShadowRadiusScale 0.020
seta r_dxrPointShadowRadiusMin 0.35
seta r_dxrPointShadowRadiusMax 10.0
seta r_dxrShadowRetention 0.66
seta r_dxrLegacyShadowStrength 0.87
seta r_dxrShadowMinVisibility 0.035
seta r_dxrContactShadows 1
seta r_dxrContactShadowLength 72
seta r_dxrDynamicBLASRebuildThreshold 0.20
seta r_dxrDynamicBLASRebuildInterval 90
seta r_dxrShadowTemporal 0
seta r_dxrShadowSpatialRadius 0
seta r_dxrDebugMode 0
