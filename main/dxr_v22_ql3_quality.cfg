// QL3 high-quality profile. Use only after BALANCED is stable.
exec dxr_v22_ql3_balanced.cfg
seta r_dxrMaxLights 96
seta r_dxrLightSelectionLocalReserve 40
seta r_dxrShadowSamples 8
seta r_dxrRectShadowSamples 8
seta r_dxrPointShadowRadiusScale 0.024
seta r_dxrPointShadowRadiusMax 14.0
seta r_dxrShadowTemporalWeight 0.87
seta r_dxrShadowTemporalDepthThreshold 3.5
seta r_dxrShadowTemporalNormalThreshold 0.86
seta r_dxrShadowTemporalResponse 5.0
seta r_dxrShadowSpatialRadius 2
seta r_dxrShadowSpatialDepthSigma 4.0
seta r_dxrShadowSpatialNormalPower 32.0
seta r_dxrShadowRetention 0.66
seta r_dxrLegacyShadowStrength 0.87
seta r_dxrShadowMinVisibility 0.035
seta r_dxrContactShadows 1
seta r_dxrContactShadowLength 72
seta r_dxrDynamicBLASRebuildThreshold 0.20
seta r_dxrDynamicBLASRebuildInterval 90
seta r_dxrDebugMode 0
