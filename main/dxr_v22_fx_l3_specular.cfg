// DarkWolf DXR v2.2 Effects Labs 3-6 Safe - Lab 3
// Stable v2.2 base, direct cast shadows disabled, specular/material response only.
exec dxr_stable_clear_v22.cfg
seta r_dxrCastShadows 0
seta r_dxrShadowStrength 0.0
seta r_dxrLegacyShadowStrength 0.0
seta r_dxrContactShadows 0
seta r_dxrAOSamples 0
seta r_dxrContactAO 0
seta r_dxrSkySamples 0
seta r_dxrSkyStrength 1.0
seta r_dxrGI 0
seta r_dxrReflections 0
seta r_dxrSpecular 1
seta r_dxrSpecularStrength 0.78
seta r_dxrSpecularPower 56
seta r_dxrCavityStrength 0.10
seta r_dxrDebugMode 0
