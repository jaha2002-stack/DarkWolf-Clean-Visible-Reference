// DarkWolf RTCW DXR Stable Clear v2.2 - PRIMARY VISUAL-CORRECT PROFILE
seta r_dxr 1

// Preserve the successful warm Clean Reference fill, but do not let this
// camera-following helper cast physical world shadows.
seta r_dxrFallbackLight 1
seta r_dxrFallbackCastsShadows 0
seta r_dxrFallbackLightRadius 900
seta r_dxrFallbackLightIntensity 6.0

seta r_dxrAmbientIntensity 1.35
seta r_dxrLegacyBlend 0.65
seta r_dxrExposure 1.15
seta r_dxrShadowBias 0.050

// Proven ordered path retained unchanged from stable v2.1.
seta r_dxrSafeMode 1
seta r_dxrErrorLimit 4
seta r_dxrFenceWaitMs 10000
seta r_dxrAsyncSubmit 0
seta r_dxrCpuSync 1
seta r_dxrBuildInterval 1
seta r_dxrDispatchInterval 1

// Deterministic gameplay budget. Source fixes in v2.2 address self-shadowing,
// world-position precision and invalid G-buffer pixels rather than hiding them
// behind stochastic sample noise.
seta r_dxrMaxLights 24
seta r_dxrShadowSamples 1
seta r_dxrRectShadowSamples 1
seta r_dxrAOSamples 0
seta r_dxrSkySamples 0
seta r_dxrShadowStrength 0.90
seta r_dxrLegacyShadowStrength 0.35
seta r_dxrShadowMinVisibility 0.12
seta r_dxrContactShadows 0
seta r_dxrContactShadowLength 72
seta r_dxrAlphaShadowGeometry 0

// Use the source textures at their native resolution. The v2.2 renderer also
// uses 8x anisotropic sampling; this cannot create detail absent from old assets.
seta r_picmip 0
seta r_picmip2 0
seta r_roundImagesDown 0
seta r_simpleMipMaps 0
seta r_texturebits 32
seta r_textureMode GL_LINEAR_MIPMAP_LINEAR

seta r_dxrDebug 1
seta r_dxrDebugMode 0
