// DarkWolf RTCW DXR Stable Clear v2.2 Quality Lab 2 - PRIMARY RELEASE CANDIDATE
seta r_dxr 1

// Proven clean-reference fill. It remains non-shadow-casting and cannot rotate
// world shadows. QL1's tighter falloff/highlight compression remain enabled.
seta r_dxrFallbackLight 1
seta r_dxrFallbackCastsShadows 0
seta r_dxrFallbackLightRadius 900
seta r_dxrFallbackLightIntensity 6.0
seta r_dxrFallbackDiffuseScale 0.30
seta r_dxrHighlightCompression 1.0

// Preserve the accepted v2.2 look. QL2 fixes the composite in source rather
// than globally darkening the game through aggressive CVar changes.
seta r_dxrAmbientIntensity 1.35
seta r_dxrLegacyBlend 0.65
seta r_dxrExposure 1.15
seta r_dxrShadowBias 0.035

// Ray-confirmed local silhouettes survive ambient/lightmap/fallback fill.
// Evidence is zero when no occluder is found, preventing light-radius circles.
seta r_dxrShadowRetention 0.60
seta r_dxrShadowCompositeMinLight 0.025

// Animated vertex geometry (characters, corpses, swinging cage models) gets a
// real BLAS rebuild when its tessellated vertices change. Rigid doors still use
// cheap TLAS transform updates because their local geometry hash is unchanged.
seta r_dxrDynamicBLASFullRebuild 1

// Confirmed stable v2.2 execution path. Do not change for the first tests.
seta r_dxrSafeMode 1
seta r_dxrErrorLimit 4
seta r_dxrFenceWaitMs 10000
seta r_dxrAsyncSubmit 0
seta r_dxrCpuSync 1
seta r_dxrBuildInterval 1
seta r_dxrDispatchInterval 1

seta r_dxrMaxLights 64
seta r_dxrShadowSamples 4
seta r_dxrRectShadowSamples 4
seta r_dxrAOSamples 0
seta r_dxrSkySamples 0
seta r_dxrShadowStrength 1.0
seta r_dxrLegacyShadowStrength 0.82
seta r_dxrShadowMinVisibility 0.05
seta r_dxrContactShadows 0
seta r_dxrContactShadowLength 96
seta r_dxrAlphaShadowGeometry 1

seta r_picmip 0
seta r_picmip2 0
seta r_roundImagesDown 0
seta r_simpleMipMaps 0
seta r_texturebits 32
seta r_textureMode GL_LINEAR_MIPMAP_LINEAR

seta r_dxrDebug 1
seta r_dxrDebugLights 0
seta r_dxrDebugMode 0
