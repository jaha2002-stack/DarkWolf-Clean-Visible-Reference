// Image Cleanup / Quality Polish Fix - Max Clean SAFE HOTFIX
// Strong cleanup bias without AO=4 / Sky=4 startup load.
exec dxr_v22_cleanup_soft.cfg
seta r_dxrMaxLights 24
seta r_dxrAOSamples 3
seta r_dxrAORadius 18
seta r_dxrAOStrength 0.25
seta r_dxrContactAO 1
seta r_dxrContactAORadius 5
seta r_dxrContactAOStrength 0.15
seta r_dxrSkySamples 3
seta r_dxrSkyStrength 0.75
seta r_dxrGI 1
seta r_dxrGISamples 1
seta r_dxrGIStrength 0.026
seta r_dxrGIMaxDistance 116
seta r_dxrReflections 1
seta r_dxrReflectionSamples 1
seta r_dxrReflectionStrength 0.018
seta r_dxrReflectionMaxDistance 400
seta r_dxrReflectionRoughness 0.23
seta r_dxrSpecular 1
seta r_dxrSpecularStrength 0.43
seta r_dxrSpecularPower 36
seta r_dxrIndirectClamp 0.17
seta r_dxrReflectionClamp 0.09
seta r_dxrAmbientIntensity 1.21
seta r_dxrLegacyBlend 0.81
seta r_dxrExposure 1.03
seta r_dxrDebugMode 0
