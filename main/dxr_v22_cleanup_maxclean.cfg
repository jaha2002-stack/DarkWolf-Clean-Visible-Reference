exec dxr_v22_fx_l6_indirect.cfg
seta r_dxrMaxLights 24
seta r_dxrAOSamples 4
seta r_dxrAORadius 18
seta r_dxrAOStrength 0.26
seta r_dxrContactAO 1
seta r_dxrContactAORadius 5
seta r_dxrContactAOStrength 0.16
seta r_dxrSkySamples 4
seta r_dxrSkyStrength 0.76
seta r_dxrGI 1
seta r_dxrGISamples 1
seta r_dxrGIStrength 0.028
seta r_dxrGIMaxDistance 120
seta r_dxrReflections 1
seta r_dxrReflectionSamples 1
seta r_dxrReflectionStrength 0.020
seta r_dxrReflectionMaxDistance 420
seta r_dxrReflectionRoughness 0.24
seta r_dxrSpecular 1
seta r_dxrSpecularStrength 0.45
seta r_dxrSpecularPower 38
seta r_dxrIndirectClamp 0.18
seta r_dxrReflectionClamp 0.10
