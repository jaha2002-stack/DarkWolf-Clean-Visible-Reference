// Image Cleanup / Quality Polish Fix - Soft cleanup
// Minimum-risk gameplay preset focused on reducing grain and floor/edge streaks.
exec dxr_v22_fx_l6_indirect.cfg
seta r_dxrMaxLights 24
seta r_dxrAOSamples 2
seta r_dxrAORadius 18
seta r_dxrAOStrength 0.28
seta r_dxrContactAO 1
seta r_dxrContactAORadius 6
seta r_dxrContactAOStrength 0.18
seta r_dxrSkySamples 2
seta r_dxrSkyStrength 0.78
seta r_dxrGI 1
seta r_dxrGISamples 1
seta r_dxrGIStrength 0.032
seta r_dxrGIMaxDistance 128
seta r_dxrReflections 1
seta r_dxrReflectionSamples 1
seta r_dxrReflectionStrength 0.030
seta r_dxrReflectionMaxDistance 480
seta r_dxrReflectionRoughness 0.28
seta r_dxrSpecular 1
seta r_dxrSpecularStrength 0.52
seta r_dxrSpecularPower 42
seta r_dxrIndirectClamp 0.20
seta r_dxrReflectionClamp 0.12
seta r_dxrAmbientIntensity 1.24
seta r_dxrLegacyBlend 0.75
