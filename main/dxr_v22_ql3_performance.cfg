// Lower-cost QL3 profile with temporal stabilization retained.
exec dxr_v22_ql3_balanced.cfg
seta r_dxrMaxLights 64
seta r_dxrLightSelectionLocalReserve 24
seta r_dxrShadowSamples 2
seta r_dxrRectShadowSamples 2
seta r_dxrPointShadowRadiusScale 0.015
seta r_dxrPointShadowRadiusMax 8.0
seta r_dxrShadowTemporalWeight 0.78
seta r_dxrShadowSpatialRadius 1
seta r_dxrShadowSpatialDepthSigma 3.0
seta r_dxrShadowSpatialNormalPower 24.0
seta r_dxrDebugMode 0
