// DarkWolf RTCW DXR Stable Clear v2.2 Quality Lab 1 - PRIMARY TEST
seta r_dxr 1

// Preserve the successful Clean Reference fill, but limit its broad diffuse
// footprint and keep it out of the physical shadow mask.
seta r_dxrFallbackLight 1
seta r_dxrFallbackCastsShadows 0
seta r_dxrFallbackLightRadius 900
seta r_dxrFallbackLightIntensity 6.0
seta r_dxrFallbackDiffuseScale 0.30

// Full ACES shoulder removes clipped white light discs. Set to 0 only for A/B.
seta r_dxrHighlightCompression 1.0

seta r_dxrAmbientIntensity 1.35
seta r_dxrLegacyBlend 0.65
seta r_dxrExposure 1.15
seta r_dxrShadowBias 0.035

// Proven stable v2.2 execution path. Do not change during Quality Lab 1.
seta r_dxrSafeMode 1
seta r_dxrErrorLimit 4
seta r_dxrFenceWaitMs 10000
seta r_dxrAsyncSubmit 0
seta r_dxrCpuSync 1
seta r_dxrBuildInterval 1
seta r_dxrDispatchInterval 1

// Quality Lab 1 evaluates authored direct lights and their aggregate visibility.
seta r_dxrMaxLights 64
seta r_dxrShadowSamples 4
seta r_dxrRectShadowSamples 4
seta r_dxrAOSamples 0
seta r_dxrSkySamples 0
seta r_dxrShadowStrength 1.0
seta r_dxrLegacyShadowStrength 0.78
seta r_dxrShadowMinVisibility 0.05
seta r_dxrContactShadows 0
seta r_dxrContactShadowLength 96
seta r_dxrAlphaShadowGeometry 1

seta r_picmip 0
seta r_picmip2 0
seta r_roundImagesDown 0
seta r_simpleMipMaps 0
seta r_texturebits 32
seta r_textureMode GL_LINEAR_MIPMAP_LINEAR

seta r_dxrDebug 1
seta r_dxrDebugLights 0
seta r_dxrDebugMode 0
