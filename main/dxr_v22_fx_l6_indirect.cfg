// Lab 6 - conservative visibility-based indirect diffuse and environment reflections.
// These are safe approximations using the existing v2.2 BVH and output UAV.
exec dxr_v22_fx_l5_sky.cfg
seta r_dxrGI 1
seta r_dxrGISamples 1
seta r_dxrGIStrength 0.045
seta r_dxrGIMaxDistance 160
seta r_dxrReflections 1
seta r_dxrReflectionSamples 1
seta r_dxrReflectionStrength 0.050
seta r_dxrReflectionMaxDistance 640
seta r_dxrReflectionRoughness 0.45
seta r_dxrSpecularStrength 0.78
seta r_dxrSpecularPower 60
seta r_dxrIndirectClamp 0.26
seta r_dxrReflectionClamp 0.18
