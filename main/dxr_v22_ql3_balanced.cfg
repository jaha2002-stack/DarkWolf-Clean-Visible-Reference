// DarkWolf RTCW DXR Stable Clear v2.2 Quality Lab 3 - PRIMARY PROFILE
seta r_dxr 1

// Proven non-shadowing Clean Reference fill and white-circle protection.
seta r_dxrFallbackLight 1
seta r_dxrFallbackCastsShadows 0
seta r_dxrFallbackLightRadius 900
seta r_dxrFallbackLightIntensity 6.0
seta r_dxrFallbackDiffuseScale 0.30
seta r_dxrHighlightCompression 1.0

// Preserve the accepted RTCW look and QL2 shadow authority.
seta r_dxrAmbientIntensity 1.35
seta r_dxrLegacyBlend 0.65
seta r_dxrExposure 1.15
seta r_dxrShadowBias 0.035
seta r_dxrShadowRetention 0.62
seta r_dxrShadowCompositeMinLight 0.025

// QL3 point-source size: compact close contact plus a gradual penumbra.
seta r_dxrPointShadowRadiusScale 0.018
seta r_dxrPointShadowRadiusMin 0.35
seta r_dxrPointShadowRadiusMax 10.0

// QL3 motion-vector reprojection and edge-aware history resolve.
seta r_dxrShadowTemporal 1
seta r_dxrShadowTemporalWeight 0.82
seta r_dxrShadowTemporalDepthThreshold 4.0
seta r_dxrShadowTemporalNormalThreshold 0.84
seta r_dxrShadowTemporalResponse 4.5
seta r_dxrShadowSpatialRadius 1
seta r_dxrShadowSpatialDepthSigma 3.5
seta r_dxrShadowSpatialNormalPower 28.0

// Reserve nearby authored lights, then fill remaining slots by irradiance.
seta r_dxrMaxLights 80
seta r_dxrLightSelectionLocalReserve 32
seta r_dxrLightSelectionRadiusBias 1.25

// Hybrid BLAS: refit normal animation, rebuild after strong deformation or age.
seta r_dxrDynamicBLASFullRebuild 0
seta r_dxrDynamicBLASMode 0
seta r_dxrDynamicBLASRebuildThreshold 0.24
seta r_dxrDynamicBLASRebuildInterval 120

// Confirmed stable v2.2 execution path.
seta r_dxrSafeMode 1
seta r_dxrErrorLimit 4
seta r_dxrFenceWaitMs 10000
seta r_dxrAsyncSubmit 0
seta r_dxrCpuSync 1
seta r_dxrBuildInterval 1
seta r_dxrDispatchInterval 1

seta r_dxrShadowSamples 4
seta r_dxrRectShadowSamples 4
seta r_dxrAOSamples 0
seta r_dxrSkySamples 0
seta r_dxrShadowStrength 1.0
seta r_dxrLegacyShadowStrength 0.84
seta r_dxrShadowMinVisibility 0.045
seta r_dxrContactShadows 0
seta r_dxrContactShadowLength 72
seta r_dxrAlphaShadowGeometry 1

seta r_picmip 0
seta r_picmip2 0
seta r_roundImagesDown 0
seta r_simpleMipMaps 0
seta r_texturebits 32
seta r_textureMode GL_LINEAR_MIPMAP_LINEAR

seta r_dxrDebug 1
seta r_dxrDebugLights 0
seta r_dxrDebugMode 0
