// Image Cleanup / Quality Polish Fix - Quality cleanup
// Higher sample counts but still conservative to keep the picture clean.
exec dxr_v22_cleanup_balanced.cfg
seta r_dxrMaxLights 32
seta r_dxrAOSamples 4
seta r_dxrAORadius 22
seta r_dxrAOStrength 0.32
seta r_dxrContactAORadius 7
seta r_dxrContactAOStrength 0.22
seta r_dxrSkySamples 4
seta r_dxrGISamples 2
seta r_dxrGIStrength 0.040
seta r_dxrGIMaxDistance 144
seta r_dxrReflectionSamples 2
seta r_dxrReflectionStrength 0.040
seta r_dxrReflectionMaxDistance 560
seta r_dxrReflectionRoughness 0.34
seta r_dxrSpecularStrength 0.58
seta r_dxrSpecularPower 48
seta r_dxrIndirectClamp 0.23
seta r_dxrReflectionClamp 0.14
seta r_dxrLegacyBlend 0.72
seta r_dxrExposure 1.10
