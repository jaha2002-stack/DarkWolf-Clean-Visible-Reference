// Image Cleanup / Quality Polish Fix - Quality SAFE HOTFIX
// Keeps the cleanup shader changes, but avoids the AO=4 / Sky=4 startup load.
exec dxr_v22_cleanup_balanced.cfg
seta r_dxrMaxLights 30
seta r_dxrAOSamples 3
seta r_dxrAORadius 21
seta r_dxrAOStrength 0.30
seta r_dxrContactAORadius 6
seta r_dxrContactAOStrength 0.20
seta r_dxrSkySamples 3
seta r_dxrSkyStrength 0.79
seta r_dxrGISamples 2
seta r_dxrGIStrength 0.038
seta r_dxrGIMaxDistance 140
seta r_dxrReflectionSamples 2
seta r_dxrReflectionStrength 0.038
seta r_dxrReflectionMaxDistance 540
seta r_dxrReflectionRoughness 0.33
seta r_dxrSpecularStrength 0.56
seta r_dxrSpecularPower 46
seta r_dxrIndirectClamp 0.22
seta r_dxrReflectionClamp 0.13
seta r_dxrLegacyBlend 0.73
seta r_dxrExposure 1.08
seta r_dxrDebugMode 0
